syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message SpdrHedgePolicyState {
    message PKey {
        
        ExpiryKey hedge_target = 10; // HedgeTarget
        SpdrKeyType hedge_sec_type = 11;
        string accnt = 12;
        string client_firm = 13;
        DateKey trade_date = 14;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    float net_opn_dDelta = 100;
    float net_trd_dDelta = 103;
    float net_pos_dDelta = 106;
    float net_pos_dGamma = 109;
    google.protobuf.Timestamp last_pos_fill_dttm = 112;
    int32 num_agg_errors = 115;
    string last_agg_error = 118;
    int32 opn_hedge_qty_bot = 121;
    int32 opn_hedge_qty_sld = 124;
    int32 trd_hedge_qty_bot = 127;
    int32 trd_hedge_qty_sld = 130;
    HedgePolicyState pos_hedge_state = 133;
    string pos_hedge_detail = 136;
    float pos_dDBandwidth = 139; // current position ddelta hedge bandwidth
    string pos_hedge_target = 142; // current slice hedge target(s)
    string opn_hedge_order = 145;
    string trd_hedge_order = 148;
    YesNo hedge_waves_enabled = 181;
    HedgePolicy hedge_policy = 184;
    HedgePeriod pos_hedge_period = 196;
    float pos_sym_hedge_band_dD = 199; // individual hedge target hedge band ($delta)
    float pos_sym_hedge_band_gR = 202; // individual hedge target hedge band (gamma ratio)
    YesNo pos_balance_symbols = 205; // balance accnt level deltas from all symbols using this policy
    HedgeSlice pos_hedge_slice = 208;
    HedgeObjective pos_hedge_objective = 211;
    int32 available_locate = 214; // remaining locate available (all targets: open, trade, position, and autohedge)
    int32 firm_position = 217; // current firm position (if known)
    double u_prc = 220; // hedge target price
    double dd_mult = 223;
    double point_value = 226;
    Currency point_currency = 229;
    google.protobuf.Timestamp timestamp = 232;
}


