syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    OptionCloseMark records are published immediately after the market close - 5 min and again when exchanges publish official marks.
    OptionCloseMark records are published to the SpiderRock elastic cluster when clsMarkState=Final
*/    
message OptionCloseMark {
    message PKey {
        
        OptionKey okey = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    TickerKey ticker = 100; // SR Ticker that this option rolls up to
    DateKey trade_date = 103;
    ClsMarkState cls_mark_state = 106; // Preview or Final
    double u_bid = 109; // SpiderRock closing underlier bid (C - 5m)
    double u_ask = 112; // SpiderRock closing underlier ask (C - 5m)
    double u_sr_cls = 115; // SpiderRock underlier closing mark (C - 5m)
    double u_close = 118; // exchange underlier closing mark
    float bid_prc = 121; // SpiderRock closing option bid (C - 5m)
    float ask_prc = 124; // SpiderRock closing option ask (C - 5m)
    double sr_cls_prc = 127; // SpiderRock close mark (close - 5min) [NBBO mid-market]
    double close_prc = 130; // official exchange closing mark (last print;then official close)
    YesNo has_sRCls_prc = 133;
    YesNo has_close_prc = 136;
    YesNo has_uCls_prc = 139;
    float bid_iV = 142; // implied vol of SpiderRock closing bid price (C - 5m)
    float ask_iV = 145; // implied vol of SpiderRock closing ask price (C - 5m)
    float sr_prc = 148; // sr close mark price (always within bidPx/askPx) (C - 5m)
    float sr_vol = 151; // sr close mark volatility (C - 5m)
    double syn_spot = 161; // Synthetic spot price (market-derived spot when the underlying is not a traded instrument)
    float atm_vol = 152; // atm vol (xAxis = 0)
    float atm_cen = 153; // atm vol (xAxis = 0) (eMove/earnCntAdj censored)
    MarkSource sr_src = 154; // sr close mark source (SRVol is SurfaceVol)
    float k_adj = 155; // adjusted strike
    float de = 157; // delta
    float ga = 160; // gamma
    float th = 163; // theta
    float ve = 166; // vega
    float vo = 169; // volga
    float va = 172; // vanna
    float rh = 175; // rho
    float ph = 178; // phi
    float de_decay = 181; // delta decay
    float sr_slope = 184; // surface slope (SR surface)
    CalcModelType model_type = 230; // option pricing model used for price calcs (Normal, LogNormal, etc.)
    PricingFramework prc_framework = 233;
    ExerciseType ex_type = 224; // exercise type
    float years = 202; // volatility years to expiration (from SR time/calendar metrics)
    float years_c = 199; // calendar years to expiration
    float rate = 196; // SR interest rate (from global rate curve)
    float sdiv = 187; // SR sdiv rate (implied; from call-put alignment)
    float ddiv = 190; // SR ddiv (sum of discrete dividend amounts)
    float ddiv_pv = 193; // SR ddivPv (sum of present value discrete dividend amounts)
    int32 s_days_t = 236; // settlement days (today)
    int32 s_days_e = 239; // settlement days (expiry)
    float i_eMove = 197; // implied earnings move (from LiveSurfaceTerm)
    float earn_cnt_adj = 198; // number of qualifying earnings events prior to expiration [adjusted] (from StockEarningsCalendar + LiveSurfaceTerm)
    int32 error = 205; // calculation error code
    int32 open_interest = 208; // option open Interest
    int32 prt_count = 211; // print count
    int32 prt_volume = 214; // total printed volume (all prt types)
    google.protobuf.Timestamp sr_close_mark_dttm = 217; // from MarketCloseQuote.srCloseMarkDttm (in trading period local timezone)
    google.protobuf.Timestamp config_now = 220; // timestamp in the trading period local timezone
    google.protobuf.Timestamp timestamp = 223; // record timestamp
}


