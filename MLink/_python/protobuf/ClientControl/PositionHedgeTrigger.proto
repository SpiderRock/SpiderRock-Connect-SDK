syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message PositionHedgeTrigger {
    message PKey {
        
        ExpiryKey hedge_target = 12; // HedgeTarget
        SpdrKeyType hedge_sec_type = 13;
        string accnt = 10;
        string client_firm = 11;
        DateKey trade_date = 14;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    HedgeControl hedge_control = 110; // note: disable will suspend/hold all outstanding OPN,TRD, and POS hedging orders
    string modified_by = 107; // user who last modified this record
    SysEnvironment modified_in = 108;
    google.protobuf.Timestamp timestamp = 109; // timestamp of last modification
}


