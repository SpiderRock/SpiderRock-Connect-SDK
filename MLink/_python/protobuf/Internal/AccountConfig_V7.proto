    CatAccntType cat_brkr_accnt_type_opt = 5039; // ONLY V7: [enum,Name=CatAccntType,Values=None=0,Institutional=1,Employee=2,Foreign=3,Individual=4,MktMaking=5,FirmAvgPx=6,OtherProp=7,Error=8] --- Original comment: CAT account holder type (option trades)
