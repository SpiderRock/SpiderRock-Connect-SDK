    CatFirmType cat_brkr_firm_type_opt = 5041; // ONLY V7: [enum,Name=CatFirmType,Values=None=0,Client=1,ClientBDAgency=2,ClientBDFirm=3,SRFirm=4] --- Original comment: CAT source firm type (option trades)
