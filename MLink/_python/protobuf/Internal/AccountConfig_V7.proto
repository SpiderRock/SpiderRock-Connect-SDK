    string risk_firm2 = 5023; // ONLY V7: [string,Length=16,Alias=ClientFirmString,MetaType=NA] --- Original comment: clientFirm with ownership of riskGroup2 risk settings (usually clientFirm)
    string risk_group2 = 5024; // ONLY V7: [string,Length=16,Alias=ClientFirmString,MetaType=NA] --- Original comment: risk pool grouping code (slot #2) (usually accnt)
    string risk_firm3 = 5025; // ONLY V7: [string,Length=16,Alias=ClientFirmString,MetaType=NA] --- Original comment: clientFirm with ownership of riskGroup3 risk settings [usually blank]
    string risk_group3 = 5026; // ONLY V7: [string,Length=16,Alias=ClientFirmString,MetaType=NA] --- Original comment: risk pool grouping code (slot #3) [usually blank]
