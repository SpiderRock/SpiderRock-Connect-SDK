    string proxy_firm2 = 5010; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=NA,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirmRef] --- Original comment: SR assigned proxy firm #2
    string proxy_firm3 = 5011; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=NA,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirmRef] --- Original comment: SR assigned proxy firm #3
    string accnt_name = 5012; // v7 & v8 --- Original comment: account name (SR assigned)
    string view_group1 = 5013; // ONLY V7: [string,Length=12,Alias=NA,MetaType=NA] --- Original comment: view group tag #1; allows custom aggregation in tools
    string view_group2 = 5014; // ONLY V7: [string,Length=12,Alias=NA,MetaType=NA] --- Original comment: view group tag #2; allows custom aggregation in tools
    string view_group3 = 5015; // ONLY V7: [string,Length=12,Alias=NA,MetaType=NA] --- Original comment: view group tag #3; allows custom aggregation in tools
