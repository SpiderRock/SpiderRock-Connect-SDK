syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    V7 Message Name: AccountConfig
    V8 Message Name: AccountConfig
    Bridging pattern:  [V8 --> V7] [V7 --> V8]
    BridgeFromV8:AccountConfig
*/    
message AccountConfig_V7 {
    message PKey {
        
        string accnt = 5000; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=SRAccountString,MetaType=NA], V8=[string,Length=16,Alias=SRAccountString,MetaType=SRAccount]
    }

    message ClearingFlip {
        
        string exch_str = 5204; // ONLY V7: [string,Length=8,Alias=NA,MetaType=NA] --- Original comment: eg: CBOEOPT (used to override clearing flip firm/account on a per-exchange basis)
        FlipType clearing_flip_type = 5205; // ONLY V7: [enum,Name=FlipType,Values=None=0,CMTA=1,Giveup=2,QSR=3,NSCC_Flip=4,DVP=5,BrkrAccnt=6] --- Original comment: either CMTA or Giveup
        string clearing_flip_firm = 5206; // ONLY V7: [string,Length=6,Alias=NA,MetaType=NA] --- Original comment: deliverTo firm Broker/MPID/CMTA/Give-up
        string clearing_flip_accnt = 5207; // ONLY V7: [string,Length=16,Alias=NA,MetaType=NA] --- Original comment: deliverTo accnt additional detail (sub-accnt)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    AccountType account_type = 5001; // v7 & v8 --- Original comment: SR account type
    SpdrStageType_V7 stage_type = 5002; // ONLY V7: [enum,Name=SpdrStageType,Values=None=0,StageLock=1,StageModify=2,StageReview=3] --- Original comment: if not NONE or StageModify then parent order must be a staged order [StageLock, StageReview]
