    string rollup_accnt = 5005; // v7 & v8: Field Name Change: V7=[rollupAccnt], V8=[tgtRollupAccnt]: Using Meta Types: V7=[string,Length=16,Alias=NA,MetaType=NA], V8=[string,Length=16,Alias=SRAccountString,MetaType=SRAccountRef] --- Original comment: rollup account (must be an existing account with the same clientFirm and type=Rollup)
    string source_accnt = 5006; // ONLY V7: [string,Length=16,Alias=NA,MetaType=NA] --- Original comment: SR side source account (must be an existing account with the same clientFirm and type=Rollup; only available when type=Clearing)
    string client_firm = 5007; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=ClientFirmString,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirm] --- Original comment: SR assigned client firm acronym
    string client_accnt = 5008; // v7 & v8 --- Original comment: client assigned "long" account string (optional) [used to map between client and SR account strings]
