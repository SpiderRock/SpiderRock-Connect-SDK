    ReportingType_V7 fut_reporting_type = 5046; // ONLY V7: [enum,Name=ReportingType,Values=None=0,SRToBrkr=1,CustToBroker=2,CustToSRToBrkr=3] --- Original comment: indicates type of reporting done for all trading activity
    ReportingType_V7 opt_reporting_type = 5047; // ONLY V7: [enum,Name=ReportingType,Values=None=0,SRToBrkr=1,CustToBroker=2,CustToSRToBrkr=3] --- Original comment: indicates type of reporting done for all trading activity
