syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    V7 Message Name: TheoModelConfig
    V8 Message Name: TheoModelConfig
    Bridging pattern:  [V8 --> V7] [V7 --> V8]
    BridgeFromV8:TheoModelConfig
*/    
message TheoModelConfig_V7 {
    message PKey {
        
        string theo_model = 5000; // v7 & v8
        string client_firm = 5001; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=ClientFirmString,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirm] --- Original comment: client firm this theo model is associated with
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string description = 5002; // v7 & v8 --- Original comment: model description
    google.protobuf.Timestamp timestamp = 5003; // v7 & v8 --- Original comment: timestamp of last modification
    string user_name = 5004; // v7 & v8: Field Name Change: V7=[userName], V8=[modifiedBy]: Using Meta Types: V7=[string,Length=24,Alias=UserNameString,MetaType=NA], V8=[string,Length=24,Alias=SRUserString,MetaType=ModifiedBy]
    SysEnvironment modified_in = 5005; // v7 & v8
}


