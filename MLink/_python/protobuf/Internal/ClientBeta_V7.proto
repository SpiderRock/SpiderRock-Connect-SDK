syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    V7 Message Name: ClientBeta
    V8 Message Name: ClientBeta
    Bridging pattern:  [V8 --> V7] [V7 --> V8]
    BridgeFromV8:ClientBeta
*/    
message ClientBeta_V7 {
    message PKey {
        
        ExpiryKey sec_key = 5000; // v7 & v8
        SpdrKeyType sec_type = 5001; // v7 & v8
        string client_firm = 5002; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=ClientFirmString,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirm] --- Original comment: client firm of the uploading user
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    float beta = 5003; // v7 & v8 --- Original comment: client supplied beta (expected move of secKey relative to reference)
    string user_name = 5004; // v7 & v8: Field Name Change: V7=[userName], V8=[modifiedBy]: Using Meta Types: V7=[string,Length=24,Alias=UserNameString,MetaType=NA], V8=[string,Length=24,Alias=SRUserString,MetaType=ModifiedBy] --- Original comment: userName that uploaded this record
    SysEnvironment modified_in = 5005; // v7 & v8
    google.protobuf.Timestamp timestamp = 5006; // v7 & v8 --- Original comment: upload datetime
}


