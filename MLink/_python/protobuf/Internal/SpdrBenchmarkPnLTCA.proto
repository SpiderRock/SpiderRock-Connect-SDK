syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message SpdrBenchmarkPnLTCA {
    message PKey {
        
        int64 tCAID = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string client_firm = 100;
    string accnt = 101;
    string user_name = 102;
    string ticker = 103;
    TickerSrc ticker_src = 104;
    SpdrKeyType sec_type = 105;
    SpdrSource spdr_source = 106;
    MktWidthCode mkt_width_code = 107;
    TCADurationCode duration_code = 108;
    google.protobuf.Timestamp trade_date = 109;
    int32 sum_qwap_fill_quantity = 110;
    int32 sum_vwap_fill_quantity = 111;
    float sum_qwap_pn_l = 112;
    float sum_vwap_pn_l = 113;
    float sum_qwap_dn_pn_l = 114;
    float sum_vwap_dn_pn_l = 115;
    float sum_uDrift_qwap_pn_l = 116;
    float sum_uDrift_vwap_pn_l = 117;
    float sum_active_seconds = 118;
    float sum_with_seconds = 119;
    float sum_alone_seconds = 120;
}


