    int32 fut_bSz2 = 133;
    int32 fut_bSz3 = 136;
    int32 fut_bSz4 = 139;
    int32 fut_aSz1 = 142;
    int32 fut_aSz2 = 145;
    int32 fut_aSz3 = 148;
    int32 fut_aSz4 = 151;
    double fut_prt = 154;
    int32 fut_pSz = 157;
    double tick_value = 160;
    double point_value = 163;
    Currency point_currency = 166;
    UnderlierType underlier_type = 169;
    double min_tick_size = 172;
    PriceFormat price_format = 175;
    FutExch fut_exch = 178;
    int32 pos = 181;
    int32 bot = 184;
    int32 sld = 187;
    float bid_take_prob = 190;
