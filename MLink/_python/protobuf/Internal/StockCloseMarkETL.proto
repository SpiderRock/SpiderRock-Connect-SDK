syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

/*
    Step: 3
    Inputs: StockClosePriceETL + StockRealizedVarianceETL + StockPrintETL + StockEarningsCalendarETL + (StockAdjustHist)
    CalcEngine: Spark/ETL
*/    
message StockCloseMarkETL {
    message PKey {
        
        TickerKey ticker = 10;
        DateKey trading_date = 11;
        TradingSession trading_session = 12;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int64 security_iD = 100;
    google.protobuf.Duration sr_close_time = 103; // SR closing mark time (C)
    ClsMarkState cls_mark_state = 106; // close mark state. None; LastPrt; SRClose; ExchClose; Final
    double prt_open = 109; // Open/first print
    double prt_high = 112; // High print
    double prt_low = 115; // Low print
    double prt_last = 118; // Last/close print
    int64 shares_outstanding = 176; // shares outstanding
    int32 prt_count = 124; // print count
    int32 prt_volume = 127; // print volume
    float realized_vol = 130; // realized vol
    float avg_mkt_size = 133; // average market size
    float avg_mkt_width = 136; // average market width
    float bid_prc = 139; // bid price (close - 1min)
    float ask_prc = 142; // ask price (close - 1min)
    float sr_cls_prc = 145; // SR close mark (close - 1min)
    float close_prc = 148; // official exchange closing mark (last print;then official close)
    EarnRelative inc_earnings = 151; // this trading period includes an earnings announcement
    DivStatus div_status = 154;
    google.protobuf.Timestamp prior_date = 157;
    TickerKey prior_ticker = 160; // prior period stock key (same as ticker on most days)
    float prc_adj_value = 163; // corp action adjustment value (0.0 on most days)  currentPrice = priorPrice * factor + value
    float prc_adj_ratio = 166; // corp action adjustment factor (1.0 on most days)
    float prior_sRCls_prc = 169; // values archive in the previous trading period
    float prior_close_prc = 172;
    google.protobuf.Timestamp timestamp = 175;
}


