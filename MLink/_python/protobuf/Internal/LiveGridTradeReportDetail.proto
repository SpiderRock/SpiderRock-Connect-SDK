syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridTradeReportDetail {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string accnt = 100; // SpiderRock Accnt Code
    string c_firm = 101; // SpiderRock ClientFirm Code
    int64 fill_number = 102; // SpiderRock execution number (globally unique over trailing 10 days)
    string trade_date = 103; // trade date
    RunStatus run_status = 104;
    SysEnvironment sys_environment = 105;
    int32 version = 106; // record version number; starts at zero and goes up every time an execution record is re-published (eg, bust, +1m marks, +10m marks, etc)
    string cl_ord_id = 107; // clOrdId resulting in fill (child order)
    int64 parent_number = 108; // SpiderRock parent number
    int64 package_id = 109; // groups related order/brokers together (eg. Legger w/MLeg Parent)
    string alt_order_id = 110; // alternate order ID (usually clOrdId from client)
    string src_routing_code = 111; // inbound FIX routing code, if any
    SpdrSource spdr_source = 112; // SpiderRock parent order source code [broker pkey]
    string grouping_code = 113; // SpiderRock parent broker number [broker pkey]
    string pri_agg_group = 114; // primary aggregation group
    string sec_agg_group = 115; // secondary aggregation group
    string sec_key = 317; // security key
    string sec_key_ticker_src = 318;
    string sec_key_asset_type = 319;
    SpdrKeyType sec_type = 117; // security type [Stock, Future, Option]
    TickerKey ticker = 118; // base ticker
    string view_group1 = 119; // viewGroup1 (user supplied; if any)
    string view_group2 = 120; // viewGroup2 (user supplied; if any)
    string view_group3 = 121; // viewGroup3 (user supplied; if any)
    string risk_class = 122; // user supplied risk class code (from SymbolControl record)
    SymbolType symbol_type = 123; // symbol type
    string sector = 124; // user supplied sector code (from SymbolControl record)
    int32 ind_num = 125; // ind num (00)
    int32 sub_num = 126; // sub num (0000)
    int32 grp_num = 127; // grp num (000000)
    int32 nbr_num = 128; // nbr num (00000000)
    int32 edays = 129; // days to next earnings [-5, +60]
    ExpCode exp_code = 130; // expiration tenor code
    SkewCode skew_code = 131; // strike skew code
    WidthCode width_code = 132; // market width code
    PriceFormat price_format = 133; // SpiderRock price display format code
    PriceFormat u_price_format = 134; // SpiderRock underlier price display code
    float years = 135; // years to expiration
    int32 underliers_per_cn = 136; // underliers per contract (futures and options)
    UnderlierType underlier_type = 137; // underlier type (affects $greek calcs)
    float tick_value = 138; // $NLV value of a single tick change in display premium	(pointValue = tickValue / tickSize)
    float point_value = 139; // $NLV value of a point
    Currency point_currency = 140;
    float u_prc_ratio = 141; // UPrcRatio (SymbolRatio) from product definition
    float min_tick_size = 142;
    string routing_code = 143; // SpiderRock market routing code
    string orig_exec_iD = 144; // original execution ID string (child order)
    string last_exec_iD = 145; // most recent execution ID (same as origExecID unless CANCEL/CORRECTION has been processed)
    google.protobuf.Timestamp transact_dttm = 146; // transaction date/time as reported by exchange or down stream broker
    ExecStatus exec_status = 147; // SpiderRock execution status (Fill,Bust,Correct,Reject,SysRej)
    string remote_text = 148; // text comment from endpoint (if any)
    SpdrLimitType order_limit_type = 149; // parent order limit type [Vol, VolX, PrcDe, PrcDeX, etc]
    SpdrLimitClass order_limit_class = 150; // parent order limit class (makeLimitClass if fill was from making; takeLimitClass if fill was from taking)
    SpdrOrderShape parent_shape = 151;
    ParentOrderHandling parent_order_handling = 152; // base parent order algo [take style algo]
    ParentBalanceHandling parent_balance_handling = 153; // base parent order balance handling [make style algo]
    int32 parent_order_size = 154; // parent order size
    string method = 155; // execution method string
    string strategy = 156; // client strategy [usually client supplied]
    string user_name = 157; // SpiderRock user name associated with the parent order
    string origin = 158; // parent order origin string
    string source = 159; // execution source string
    string server = 160; // SpiderRock execution engine that handled the parent order
    string clearing_firm = 161; // clearing firm (delivery)
    string clearing_accnt = 162; // clearing firm account (if any)
    OrderCapacity last_capacity = 163; // child order capacity
    ExecRole exec_role = 164; // SpiderRock relationship to this execution record (Direct, Drop, etc)
    string exec_brkr_code = 165; // SR exec broker acronym
    string exec_brkr_accnt = 166; // account at executing broker/prime (if any)
    string exec_brkr_cl_firm = 167; // client/firm at executing broker/prime (if any)
    string exec_brkr_user_name = 168;
    FlipType clearing_flip_type = 169; // clearingFlip Type (CMTA or Giveup)
    string clearing_flip_firm = 170; // clearingFlip Broker/MPID/CMTA
    string clearing_flip_accnt = 171; // clearingFlip additional detail (sub-accnt)
    int64 risk_group_id = 172; // riskGroupId (parent order group ID) for this execution report
    float fill_brkr_rate = 173; // billing brokerage rate (tier 1)
    float fill_routing_rate = 174; // billing routing rate (tier 1)
    BillingSecType billing_sec_type = 175; // SpiderRock billing security type
    BillingCategory billing_category = 176; // SpiderRock billing category
    FirmType firm_type = 177; // chld order firm type [Customer, ProCust, Firm, MM, etc]
    BuySell side = 178; // parent/child order side
    PriceType price_type = 179; // order limit price type
    ShortSaleFlag ssale_flag = 180; // child order short sale flag
    ShortSaleFlag spdr_sSale_flag = 181; // parent order short sale flag
    PositionType position_type = 182; // child order position type
    AutoHedge auto_hedge = 183; // SpiderRock auto-hedge algorithm (if any)
    google.protobuf.Timestamp order_dttm = 184; // Date/time of parent order arrival
    double order_uBid = 185; // underlier market bid @ parent order arrival
    double order_uAsk = 186; // underlier market ask @ parent order arrival
    double order_bid = 187; // option market bid @ parent order arrival (options only)
    double order_ask = 188; // option market ask @ parent order arrival (options only)
    float order_surf_prc = 189; // SpiderRock surface price @ parent order arrival (options only)
    float order_surf_vol = 190;
    float order_limit_vol = 191; // parent order limit volatilty (options only)
    double order_limit_prc = 192; // parent order limit price @ parent order arrival
    double order_limit_ref_uPrc = 193; // limit reference underlier price @ parent order arrival (options only)
    SpdrOrderShape child_shape = 194;
    int32 child_size = 195; // child order size
    double child_price = 196; // child order price
    string child_exch = 197; // child order exchange code (SpiderRock)
    string child_ex_dest = 198; // child order exchange code (downstream)
    google.protobuf.Timestamp child_dttm = 199; // child order send date/time
    double child_uBid = 200; // underlier market bid @ child order send time
    double child_uAsk = 201; // underlier market bid @ child order send time
    double child_bid = 202; // option market bid @ child order send time (options only)
    double child_ask = 203; // option market ask @ child order send time (options only)
    float child_surf_prc = 204; // SpiderRock surface price @ child order send time (options only)
    float child_vol = 205; // child order volatilty (options only)
    float child_prob = 206; // child order probability (T+x)
    double child_limit_prc = 207; // parent order limit price @ child order send time
    double child_limit_ref_uPrc = 208; // limit reference underlier price @ child order send time (options only)
    float child_limit_pnl = 209; // child limit improvement pnl (childLimitPrc to fillPrice)
    ChildHandler child_algo_handler = 210; // algo that generated the child order responsible for this fill
    string child_order_handling = 211; // algo that generated the child order responsible for this fill
    ChildCreateReason child_create_reason = 212; // child order create reason code
    ChildCancelReason child_cancel_reason = 213; // child order cancel reason code
    MktStance child_mkt_stance = 214; // child order was expected to be marketable @ child send time
    YesNo child_cxl_attempted = 215; // cancel attempt was made on the child order prior to receiving this fill
    float child_cxl_fill_latency = 216; // cancel latency (for fills with a cancel attempt)
    string fill_exch = 217; // ExDest code from child order execution report (lastMkt)
    double fill_price = 218; // fill price
    double fill_ts = 219; // fill report ts (seconds since startup; 100 nanosec resolution)
    google.protobuf.Timestamp fill_dttm = 220; // Date/time of fill arrival
    int32 fill_size = 221; // fill quantity
    int32 eff_fill_size = 222; // fill size x underliers per contract
    float fill_vol = 223; // fill volatilty (options only)
    float fill_prob = 224; // fill order probability (T+x)
    double fill_limit_prc = 225; // parent order limit price @ fill arrival time
    double fill_limit_ref_uPrc = 226; // limit reference underlier price @ fill arrival time (options only)
    float fill_limit_pnl = 227; // fill limit improvement pnl (fillLimitPrc to fillPrice)
    float fill_de = 228; // fill delta
    float fill_ve = 229; // fill vega
    float fill_th = 230; // fill theta
    double fill_uPrc = 231; // fill underlier mid-market
    float fill_beta = 232; // SpiderRock estimate of beta to SPX
    float fill_tv = 233; // theo vol (user supplied)
    float fill_tp = 234; // theo price
    double fill_uBid = 235; // underlier market bid @ fill arrival
    double fill_uAsk = 236; // underlier market ask @ fill arrival
    double fill_bid = 237; // option market bid @ fill arrival
    double fill_ask = 238; // option market ask @ fill arrival
    float fill_surf_prc = 239; // SpiderRock surface price @ fill arrival
    double fill_post_uMark1_m = 240; // underlier mark @ fill arrival + 1M
    double fill_post_uMark10_m = 241; // underlier mark @ fill arrival + 10M
    double fill_post_mark1_m = 242; // SpiderRock mid or surface mark @ fill arrival + 1M
    double fill_post_mark10_m = 243; // SpiderRock mid or surface mark @ fill arrival + 10M
    float margin_uDn_vDn = 244; // Aggregate RiskSlide: uPrc dn, vol dn
    float margin_uDn_vUp = 245; // Aggregate RiskSlide: uPrc dn, vol up
    float margin_uUp_vDn = 246; // Aggregate RiskSlide: uPrc up, vol dn
    float margin_uUp_vUp = 247; // Aggregate RiskSlide: uPrc up, vol up
    RiskCode risk_code = 248; // SpiderRock Risk Code (if any)
    string exch_liquidity_tag = 249; // liquidity tag (exchange)
    string spdr_liquidity_tag = 250; // SpiderRock normalized liquidity tag
    string fill_exch_detail = 251; // other fix tags (tag:value#tag:value) [additional detail used for analysis]
    float notional_value = 252; // cn * mult * uPrc
    float market_value = 253; // cn * mult * fillPrice
    float order_mkt_width = 254; // market width @ parent order arrival
    float child_mkt_width = 255; // market width @ child order send time
    float fill_mkt_width = 256; // market width @ fill arrival
    float parent_order_age = 257; // elaspsed time from parent order entry/update to this fill event
    ParentAge parent_age_code = 258; // elaspsed time from parent order entry/update to this fill event [coded]
    float trd_delta = 259; // trade delta
    float trd_dDelta = 260; // trade $delta
    float trd_gamma = 261; // trade gamma
    float trd_vega = 262; // trade vega
    float trd_wt_vega = 263; // trade wtVega (vega * vol / sqrt(max(0.1, years * 4)))
    float trd_theta = 264; // trade theta
    float trd_prem = 265; // trade premium over parity
    float trd_beta = 266; // trade beta
    float trd_dBeta = 267; // trade $beta
    float surf_edge = 268; // SR surface edge (user supplied theo vol/prc to SpiderRock surface price)
    float surf_edge_unit = 269; // SR surface edge normalized to $100 underlier
    float theo_edge = 270; // theo edge (user supplied theo vol/prc to SpiderRock surface price)
    float theo_edge_unit = 271; // theo edge normalized to $100 underlier
    float exch_fee = 272; // SpiderRock exchange fee estimate
    float half_width_pnl = 273; // estimated half-width Pnl
    float cl_arrive_pnl = 274; // -dir * qty * (fillPrice - clArriveMark)  # maybe use orderSurfPrc instead
    float arrive_pnl = 275; // -dir * qty * (fillPrice - 0.5 * (orderBid + orderAsk))  # maybe use orderSurfPrc instead
    float arrive_dn_pnl = 276; // arrivePnl - uDriftArrivePnl
    float u_drift_arrive_pnl = 277; // -dir * qty * fillDe * (0.5 * (fillUBid + fillUAsk) - 0.5 * (orderUBid + orderUAsk))
    float day_dn_pnl = 278; // delta neutral Pnl (to EOD)
    float day_m1_pnl = 279; // delta neutral Pnl (Fill + 1M)
    float day_m10_pnl = 280; // delta neutral Pnl (Fill + 10M)
    float u_drift_day_pnl = 281; // underlier delta drift Pnl (to EOD)
    float u_drift_m1_pnl = 282; // underlier delta drift Pnl (Fill + 1M)
    float u_drift_m10_pnl = 283; // underlier delta drift Pnl (Fill + 10M)
    float day_pnl = 284; // actual Pnl to EOD
    double live_mark = 285; // SpiderRock internal use
    double live_uPrc = 286; // SpiderRock internal use
    double pend_mark = 287; // SpiderRock internal use
    double pend_uPrc = 288; // SpiderRock internal use
    string trd_mark_error = 289; // trade mark error code
    string day_mark_error = 290; // day mark error code
    string user_data1 = 291; // client supplied data field; passes through to parent and child executions and reports as well as FIX drops
    string user_data2 = 292; // client supplied data field; passes through to parent and child executions and reports as well as FIX drops
    float fill_ddelta = 293;
    float fill_ddelta_bot = 294;
    float fill_ddelta_sld = 295;
    string call_put = 296; // string representation of call put string from sectype
    float fill_ve_bot = 297;
    float fill_ve_sld = 298;
    int32 filled_stk = 299;
    int32 filled_stk_bot = 300;
    int32 filled_stk_sld = 301;
    int32 filled_opt = 302;
    int32 filled_opt_bot = 303;
    int32 filled_opt_sld = 304;
    int32 filled_fut = 305;
    int32 filled_fut_bot = 306;
    int32 filled_fut_sld = 307;
    int32 filled_opt_fut = 308;
    int32 filled_opt_fut_bot = 309;
    int32 filled_opt_fut_sld = 310;
    float exch_fee_stk = 311;
    float exch_fee_opt = 312;
    float exch_fee_fut = 313;
    float exch_fee_fut_opt = 314;
    string instrument = 315;
    AssetType asset_type = 320;
    double sum_fill_money = 321; // fill notional (fillPrice * fillSize)
    string parent_number_hex = 322; // hex formatted parent number
    string fill_number_hex = 323; // hex formatted fill number
    string risk_group_id_hex = 324; // hex formatted risk group ID
    string additional_detail = 325; // reject/SYSMON remote text
    string risk_hash = 326; // risk group hash
    string date_only = 327; // fill date (yyyy-MM-dd)
    google.protobuf.Timestamp timestamp = 316; // SR system timestamp
    YesNo is_prod = 328; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 329; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 330; // WTS synthetic: alert message (null if no alert)
}


