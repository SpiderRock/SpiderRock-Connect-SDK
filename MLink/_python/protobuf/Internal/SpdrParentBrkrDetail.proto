syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    SpdrParentBrkrDetail records are created/published by SpiderRock Execution Engines. Each record describes the current active detail of a single parent broker.
*/    
message SpdrParentBrkrDetail {
    message PKey {
        
        string accnt = 10;
        OptionKey sec_key = 11;
        SpdrKeyType sec_type = 12;
        SpdrSource spdr_source = 13;
        int64 grouping_code = 14;
        BuySell order_side = 15;
        string client_firm = 16; // SR client firm
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string user_name = 100; // SR user name string
    string engine_name = 106; // server stripe
    int64 parent_number = 109; // SR parent number
    int64 base_parent_number = 112;
    int64 risk_group_id = 115; // all orders with the same riskGroupId share a common set of risk counters;.Grp. risk limits apply to these shared counters
    int64 trigger_group_id = 118;
    string strategy = 124; // parent order strategy (description only)
    TickerKey ticker = 588; // underlier ticker
    SpdrStageType spdr_stage_type = 581; // parent is a staged order [ToolVisible]
    StartType start_type = 582;
    int32 max_exposure_size = 127; // maximum simultaneous cumulative child order public size exposure (-1 = orderActiveSize) [order can overfill if > orderActiveSize and numMakeExchanges > 1]
    int32 num_make_exchanges = 130; // number of exchanges (1 - 4) on which to publish public making orders.  Effective number might be less than requested number if sufficient exchanges are not available.
    PublicSizeHandling public_size = 133; // public order size handling
    YesNo can_overlap_cxl_repl = 136; // can execution engines overlap cancel/replace operations [order can overfill if YES] (at most one active overlapping cxl/replace operation for each parent order)
    ProgressRule progress_rule = 139; // Immediate = all size immediately available;TWAP = size released in time intervals;VWAP = size released in volume intervals;
    int32 progress_slice_cnt = 142; // number of progress slices to use (default = 4 or 8) [max 20]
    int32 progress_expose_time = 145; // minimum time (secs) to expose order (0 = no minimum; used to guarantee that the order is exposed at mid-market for some time before actively taking)
    float vwap_participation = 148; // target vwap participation rate (target % of trade activity)
    int32 min_mkt_on_close_pct = 151; // Minimum pct [0 - 100] of order reserved for the on-close auction
    TriggerType trigger_type = 154; // type of trigger (PrintVol/SurfVol only for options) [print = print or actionable quote]
    float trigger_level = 157; // stop/trigger price for parent order to go active
    MarketSession market_session = 583;
    google.protobuf.Timestamp start_dttm = 163; // Order Start Date/Time
    int32 order_duration = 166; // [optional] (number of seconds)
    google.protobuf.Timestamp good_till_dttm = 169; // [optional] (default: 2099-01-01)
    google.protobuf.Timestamp expire_dttm = 584; // EE Parent Order Expiry Dttm
    UPrcCxl cxl_uPrc_range = 172; // cancel spdr order if/when outside stock price range
    float min_uBid = 175; // [optional]
    float max_uAsk = 178; // [optional] (< $0.01 = none)
    MinMaxType min_max_type = 181; // if Prc minUBid/maxUAsk are expressed as prices; if Pct then they are expresses as pct change since parent order arrival
    float min_option_px = 184; // [optional] option price floor for tied to stock orders
    int32 max_child_orders = 187; // maximum number of child orders that can be generated by this parent order [order will terminate if/when this cap is reached;zero or neg = unlimited]
    int64 exch_mask = 589; // eligible exchanges (0 = all)
    string extern_ex_dest = 587;
    string exec_brkr_code = 586; // execBrkrCode attached to parent order (if any)
    PositionType position_type = 196;
    ShortSaleFlag ssale_flag = 199;
    int32 locate_quan = 202; // available locate quantity (if selling short) @ child order send time
    string locate_firm = 205; // firm granting the locate (also locate firm used on street FIX orders)
    string locate_pool = 208; // locate pool @ firm granting the locate
    ParentOrderHandling parent_order_handling = 211;
    ParentBalanceHandling parent_balance_handling = 214;
    AtsVisibility ats_visibility = 604;
    SpdrLimitType order_limit_type = 220;
    SpdrLimitClass take_limit_class = 223; // Simple = LimitPrice, Surface = BEST(LimitPrice, SurfLimit), Probability = BEST(LimitPrice, ProbLimit)
    SpdrLimitClass make_limit_class = 226; // Simple = LimitPrice, Surface = BEST(LimitPrice, SurfLimit), Probability = BEST(LimitPrice, ProbLimit)
    ReachRule take_reach_rule = 229; // Immediate = reach room immediately available; Delayed = available after [1-3] seconds; Passive = available if contra side aggresses; WeakOnly = only take if available size < avgMarketSize; ISOSweep = Intermarket Sweep [requires WaitTrigger]
    double order_prc_limit = 232; // Applies if LimitType = Prc[]
    double order_ref_uPrc = 235; // default=underlier.mid
    float order_ref_delta = 238; // default=option.delta
    float order_ref_gamma = 241; // default=option.gamma
    float order_ref_theta = 244;
    float order_ref_years = 247;
    float order_vol_limit = 250; // Applies if LimitType = Vol[] [uses SR dividends and borrow rates]
    float rate_override = 253; // zero = ignore;> zero = override
    float sdiv_override = 256;
    string ddiv_override = 259; // discrete dividend string override ([yearsToExpiry,divYears:divAmount,divYears:divAmount, ...])
    OverrideCode override_code = 262;
    double order_prc_offset = 265; // default=0
    AlphaType take_alpha_type = 268; // Applies if takeLimitClass = Probability
    AlphaType make_alpha_type = 271; // Applies if makeLimitClass = Probability
    float take_alpha_factor = 274; // [-2,+2] takeProbLimit = MAX(takeProbability, takeProbAvg + takeAlphaFactor * takeProbStd) [if takeAlphaType = Relative]
    float make_alpha_factor = 277; // [-2,+2] makeProbLimit = MAX(makeProbability, makeProbAvg + makeAlphaFactor * makeProbStd) [if makeAlphaType = Relative]
    float take_probability = 280; // takeProbLimit = takeProbability [if takeAlphaType = Static]
    float make_probability = 283; // makeProbLimit = makeProbability [if makeAlphaType = Static]
    double take_surf_prc_offset = 286; // default=0
    float take_surf_vol_offset = 289; // default=0
    float take_surf_width_offset = 292; // [-1.x to +1.x]       -1.0 = -0.5 * avgMktWidth, +1.0 = +0.5 * avgMktWidth
    double make_surf_prc_offset = 295; // default=0
    float make_surf_vol_offset = 298; // default=0
    float make_surf_width_offset = 301; // [-1.x to +1.x]       -1.0 = -0.5 * avgMktWidth, +1.0 = +0.5 * avgMktWidth
    RMetricSource ref_rMetric1_src = 590;
    RMetricSource ref_rMetric2_src = 591;
    RMetricSource ref_rMetric3_src = 592;
    RMetricSource ref_rMetric4_src = 593;
    RMetricSource ref_rMetric5_src = 594;
    RMetricSource ref_rMetric6_src = 595;
    RMetricSource ref_rMetric7_src = 596;
    float order_ref_rMetric1 = 597; // user supplied RMetric1 value (used in RiskGroupID risk controls) [netRMetric1 = sum(fillQty * orderRefRMetric1 * underlierPerCn)]
    float order_ref_rMetric2 = 598; // user supplied RMetric2 value (used in RiskGroupID risk controls) [netRMetric2 = sum(fillQty * orderRefRMetric2 * underlierPerCn)]
    float order_ref_rMetric3 = 599; // user supplied RMetric3 value (used in RiskGroupID risk controls) [netRMetric3 = sum(fillQty * orderRefRMetric3 * underlierPerCn)]
    float order_ref_rMetric4 = 600; // user supplied RMetric4 value (used in RiskGroupID risk controls) [netRMetric4 = sum(fillQty * orderRefRMetric4 * underlierPerCn)]
    float order_ref_rMetric5 = 601; // user supplied RMetric5 value (used in RiskGroupID risk controls) [netRMetric5 = sum(fillQty * orderRefRMetric5 * underlierPerCn)]
    float order_ref_rMetric6 = 602; // user supplied RMetric6 value (used in ExpDay risk controls) [netRMetric6 = sum(fillQty * orderRefRMetric6 * underlierPerCn)]
    float order_ref_rMetric7 = 603; // user supplied RMetric7 value (used in SymDay risk controls) [netRMetric7 = sum(fillQty * orderRefRMetric7 * underlierPerCn)]
    float exp_day_wt_vega_offset = 328; // max acct+symbol day wtVega offset (target)
    float max_exp_day_wt_vega_ln = 322; // max accnt+expiration day (time weighted) vega long (positive number;-1=no limit);risk limit = max limit - (current net counter - offset)
    float max_exp_day_wt_vega_sh = 325; // max accnt+expiration day (time weighted) vega short (positive number;-1=no limit);risk limit = max limit + (current net counter - offset)
    float max_exp_day_rMetric6_ln = 358; // max acct+expiration day rMetric6 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_exp_day_rMetric6_sh = 361; // max acct+expiration day rMetric6 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float sym_day_dDelta_offset = 355; // max acct+symbol day $delta offset (target)
    float max_sym_day_dDelta_ln = 349; // max acct+symbol day $delta long (positive number;-1=no limit);risk limit = max limit - (current net counter - offset)
    float max_sym_day_dDelta_sh = 352; // max acct+symbol day $delta short (positive number;-1=no limit);risk limit = max limit + (current net counter - offset)
    float sym_day_vega_offset = 337; // max acct+symbol day vega offset (target)
    float max_sym_day_vega_ln = 331; // max acct+symbol day vega long (positive number;-1=no limit);risk limit = max limit - (current net counter - offset)
    float max_sym_day_vega_sh = 334; // max acct+symbol day vega short (positive number;-1=no limit);risk limit = max limit + (current net counter - offset)
    float sym_day_wt_vega_offset = 346; // max acct+symbol day wtVega offset (target)
    float max_sym_day_wt_vega_ln = 340; // max acct+symbol day (time weighted) vega long (positive number;-1=no limit);risk limit = max limit - (current net counter - offset)
    float max_sym_day_wt_vega_sh = 343; // max acct+symbol day (time weighted) vega short (positive number;-1=no limit);risk limit = max limit + (current net counter - offset)
    float max_sym_day_rMetric7_ln = 367; // max acct+symbol day rMetric7 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_sym_day_rMetric7_sh = 370; // max acct+symbol day rMetric7 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_dDelta_ln = 376; // max acct+riskGroup day $delta long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_dDelta_sh = 379; // max acct+riskGroup day $delta short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_vega_ln = 385; // max acct+riskGroup day vega long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_vega_sh = 388; // max acct+riskGroup day vega short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_vega_abs = 391; // max acct+riskGroup day vega abs (positive number;-1=no limit);risk limit = max limit - abs(current net counter)
    float grp_day_vega_ratio = 394; // target bot / sld ratio (eg ratio=2.0 means that neutral is bot vega = 2x sld vega)
    int32 max_grp_day_contracts_ln = 445; // max acct+riskGroup day opt contracts long (positive number;-1=no limit);risk limit = max limit - current net counter
    int32 max_grp_day_contracts_sh = 448; // max acct+riskGroup day opt contracts short (positive number;-1=no limit);risk limit = max limit + current net counter
    int32 max_grp_day_contracts_abs = 451; // max acct+riskGroup day opt contracts abs (positive number;-1=no limit);risk limit = max limit - abs(current net counter)
    float max_grp_day_rMetric1_ln = 409; // max acct+riskGroup day rMetric1 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric1_sh = 412; // max acct+riskGroup day rMetric1 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_rMetric1_abs = 415; // max acct+riskGroup day rMetric1 abs (positive number;-1=no limit);risk limit = max limit - abs(current net counter)
    float grp_day_rMetric1_ratio = 418; // target bot / sld ratio (eg ratio=0.5 means that neutral is bot rMetric1 = 0.5x sld rMetric1)
    float max_grp_day_rMetric2_ln = 421; // max acct+riskGroup day rMetric2 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric2_sh = 424; // max acct+riskGroup day rMetric2 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_rMetric3_ln = 427; // max acct+riskGroup day rMetric3 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric3_sh = 430; // max acct+riskGroup day rMetric3 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_rMetric4_ln = 433; // max acct+riskGroup day rMetric4 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric4_sh = 436; // max acct+riskGroup day rMetric4 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_rMetric5_ln = 439; // max acct+riskGroup day rMetric5 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric5_sh = 442; // max acct+riskGroup day rMetric5 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float sym_ema_cxl_dDelta_ln = 454; // max acct+symbol 60s EMA $delta long (positive number; <= 0 is no limit) [will immediately cxl all option orders in a symbol if any order in the symbol breaches]
    float sym_ema_cxl_dDelta_sh = 457; // max acct+symbol 60s EMA $delta short (positive number; <= 0 is no limit)
    float sym_ema_cxl_wt_vega_ln = 460; // max acct+symbol 60s EMA wtVega long (positive number; <= 0 is no limit) [will immediately cxl all option orders in a symbol if any order in the symbol breaches]
    float sym_ema_cxl_wt_vega_sh = 463; // max acct+symbol 60s EMA wtVega short (positive number; <= 0 is no limit)
    double arrive_bid = 466;
    double arrive_ask = 469;
    int32 arrive_sweep_count = 472; // number of parent orders arriving with immediately available sweep qty
    int32 arrive_sweep_order_qty = 475; // total size of all child orders generated due to parent order arrival sweep
    int32 arrive_sweep_fill_qty = 478; // total fill size due to parent order arrival sweep
    int32 num_sweep_child_orders = 481; // child orders generated in initial arrival sweep
    int32 auction_link = 484; // total linkage auction contracts while parent order was active
    int32 auction_face = 487; // total facilitation auction contracts while parent order was active
    int32 auction_resp = 490; // total auction response contracts
    int32 prt_active_cnt = 493; // total print events while parent order was active; [any exchange; all prints]
    int32 prt_qty_active = 496; // total quantity printed while parent order was active; [any exchange; all prints]
    float prt_qty_active_mny = 499; // total of (quantity printed x print price) while parent order was active
    int32 prt_eligible_cnt = 502; // total eligible (public) print events while parent order was active; [any exchange; all eligible prints]
    int32 prt_qty_eligible = 505; // total eligible (public) quantity printed while parent order was active; [any exchange; all eligible prints]
    int32 prt_qty_limit_oK = 508; // total quantity printed at or better than parent limit while parent was active; SUM(MIN(PrintSize,OpenParentOrderSize)) [any exchange]
    int32 prt_qty_compete = 511; // total quantity printed on an exchange on which we had a competitive child order on that exchange; SUM(MIN(PrintSize, OpenChildOrderSize)) [childOrder.exch = print.exch]
    int32 prt_qty_away_chld = 514; // total quantity printed on an away exchange when we had a competitive child order(s) in the market and the away exchange was competitive prior to the print; SUM(MIN(PrintSize, OpenChildOrderSize)) [childOrder.exch != print.exch]
    int32 prt_qty_no_compete = 517; // total quantity printed on an exchange when the print exchange was not competitive prior to the print (non quote-competitive prints)
    int32 prt_qty_no_comp_nbbo = 520; // total quantity printed on an exchange when the NBBO was not competitive prior to the print (non nbbo-competitive prints)
    int32 mk_check_cnt = 523; // total number of times order was checked for making
    float min_mk_prob = 526; // min make probability while broker active
    float avg_mk_prob = 529; // average make probability while broker active
    float cur_mk_prob = 532; // current make probability
    int32 tk_check_cnt = 535; // total number of times order was checked for taking
    float max_tk_prob = 538; // max take probability while broker active
    float avg_tk_prob = 541; // average take probability while broker active
    float cur_tk_prob = 544; // current take probability
    int32 prt_prb_cnt = 547; // total number of print probability records while broker active (all limit types)
    int32 prt_prb_check = 550; // number of print probability records with active probability printTake handler
    int32 prt_prb_lmt_oK = 553; // number of print probability records that pass broker takeLimit
    int32 tk_qty_lmt_oK = 556; // total quantity available to take at parent limit or better while broker active
    float avg_qte_sz_ratio = 559; // average ratio of child size / nbbo size during the life of the working order when child order is at nbbo
    int32 cnt_qte_sz_ratio = 562; // sample counter for above [1 second intervals]; qteCnRatio / qteCnRatioCnt = avg of child size / nbbo size while broker active
    float min_qte_width = 565; // minimum quote width during active order window
    float avg_qte_width = 568; // average quote width (during active order window)
    int32 cnt_qte_width = 571;
    UpdateSource update_src = 574;
    int32 num_updates = 577; // number of record updates (cumulative for the day)
    google.protobuf.Timestamp timestamp = 580; // SR system timestamp
}


