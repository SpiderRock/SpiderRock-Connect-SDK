syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message TickerHistoryV2 {
    message PKey {
        
        google.protobuf.Timestamp date = 10;
        int64 security_iD = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 dn = 100;
    string ticker = 103;
    float open = 106;
    float high = 109;
    float low = 112;
    float close = 115;
    float close_pr = 118;
    float volume = 121;
    float shares = 124;
    float cc_var = 127;
    float hl_var = 130;
    float rv_var = 133;
    string earn_flag = 136;
    int32 expiry_count = 139;
    float h_eMove = 142;
    float i_eMove = 145;
    float wk_d1 = 148;
    float sh_d1 = 151;
    float qtr_d1 = 154;
    float ln_d1 = 157;
    float atm_cen_i_5d = 160;
    float atm_cen_i_21d = 163;
    float atm_cen_i_42d = 166;
    float atm_cen_i_63d = 169;
    float atm_cen_i_84d = 172;
    float atm_cen_i_105d = 175;
    float atm_cen_i_126d = 178;
