syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message ClientFirmTCAConfig {
    message PKey {
        
        string client_firm = 10;
        string accnt = 11; // * = All Accounts, % = Acts like in SQL, for example accnt% would include all accounts that started with "accnt"
        string user_name = 12; // * = All Usernames, % = Acts like in SQL, for example user% would include all usernames that started with "user"
    }

    message ClientEmail {
        
        string email = 103;
    }

    message InternalEmail {
        
        string email = 105;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    SpdrKeyType sec_type = 100;
    TCAAggLevel agg_level = 101; // The level we aggregate the TCA report by
    string modified_by = 106;
    SysEnvironment modified_in = 107;
    google.protobuf.Timestamp timestamp = 108;
    repeated ClientEmail client_email = 102;
    repeated InternalEmail internal_email = 104;
}


