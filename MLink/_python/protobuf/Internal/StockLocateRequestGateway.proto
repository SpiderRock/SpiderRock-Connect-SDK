syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Records inserted into this gateway become locate requests and are visible in the StockLocateRequest table.
*/    
message StockLocateRequestGateway {
    message PKey {
        
        TickerKey ticker = 10;
        string core_client_firm = 11;
        string locate_firm = 12; // locate firm (defaults to clientFirmConfig.defaultLocateFirm)
        string locate_pool = 13; // locate pool @ firm granting the locate (defaults to clientFirmConfig.defaultLocatePool)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 request_quan = 100; // request quantity
    google.protobuf.Timestamp timestamp = 103;
}


