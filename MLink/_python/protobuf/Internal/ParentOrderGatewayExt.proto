    float mleg_ref_delta2 = 736; // reference delta (for PrcDe order handling)
    int32 mleg_ref_earn_cnt2 = 739; // reference # of earnings moves before expiration
    OptionKey mleg_sec_key3 = 742; // leg #3
    SpdrKeyType mleg_sec_type3 = 745;
    uint32 mleg_mult3 = 748;
    BuySell mleg_side3 = 751;
    int64 mleg_leg_id3 = 754; // SR leg Id
    string mleg_alt_leg_id3 = 757; // client leg Id (usually from a FIX order)
    PositionType mleg_pos_type3 = 760;
    ShortSaleFlag mleg_ssale_flag3 = 766;
    float mleg_vega3 = 772;
    double mleg_ref_uPrc3 = 775; // reference underlier price (PrcDe orders)
    float mleg_ref_delta3 = 778; // reference delta (for PrcDe order handling)
    int32 mleg_ref_earn_cnt3 = 781; // reference # of earnings moves before expiration
    OptionKey mleg_sec_key4 = 784; // leg #4
    SpdrKeyType mleg_sec_type4 = 787;
    uint32 mleg_mult4 = 790;
    BuySell mleg_side4 = 793;
