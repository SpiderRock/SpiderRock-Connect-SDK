syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LeggerActionMessage {
    message Legs {
        
        OptionKey sec_key = 120; // leg Security (can be a stock, future, optExpiry, or option) [must be the same for all legs] [cp can be call, put, or both if secType = optExpiry]
        LeggerSecType sec_type = 121; // note: stock/stock, stock/future, future/future, optExpiry/optExpiry or option/option are allowed
        uint32 ratio = 122; // leg ratio (note: can be in shares, contracts, vega, wvega, tvega, or wtvega terms) (optExpiry must be in one of the xVega choices)
        BuySell side = 123;
        LegPriority leg_priority = 124; // Lead leg(s) fill first
        PositionType pos_type = 125; // note: must be Auto for optExpiry (not required for stock)
        ShortSaleFlag ssale_flag = 126; // only for stock legs (and autohedging)
        HedgeInst hedge_instrument = 127;
        ExpiryKey hedge_sec_key = 128; // autohedge instrument (can be a TickerKey (stock) or ExpiryKey (future)) [required for Stock and Future]
    }


    MessageMetadata _meta = 1;
    
    string accnt = 100; // SR trading account
    string client_firm = 101; // SR client firm
    int64 ord_key = 129; // should exist if orderAction=[AddReplace, Hold, or Cancel]; blank otherwise
    PairCtrlState pair_ctrl_state = 103;
    int32 order_size = 104; // pair size (number of complete spreads)
    double legger_limit = 105; // pair limit
    LeggerLimitType legger_limit_type = 106; // pair limit type (stock: Price, future: Price, optExpiry: AtmVol only, option: StrikeVol)
    LeggerAlgo legger_algo = 107;
    LegRatioType leg_ratio_type = 108; // vega = ve * qty * pv; wVega = vol * ve * qty * pv; tVega = ve / Max(4 * years, 0.1) * qty * pv; wtVega = vol * ve / Max(4 * years, 0.1) * qty * pv
    uint32 num_atm_strikes = 109; // number of OptExpiry atm strikes [max 6]
    float leg_exposure_pct = 110; // percentage of legger order size than can be exposed on a single leg without completing related legs
    double leg_completion_slippage = 111; // maximum leg slippage to complete an open pair order (in leggerLimitType units)
    MarketSession market_session = 112;
    int32 order_duration = 113; // [optional] (number of seconds)
    google.protobuf.Timestamp good_till_dttm = 114; // [optional] (default: 2099-01-01)
    double max_mkt_pct_move = 115; // [optional] if any leg stock price, future price, or option underlier price moves more than maxMktPctMove from values at order activation then the entire order will be automatically put on hold
    AutoHedge auto_hedge = 116; // only for optExpiry/optExpiry and option/option pairs
    MarketSession hedge_session = 117;
    google.protobuf.Timestamp timestamp = 118;
    repeated Legs legs = 119;
}


