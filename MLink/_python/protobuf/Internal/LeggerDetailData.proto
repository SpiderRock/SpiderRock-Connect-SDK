syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LeggerDetailData {
    message PKey {
        
        int64 ord_key = 11; // baseParentNumber.X
    }

    message Legs {
        
        OptionKey sec_key = 132; // leg Security (can be a stock, future, optExpiry, or option) [must be the same for all legs] [cp can be call, put, or both if secType = optExpiry]
        LeggerSecType sec_type = 133; // note: stock/stock, stock/future, future/future, optExpiry/optExpiry or option/option are allowed
        uint32 ratio = 134; // leg ratio (note: can be in shares, contracts, vega, wvega, tvega, or wtvega terms) (optExpiry must be in one of the xVega choices)
        LegPriority leg_priority = 135; // Lead leg(s) fill first
        PositionType pos_type = 136; // note: must be Auto for optExpiry (not required for stock)
        ShortSaleFlag ssale_flag = 137; // only for stock legs (and autohedging)
        HedgeInst hedge_instrument = 138;
        ExpiryKey hedge_sec_key = 139; // autohedge instrument (can be a TickerKey (stock) or ExpiryKey (future)) [required for Stock and Future]
        int32 order_size = 140; // working size (from parentBrkrState.orderSize) (sum of all individual orders; in cn/share terms)
        int32 order_active_size = 141; // order active size (from parentBrkrState.orderActiveSize) (sum of all individual orders; in cn/share terms)
        uint32 num_active_brkrs = 142; // number of parent order legs with leg.activeSize > leg.cumFillQty
        uint32 num_avail_leg_brkrs = 143; // number of parent order legs created
        double cum_fill_qty = 144; // in LeggerLimitType terms
        double avg_fill_prc = 145;
        double active_sprd_size = 146; // active size (sum of all individual orders; in ratio type terms)
        string leg_status = 147;
        LeggerTargetState target_state = 148;
        float target_sprd_size = 149;
        float target_limit_price = 150;
        float best_bid_prc = 151; // leg best bid price (in terms of limit type)
        float best_ask_prc = 152; // leg best ask price
        float best_bid_size = 153; // leg best bid size (in terms of ratio type)
        float best_ask_size = 154; // leg best ask size
        int32 num_new_orders = 155; // number of parent orders published
        int32 num_limit_updates = 156; // number of parent limit messages published
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 counter = 100; // increment on every update
    ToolActionError last_action_error = 101; // should be added to the general tool error queue/display if different from previous error
    string last_action_detail = 102; // user displayable error string
    string accnt = 103; // SR trading account
    string client_firm = 104; // SR client firm
    PairCtrlState pair_ctrl_state = 105;
    PairState pair_state = 106;
    int32 order_size = 107; // pair size (number of complete spreads)
    double legger_limit = 108; // pair limit
    LeggerLimitType legger_limit_type = 109; // pair limit type (stock: Price, future: Price, optExpiry: AtmVol only, option: Price or StrikeVol)
    LeggerAlgo legger_algo = 110;
    LegRatioType leg_ratio_type = 111;
    uint32 num_atm_strikes = 112; // number of OptExpiry atm strikes [max 6]
    float leg_exposure_pct = 113; // percentage of legger order size than can be exposed on a single leg without completing related legs
    double leg_completion_slippage = 114; // maximum leg slippage to complete an open pair order (in leggerLimitType units)
    MarketSession market_session = 115;
    int32 order_duration = 116; // [optional] (number of seconds)
    google.protobuf.Timestamp good_till_dttm = 117; // [optional] (default: 2099-01-01)
    double max_mkt_pct_move = 118; // [optional] if any leg stock price, future price, or option underlier price moves move that maxMktPctMove from values at order activation then the entire order will be automatically put on hold
    AutoHedge auto_hedge = 119; // only for optExpiry/optExpiry and option/option pairs
    MarketSession hedge_session = 120;
    PairStatus pair_status = 121;
    string pair_detail = 122;
    int32 cum_square_fill_qty = 123;
    int32 cum_partial_fill_qty = 124;
    double avg_square_fill_prc = 125;
    double pair_bid_px = 126; // synthetic pair bid (from individual leg markets)
    double pair_ask_px = 127; // synthetic pair ask (from individual leg markets)
    double pair_bid_sz = 128;
    double pair_ask_sz = 129;
    google.protobuf.Timestamp timestamp = 130;
    google.protobuf.Timestamp ts = 157; // last update time (Date)
    repeated Legs legs = 131;
}


