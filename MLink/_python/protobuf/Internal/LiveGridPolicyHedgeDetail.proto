syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridPolicyHedgeDetail {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string hedge_target = 13; // HedgeTarget converted into string for conditional formatting
    SpdrKeyType hedge_sec_type = 14;
    string accnt = 16;
    string c_firm = 17;
    DateKey trade_date = 15;
    float net_opn_dDelta = 185;
    float net_trd_dDelta = 186;
    float net_pos_dDelta = 187;
    float net_pos_dGamma = 188;
    google.protobuf.Timestamp last_pos_fill_dttm = 189;
    int32 num_agg_errors = 190;
    string last_agg_error = 191;
    int32 opn_hedge_qty_bot = 192;
    int32 opn_hedge_qty_sld = 193;
    int32 trd_hedge_qty_bot = 194;
    int32 trd_hedge_qty_sld = 195;
    HedgePolicyState pos_hedge_state = 165;
    string pos_hedge_detail = 196;
    float pos_dDBandwidth = 197; // current position ddelta hedge bandwidth
    string pos_hedge_target = 198; // current slice hedge target(s)
    string opn_hedge_order = 199;
    string trd_hedge_order = 200;
    YesNo hedge_waves_enabled = 211;
    HedgePolicy hedge_policy = 212;
    HedgePeriod pos_hedge_period = 216;
    float pos_sym_hedge_band_dD = 217; // individual hedge target hedge band ($delta)
    float pos_sym_hedge_band_gR = 218; // individual hedge target hedge band (gamma ratio)
    YesNo pos_balance_symbols = 219; // balance accnt level deltas from all symbols using this policy
    HedgeSlice pos_hedge_slice = 220;
    HedgeObjective pos_hedge_objective = 221;
    double u_prc = 107; // hedge target price
    double dd_mult = 147;
    double point_value = 150;
    Currency point_currency = 151;
    google.protobuf.Timestamp timestamp = 154;
    YesNo is_prod = 222; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 223; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 224; // WTS synthetic: alert message (null if no alert)
}


