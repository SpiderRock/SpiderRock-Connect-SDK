syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    PaidDividendHistory_Extern contains paid dividend history from the last 10 years.
*/    
message PaidDividendHistory_Extern {
    message PKey {
        
        TickerKey ticker = 10;
    }

    message DateAmt {
        
        DateKey div_date = 103; // ex-dividend date
        float div_value = 104; // dividend value
        string div_currency = 105; // dividend currency
        DivKind div_kind = 106;
        DivSource div_source = 107;
        DivFreq div_freq = 108;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    google.protobuf.Timestamp timestamp = 100; // record update timestamp
    string text = 101; // extra text (if any)
    repeated DateAmt date_amt = 102;
}


