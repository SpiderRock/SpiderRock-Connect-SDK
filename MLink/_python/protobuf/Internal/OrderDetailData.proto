    SpreadClass spread_class = 778; // spread class (eg. Call, Put, RevCon, Box, JRoll, etc.)
    SpreadFlavor spread_flavor = 586; // spread flavor (Normal, Flipped) of this order
    YesNo contains_hedge = 589; // if this order contains a stock/future leg
    YesNo contains_multi_hedge = 766; // contains MultiHedge (corp action adjusted) options
    FlexType flex_type = 816; // all legs are of this flex type (or are a listed look-alike); Other = mixed or unknown set.  Should never be other for trades that originate from an SR app.
    string pkg_neutral_de = 734; // string to display instead of refDe if orderLimitType=PkgNeutral;  pkgNeutralDe = 0.01 * stkLegDir * stkLegSize;  in the EE: limitPrc = orderLimitPrice + pkgNeutralDe * refUPrc if PkgNeutral
    google.protobuf.Timestamp ts = 721; // last update time (Date)
    repeated AuctionAsk auction_ask = 691;
    repeated AuctionBid auction_bid = 661;
    repeated CounterParty counter_party = 454;
    repeated DetailLeg detail_leg = 592;
    repeated Exchanges exchanges = 782;
    repeated SelectedExchanges selected_exchanges = 785;
}


