syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    OrderDetailData messages will be sent (immediately) in response to OrderActionMessage(s) (user initiated actions).
    OrderDetailData message can also be sent in response to SCR triggers while an order is active or otherwise attached to live data (server initiated action(s))
    The initial OrderDetailData message for a given session/ordKey will be complete; all subsequent messages will only contain fields that have changed.
    ticker + expiry fields define which keys to use to align TickerPanel/ExpiryPanel/OptionPanel (if demanded by a change in OrderKey)
    note: if there was an error processing an OrderActionMessage then the actionError/actionErrorDetail fields will be populated.
    orderShape controls which order item (legs) view to use when rendering
    algoType controls which order parameters view and order details view to use when rendering
    orderMode controls which actions (buttons) to make available for the order
    - OrderMode.Preview -> OrderAction.Create or OrderAction.Stage
    - OrderMode.Staged -> OrderAction.Release
    - OrderMode.Active -> OrderAction.Update or OrderAction.Cancel
    - OrderMode.Crossing -> OrderAction.Clone
    - OrderMode.Terminated -> OrderAction.Clone
    note: The OrderEntry.Items (legs) panel is only editable while in OrderMode.Preview (and auction responses can only edit legPosType in Preview mode)
    note: The above generally apply to all algo types (auction or electronic) and all order shapes (single, multi-leg, etc)
    note: The following tool UI actions are also possible:
    - TickerPanelClick (if tradeable) -> Set/Append TickerKey/Stock to OrderEntry.Legs and send OrderAction.Preview + OrderAction.AlgoType + OrderAction.Legs
    - FuturePanelClick (if tradeable) -> Set/Append ExpiryKey/Future ot OrderEntry.Legs and send OrderAction.Preview + OrderAction.AlgoType + OrderAction.Legs
    - OptionPanelClick (if tradeable) -> Set/Append OptionKey/Option ot OrderEntry.Legs and send OrderAction.Preview + OrderAction.AlgoType + OrderAction.Legs
    - OrderCardClick (simple) -> Change OrderPanel subscription to OrderCard.OrderKey (do not send an OrderAction)
    - OrderCardClick (clone) -> Send OrderAction.Clone + OrderAction.TargetKey = OrderID (subscription to new OrderKey will be implicit)
    - AuctionCardClick (already responded) -> Change OrderPanel subscription to AuctionCard.OrderKey (do not send an OrderAction)
    - AuctionCardClick (no current response) -> Send OrderAction.Respond + OrderAction.TargetKey = AuctionID (subscription to new OrderKey will be implicit)
    note: the above clicks/actions may cause the order entry panel to switch to a new OrderKey. If this happens any pending actions/edits can be discarded.
    note: the order in which legs appear in the OrderAction.Legs list is not relevant (the OrderDetail.Legs list will be returned in standard order regardless)
    note: the UI should immediately send actions from clicks as well as 'immediate' edits and expect an immediate response from the server.
    note: all other 'batch' edits should be held on the UI and only sent if/when a sendable click or other 'immediate' edit occurs.
    note: ActionMessages with OrderAction.Cancel should not be sent with any other 'batch' updates.  If there are pending batch updates they should be discarded.
*/    
message OrderDetailData {
    message PKey {
        
        int64 ord_key = 11; // baseParentNumber.X
    }

    message AuctionAsk {
        
        int32 num_rsp = 694; // number of responders
        string mch_prc = 697; // current auction cross price (2 or 4 decimal places); top (large) value
        string mch_size = 700; // current auction size available @ match price
        AcceptState accept_state = 703; // accept state
        string sln_vol = 706; // solution vol (corresponds to solutionPrc @ live uPrc) [SR Vol]
        string sln_prc = 709; // solution price [matchPrc projected into an orderLimitType style price] ('lmt' value; 3 decimal places)
        double sln_prc_dbl = 764; // solution price [matchPrc projected into an orderLimitType style price] (copy to limit box on select)
        YesNo is_mine = 712; // If the client firm of the tool user is included at this auction level, this will be 'Yes'
        string disclosed_firms = 715; // if the tool user is the initiator this will be a list of the disclosed counterparty label participating at this level
        YesNo is_nBBO = 737; // solution matches NBBO at this level
    }

    message AuctionBid {
        
        int32 num_rsp = 664; // number of responders
        string mch_prc = 667; // current auction cross price (2 or 4 decimal places); top (large) value
        string mch_size = 670; // current auction size available @ match price
        AcceptState accept_state = 673; // None=0,Active=1,CanAccept=2,Matched=3,Closed=4
        string sln_vol = 676; // solution vol (corresponds to solutionPrc @ live uPrc) [SR Vol] (alt large font)
        string sln_prc = 679; // solution price [matchPrc projected into an orderLimitType style price] (large font; 3 decimal places)
        double sln_prc_dbl = 763; // solution price [matchPrc projected into an orderLimitType style price] (copy to limit box on select)
        YesNo is_mine = 682; // If the client firm of the tool user is included at this auction level, this will be 'Yes'
        string disclosed_firms = 685; // if the tool user is the initiator this will be a list of the disclosed counterparty label participating at this level
        YesNo is_nBBO = 736; // solution matches NBBO at this level
    }

    message CounterParty {
        
        string client_firm = 457; // client firm identifier
        string client_firm_name = 460; // SR assigned client firm Name
        string client_firm_short_code = 463; // client firm short code (for short form display)
        InclExclDisclose incl_excl = 466;
        YesNo is_comm_party = 469;
    }

    message DetailLeg {
        
        string leg_desc = 595; // leg description
        OptionKey leg_sec_key = 598; // Leg security key
        ExpiryKey leg_fut_sec_key = 837; // Leg security key Futures
        SpdrKeyType leg_sec_type = 601; // leg security type
        FlexType leg_flex_type = 817; // FLEX: leg flex type (might be Listed)
        StrikeType leg_strike_type = 770; // FLEX: BlockPOC/PCV: Percent = PctOfClose, PctVariable = PctOfClose (response strike)
        BuySell leg_side = 604; // leg side (Buy/Sell)
        int32 leg_size = 607; // leg size
        int32 leg_ratio = 610; // Used for mutli leg orders
        ToolPositionType leg_pos_type = 613; // leg position type
        string leg_bid = 616; // leg bid price
        string leg_ask = 619; // leg ask price
        string leg_bid_sz = 622; // leg bid size
        string leg_ask_sz = 625; // leg ask size
        string leg_fair_px = 628; // leg fair price
        string leg_fair_vol = 735; // leg fair volatility (option only)
        string leg_bid_vol = 818; // leg bid vol (option only)
        string leg_ask_vol = 819; // leg ask vol (option only)
        string leg_bid_vega = 838; // leg bid vega (option only)
        string leg_ask_vega = 839; // leg ask vega (option only)
        string leg_bid_prob = 840; // leg bid probability (option only)
        string leg_ask_prob = 841; // leg ask probability (option only)
        string leg_de = 634; // leg delta (option only) [ref delta if DAC]
        string leg_ve = 637; // leg vega (option only)
        string leg_ga = 757; // leg gamma (option only)
        string leg_qty = 640; // total leg quantity (share or contracts)
        string leg_open = 643; // total leg leaves quantity (shares or contracts)
        string leg_avg_px = 646; // leg average price
        string leg_fill_qty = 649; // leg fill quantity
        string leg_fill_vega = 652; // leg fill vega
        string leg_fill_delta = 653; // leg fill delta
        string leg_child_str = 655; // mleg/legger orders only
        double leg_cmpl_avg_px_num = 820; // average leg completion price
        string leg_cmpl_avg_px = 851; // average leg completion price as a formatted string for display
        double leg_fill_uRef_num = 852; // fillURef as a double. Corresponds to pExecution.fillLimitRefUPrc
        string leg_fill_uRef = 853; // formatted value of fillURef for display purposes.
        OptionKey leg_cmpl_sec_key = 821; // final settlement secKey (contract that DAC, TAS, TACO, etc. will convert to; might not be valid until completed)
        SpdrKeyType leg_cmpl_sec_type = 822; // usually Future or Option (None if not yet valid)
        string leg_error = 658; // leg error string (if any)
        string leg_fut_display_symbol = 850; // Future display symbol (future only)
    }

    message Exchanges {
        
        TickerSrc exch = 783;
    }

    message SelectedExchanges {
        
        TickerSrc selected_exchange = 786; // selected exchange for Europe options
    }


