syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridAvailableStockLocates {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    TickerKey ticker = 100;
    string client_firm = 101;
    string locate_firm = 102;
    string locate_pool = 103; // locate pool @ firm granting the locate
    DateKey trade_date = 104;
    int32 locate_quan = 105; // locate quantity sourced
    int32 locate_quan_used = 106; // shares sold short against this locate
    int32 available_locate_quan = 107; // locate balance currently available
    string engine_name = 108; // SR server code
    google.protobuf.Timestamp timestamp = 109;
    YesNo is_prod = 110; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 111; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 112; // WTS synthetic: alert message (null if no alert)
}


