syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 1
    Inputs: OptionPrintETL
    CalcEngine: Spark/ETL
*/    
message OptionAtmMinuteBarETL {
    message PKey {
        
        ExpiryKey ekey = 10;
        DateKey trade_date = 11;
        string trade_time = 12;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 minute = 100; // minute since 2000-01-01
    TickerKey ticker = 103;
    float u_prc = 106; // Underlying price
    float years = 109; // Years to expiry
    float rate = 112; // Interest rate
    float sdiv = 115; // Continuous stock dividend
    float ddiv = 118; // Discrete stock dividend value
    float u_prc_fwd = 121; // estimated forward uPrc (Equity) or implied forward uPrc (Future)
    float ivol = 124; // atm ivol (atm: strike = fUPrc)
    float ivxx = 127; // fixed strike ivol (ivol @ refStrike)
    float iv_cen = 130; // atm ivol (atm: strike = fUPrc) [eMove/earnings censored]
    float slope = 133; // dVol / dXAxis
    float v_width = 136; // implied volatility width (best market)
    float ref_strike = 139; // reference strike (usually prior day closing uPrcFwd)
    float ivol_hi = 142; // Implied Volatility high value (during bar)
    float ivol_lo = 145; // Implied Volatility low value (during bar)
    float ivxx_hi = 148; // Implied Volatility of Previous Day's ATM strike, high value (during bar)
    float ivxx_lo = 151; // Implied Volatility of Previous Day's ATM strike, low value (during bar)
    float iv_cen_hi = 154; // Censored implied volatility high value (during bar)
    float iv_cen_lo = 157; // Censored implied volatility low value (during bar)
    float sdiv_hi = 160; // Continuous carry rate, high value (during bar)
    float sdiv_lo = 163; // Continuous carry rate, low value (during bar)
    float u_prc_off_hi = 166; // Underlying price offset value, high value (during bar)
    float u_prc_off_lo = 169; // Underlying price offset value, low value (during bar)
    float slope_hi = 172; // Slope high value (during bar).  The difference between the put and call at 1/2 standard deviation from the ATM point.
    float slope_lo = 175; // Slope low value (during bar).  The difference between the put and call at 1/2 standard deviation from the ATM point.
    float var_swap_fV = 178; // variance swap fair value (estimated by numerical integration over OTM price surface)
    google.protobuf.Timestamp timestamp = 181;
}


