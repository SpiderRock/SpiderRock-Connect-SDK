syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    V7 Message Name: SpdrOptTheoRecord
    V8 Message Name: SpdrOptTheoRecord
    Bridging pattern:  [V8 --> V7] [V7 --> V8]
    BridgeFromV8:SpdrOptTheoRecord
*/    
message SpdrOptTheoRecord_V7 {
    message PKey {
        
        OptionKey okey = 5000; // v7 & v8
        string theo_model = 5001; // v7 & v8
        string client_firm = 5002; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=ClientFirmString,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirm] --- Original comment: client firm this theo model is associated with (controls visibility)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    float theo_vol = 5003; // v7 & v8 --- Original comment: mid-point (fair) volatility
    float bVol = 5004; // v7 & v8 --- Original comment: buy vol
    float sVol = 5005; // v7 & v8 --- Original comment: sell vol
    float bEdge = 5006; // v7 & v8 --- Original comment: edge premium spread when buying
    float sEdge = 5007; // v7 & v8 --- Original comment: edge premium spread when selling
    BuySellConvention buy_sell_convention = 5008; // v7 & v8 --- Original comment: rule used to interpret BVol, SVol, BEdge, and SEdge
    float ref_uPrc = 5009; // v7 & v8 --- Original comment: Reference uPrc for dynamic vol: vol = TheoVol + vegaSlope * (uPrc - refUPrc).
    float vega_slope = 5010; // v7 & v8 --- Original comment: Set to zero for no dynamic.  hedge delta = delta + vegaSlope * vega;requires account.hedgeType = [TVol (theo delta + vegaSlope) or TvS (surface delta + vegaSlope)] (default is surface delta only)
    TheoStatus theo_status = 5011; // v7 & v8 --- Original comment: indicates where theos for this ticker will be utilized
    google.protobuf.Timestamp timestamp = 5012; // v7 & v8
}


