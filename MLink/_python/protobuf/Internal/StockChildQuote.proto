syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message StockChildQuote {
    message PKey {
        
        TickerKey ticker = 10;
        string engine_name = 15;
        YesNo is_test_accnt = 12;
        SysEnvironment sys_environment = 13; // original (source) sys environment [Stable, Current, etc]
        RunStatus run_status = 14; // original (source) run status [Prod,Beta]
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    double bid_price = 100; // bid price
    double ask_price = 103; // ask price
    int32 bid_size = 106; // bid size in contracts
    int32 ask_size = 109; // ask size in contracts
    google.protobuf.Timestamp timestamp = 112; // quote update
}


