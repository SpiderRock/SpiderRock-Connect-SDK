syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


    
message CellGrid_TradeSheetRange {
    message ExpiryCells {
        
        string e_key = 109;
        int32 v_atm = 118; // atm index for this expiry
    }


    MessageMetadata _meta = 1;
    
    string accnt = 115; // (Optional) Account for associated positions
    string client_firm = 116;
    TickerKey ticker = 117; // primary ticker
    int32 v_max = 103; // total number of of unique strikes (all expiries combined)
    string h_set = 119; // hIndex,hIndex,hIndex, ...
    int32 v_st = 106; // vertical viewport: [vSt,vEn]
    int32 v_en = 120;
    repeated ExpiryCells expiry_cells = 108;
}


