syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


    
message SpdrParentOrderAggregation {
    message PKey {
        
        string omni_accnt = 14;
        OptionKey sec_key = 11;
        BuySell order_side = 12;
        string client_firm = 13;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 number_of_orders = 100;
    int32 total_order_size = 103;
}


