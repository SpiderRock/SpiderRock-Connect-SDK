syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LocateGatewayConfig {
    message PKey {
        
        string core_client_firm = 10; // SR assigned client firm acronym
        string locate_firm = 11; // acronym of firm used for locate requests (if any)
        string locate_pool = 12; // locate pool @ locate firm
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string gateway_uRI = 100;
    string locate_user_id = 103;
    string locate_password = 106;
    YesNo can_have_away_locates = 109;
    string modified_by = 112; // user who last modified this record
    SysEnvironment modified_in = 115;
    google.protobuf.Timestamp timestamp = 118; // timestamp of last modification
}


