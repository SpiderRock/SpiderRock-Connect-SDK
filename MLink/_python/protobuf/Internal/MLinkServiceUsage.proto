syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message MLinkServiceUsage {


    MessageMetadata _meta = 1;
    
    int64 usage_block_iD = 100;
    string mlink_server = 103; // mlink server accessed
    HttpServiceType mlink_server_type = 106;
    string user_name = 109; // authenticated user name
    string client_firm = 112; // clientFirm associated with user name
    google.protobuf.Timestamp block_dttm = 115; // reporting time block (typically a 15 minute time block)
    int32 num_http_rest_connects = 118;
    int32 num_web_socket_connects = 121;
    int32 num_query = 124; // number of MLinkStream requests
    int32 num_subscribe = 127; // number of MLinkSubscribe requests
    int32 num_active_scans = 130; // number of active message scan operations (ActiveLatency, SignalReady, or RestCmd)
    int32 num_signal_ready = 133;
    int64 num_skipped_nM = 136;
    int64 num_skipped_mT = 139;
    int64 num_skipped_cF = 142;
    int64 num_skipped_sT = 145;
    int64 num_skipped_rK = 148;
    int64 num_skipped_rF = 151;
    int64 num_skipped_pT = 154;
    int64 num_skipped_mD = 157;
    int64 num_filtered_aC = 160;
    int64 num_filtered_uN = 163;
    int64 num_filtered_sK = 166;
    int64 num_filtered_eK = 169;
    int64 num_filtered_oK = 172;
    int64 num_filtered_cF = 175;
    int64 num_filtered_pK = 178;
    int64 num_filtered_mC = 181;
    int64 num_filtered_cC = 184;
    int64 num_msgs_sent = 187; // number of messages sent to client in the reporting time block
    int64 num_msgs_scanned = 190; // number of messages scanned
    int64 num_msgs_rcvd = 193;
    double connect_seconds = 196; // number of clock seconds with an active TCP/HTTP connection
    double user_seconds = 199; // number of cpu seconds actively processing requests (time processing requests and scanning records)
    double send_seconds = 202; // number of seconds spent actively attempting to send to client (time encoding, blocking, and sending)
    int64 max_ring_gap = 205;
    double min_ring_delay = 208;
    double max_ring_delay = 211;
    double avg_ring_delay = 214;
    int64 num_forwarded = 217;
}


