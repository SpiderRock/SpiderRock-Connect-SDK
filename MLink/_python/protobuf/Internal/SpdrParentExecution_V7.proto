    string exec_broker_cl_firm = 5043; // v7 & v8: Field Name Change: V7=[execBrokerClFirm], V8=[execBrkrClFirm] --- Original comment: client/firm at executing broker (if any)
    string exec_username = 5044; // v7 & v8: Field Name Change: V7=[execUsername], V8=[execBrkrUserName] --- Original comment: userName at execution broker (if any)
    FlipType clearing_flip_type = 5045; // v7 & v8 --- Original comment: Clearing Flip Type (None, ExecBroker, CMTA, Giveup, DTCC, QSR, etc)
    string clearing_flip_firm = 5046; // v7 & v8 --- Original comment: Clearing Flip Firm (if any)
    string clearing_flip_accnt = 5047; // v7 & v8: String Length Diff: V7=[string,Length=16,Alias=NA,MetaType=NA], V8=[string,Length=10,Alias=NA,MetaType=NA] --- Original comment: Clearing Flip Account (if any)
    string clearing_firm = 5048; // v7 & v8 --- Original comment: clearing firm
    string clearing_accnt = 5049; // v7 & v8 --- Original comment: clearing firm account (if any)
    string orig_exec_iD = 5050; // v7 & v8 --- Original comment: original execution ID string (child order)
    string last_exec_iD = 5051; // v7 & v8 --- Original comment: most recent execution ID (same as origExecID unless CANCEL/CORRECTION has been processed)
