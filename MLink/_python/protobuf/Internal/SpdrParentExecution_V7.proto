    TickerKey ticker = 5031; // v7 & v8 --- Original comment: base stock key (used for symbol risk aggregation)
    string accnt = 5032; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=SRAccountString,MetaType=NA], V8=[string,Length=16,Alias=SRAccountString,MetaType=SRAccount] --- Original comment: SpiderRock trading accnt [broker pkey]
    string client_firm = 5033; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=ClientFirmString,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirm] --- Original comment: SR client firm
