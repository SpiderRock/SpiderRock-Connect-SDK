    double child_limit_ref_uPrc = 5083; // v7 & v8 --- Original comment: limit reference underlier price @ child order send time
    double child_limit_prc = 5084; // v7 & v8 --- Original comment: parent order limit price @ child order send time
    float child_vol_atm = 5085; // v7 & v8 --- Original comment: atm volatility @ child order send time
