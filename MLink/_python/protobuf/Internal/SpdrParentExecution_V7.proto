    string street_order_id = 5025; // v7 & v8 --- Original comment: street side orderId (orderId or equivalent of the street side order) [from street side execReport]
    FaceSide face_side = 5026; // ONLY V7: [enum,Name=FaceSide,Values=Cust=0,Face=1] --- Original comment: facilitation side (if any)
    FaceShape face_shape = 5027; // ONLY V7: [enum,Name=FaceShape,Values=None=0,CrossCust=1,CrossFace=2,CrossBoth=3] --- Original comment: CrossCust = split broker / cust side, CrossFace = split broker / face side, CrossBoth = single broker cross
