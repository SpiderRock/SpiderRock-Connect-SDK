    double child_uAsk = 5077; // v7 & v8 --- Original comment: underlier market ask at @ child order send time
    double child_bid = 5078; // v7 & v8 --- Original comment: market bid at the @ child order send time
    double child_ask = 5079; // v7 & v8 --- Original comment: market ask at the @ child order send time
    double child_mark = 5080; // v7 & v8 --- Original comment: mid-market (SR surface price if option) @ child order send time
    float child_vol = 5081; // v7 & v8 --- Original comment: child order volatility @ childLimitRefUPrc
