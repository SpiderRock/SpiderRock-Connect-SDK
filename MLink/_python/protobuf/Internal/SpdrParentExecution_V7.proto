syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    V7 Message Name: SpdrParentExecution
    V8 Message Name: SpdrParentExecution
    Bridging pattern:  [V8 --> V7] [V7 --> V8]
    BridgeFromV8:SpdrParentExecution
*/    
message SpdrParentExecution_V7 {
    message PKey {
        
        int64 fill_number = 5000; // v7 & v8 --- Original comment: SpiderRock execution number (globally unique over trailing 10 days)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 version = 5001; // v7 & v8 --- Original comment: record version number;starts at zero and goes up every time an execution record is re-published (eg, bust, +1m marks, +10m marks, etc)
