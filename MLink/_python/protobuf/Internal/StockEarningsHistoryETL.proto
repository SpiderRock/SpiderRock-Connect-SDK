syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 0
    Inputs: Wild Files
    CalcEngine: Spark/ETL
*/    
message StockEarningsHistoryETL {
    message PKey {
        
        TickerKey ticker = 10;
        DateKey earnings_date = 11; // earnings announcement date
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    IntervalType interval_type = 100;
    DateKey interval_date = 103; // starting date of the earnings reporting period
    EarnTime earn_time = 106; // time of day earnings was announced
    google.protobuf.Timestamp timestamp = 109;
}


