syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    SodOverrideV5 SR start-of-day position and mark
    These records are computed and published by SR rotation servers.
*/    
message SodOverrideV5 {
    message PKey {
        
        string accnt = 10;
        OptionKey sec_key = 11;
        SpdrKeyType sec_type = 12;
        DateKey trade_date = 13;
        SodOverrideSrc override_src = 14; // system = generated by RotationServer for corp action adjustment; user = manual user intervention; user trumps everything
        string client_firm = 15; // SR assigned client firm
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    SodOverrideFlag override_flag = 100;
    TickerKey src_ticker = 101; // key from original position
    int32 sr_position = 102; // SR position * corp action ratio
    double sr_mark = 103; // SR mark from corp action
    int32 clr_position = 104; // CLR position * corp action ratio
    double clr_mark = 105; // CLR mark from corp action
    string comment = 106; // source description (if any)
    google.protobuf.Timestamp timestamp = 107;
}


