syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    edge-to-user
    sent in response to a login; also sent on any change
*/    
message EdgeAvailRoute {
    message PKey {
        
        string accnt = 10; // SR assigned accnt code
        string cfirm = 11; // SR assigned client firm acronym
        string exec_brkr_code = 12; // SR execBrkrCode (SR Assigned)
        EdgeExDest edge_ex_dest = 13; // SR assigned ex-dest code
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    YesNo enabled = 100;
    FlipType clr_flip_type = 103; // type of clearing corp delivery
    string clr_flip_firm = 106; // deliverTo clearing member (eg. OCC#, NSCC#, MPID, or InstitutionID)
    string clr_flip_accnt = 109; // deliverTo client account (eg. OCC AID# or a DVP FBO code)
    string clr_brkr_mPID = 112; // clearing broker (equity clearing only)
    google.protobuf.Timestamp timestamp = 115;
}


