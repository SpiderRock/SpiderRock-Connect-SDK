syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 2
    Inputs: OptExpiryPriceETL, OptCallPutPriceETL
    CalcEngine: LiveRateRunner
*/    
message RateCurveETL {
    message PKey {
        
        TickerKey rate_key = 10; // liveRateKey; usually "$RATE-TickerSrc-AssetType" (eg. $RATE-NMS-RATE)
        DateKey trade_date = 11;
        string trade_time = 12;
    }

    message Point {
        
        DateKey expiry = 103; // option expiry
        int32 days = 106; // days to expiry
        float rate = 109; // average rate
        int32 s_days_t = 112; // settlement days (today)
        int32 s_days_e = 115; // settlement days (expiry)
        float lo_rate = 118; // implied rate (lo bound) [most recent fit pass]
        float hi_rate = 121; // implied rate (hi bound) [most recent fit pass]
        int32 n_points = 124; // number of bid/ask box spreads used for this expiry (if any)
        int32 counter = 127; // number of samples (this trading date)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    google.protobuf.Timestamp timestamp = 130;
    repeated Point point = 100;
}


