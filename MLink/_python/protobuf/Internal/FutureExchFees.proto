syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message FutureExchFees {
    message PKey {
        
        TickerKey ticker = 10; // "*" = All Tickers
        string fut_exch = 11;
        FutCustClass cust_class = 12;
        string client_firm = 13; // "*" = Default
        string exec_brkr_code = 14; // "*" = Default
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    YesNo is_enabled = 119;
    float fut_make_fee = 100; // base (lowest tier) make fee for the exchange/cust class
    float fut_take_fee = 103;
    float opt_make_fee = 106; // base (lowest tier) make fee for the exchange/cust class
    float opt_take_fee = 109;
    float venue_adj_fee = 120; // additional routing metric fee (baseFee + venuAdjFee affects routing decisions; venueAdjFee not paid or collected)
    string modified_by = 112;
    SysEnvironment modified_in = 115;
    google.protobuf.Timestamp timestamp = 118;
}


