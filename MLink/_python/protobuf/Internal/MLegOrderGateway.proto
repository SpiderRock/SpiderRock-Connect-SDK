syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Records inserted, updated, or replaced into the MLegOrderGateway table are validated and then converted to SpdrParentOrder records and forwarded to the appropriate execution engine for futher processing.  Parent orders can be inserted as either active/ready or in a wait start mode that requires subsequent release.
    See the SpiderRock Execution Engine concept guide for more details.
*/    
message MLegOrderGateway {
    message PKey {
        
        TickerKey ticker = 10;
        string accnt = 11; // Will automatically be set to the account associated with DB login
        int64 grouping_code = 12; // Client supplied order
        BuySell order_side = 13;
        string client_firm = 14;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    SpdrActionType spdr_action_type = 103; // [Add (new order), AddReplace (add or replace order), Cancel (cxl existing), Replace (update existing only), Release (modify order active size)]
    string alt_order_id = 106; // Alternate client order ID.  This order ID will be copied to all execution reports.
    string alt_auto_hedge_id = 109; // alternate order ID for child autohedge orders (if any)
    string alt_accnt = 112; // alternate (client assigned) "long" account string (optional) [used to map between client and SR account strings]
    string alt_user_name = 115; // alternate (client assigned) user name (optional) [used to map between client and SR account strings]
    string exec_brkr_code = 607; // (optional) override the default execBrkrCode for this order
    string strategy = 121; // Client strategy string.  This value will appear on the SR Trade Monitor and in execution reports.
    string strategy_accnt = 610; // SR strategy account (option; if exists will be validated)
    YesNo visible_in_sV = 612; // allow order to be visible in SV (do not use for high volume of orders)
    google.protobuf.Timestamp order_dttm = 127; // order entry time (from client;if any)
    int32 order_size = 130; // parent order size (contracts) [-1 = no change;used when spdrActionType=Release]
    int32 order_active_size = 133; // total activated size (total size released for execution) (-1 = all available size)
    YesNo add_cum_fill_quantity = 136; // If Yes then OrderSize is calculated @ order arrival as requested OrderSize + existing 'CumFillQuantity'.
    int64 exch_mask = 613; // eligible exchanges (0 = all)
    int32 max_exposure_size = 142; // maximum simultaneous cumulative child order public size exposure (-1 = orderActiveSize) [order can overfill if > orderActiveSize and numMakeExchanges > 1]
    int32 num_make_exchanges = 145; // number of exchanges (1 - 4) on which to publish public making orders.  Effective number might be less than requested number if sufficient exchanges are not available.
    PublicSizeHandling public_size = 148; // public order size handling: None=use default size handling (usually limits public size to 'typical' market size); Randomize=randomize public size; MktSize=expose only 'typical' market size; FullSize=expose entire order size where possible
    YesNo randomize_size = 151; // randomize public order size
    YesNo can_overlap_cxl_repl = 154; // can execution engines overlap cancel/replace operations [order can overfill if YES] (at most one active overlapping cxl/replace operation for each parent order)
    ProgressRule progress_rule = 157; // None = all size immediately available;TWAP = size released in time intervals;VWAP = size released in volume intervals;
    int32 twap_slice_cnt = 160; // [ProgressSliceCnt] number of progress slices to use (default = 4 or 8) [max 20]
    int32 progress_expose_time = 163; // minimum time (secs) to expose order (0 = no minimum; used to guarantee that the order is exposed at mid-market for some time before actively taking)
    AuctionResponder auction_responder = 166; // if set, parent order can be an auction responder
    AtsVisibility ats_visibility = 618; // for BlockAuction orders, visibility (to responders) is neither, side only, or side + price
    InclExclDisclose include_sRNetwork = 615;
    int64 notice_number = 616; // required when parentOrderHandling = AtsResponse | AuctionResponse
    BuySell resp_side = 617;
    AutoHedge auto_hedge = 169;
    HedgeInst hedge_instrument = 172; // Default=underlier (EQT or FUT) [Index Options use ETF]; FrontMonth=underlier (EQT) or front month (FUT) [Index Options use FM Fut]; Stock=hedgeSecKey; Future=hedgeSecKey
    ExpiryKey hedge_sec_key = 175; // auto-hedge instrument (either TickerKey or ExpiryKey)
    float hedge_beta_ratio = 178; // Portion of executed $money to auto-hedge (can be 1.0 / Beta for beta hedging) [-4.0 to +4.0]
    HedgeScope hedge_scope = 181; // Auto-hedge at the RiskGroup or Accnt level
    MarketSession hedge_session = 596;
    YesNo hedge_fill_uMark_lmt_prc = 611; // set a price limit on the autohedge order based on the most recent option fillUMark
    UPrcCxl cxl_uPrc_range = 187; // cancel parent order if/when outside min/max uPrc range [_Halt = also cancel if the security/underlier has been halted]
    float min_uBid = 190; // [optional]
    float max_uAsk = 193; // [optional] (< $0.01 = none)
    MinMaxType min_max_type = 196; // if Prc minUBid/maxUAsk are expressed as prices; if Pct then they are expresses as pct change since parent order arrival
    int32 max_child_orders = 199; // maximum number of child orders that can be generated by this parent order [order will terminate if/when this cap is reached;zero or neg = unlimited]
    SpdrStageType spdr_stage_type = 202; // SizeLock = stage pending modification (can reduce size); SizeModify = stage pending modification (can increase/reduce size)
    MarketSession market_session = 597;
    google.protobuf.Timestamp start_dttm = 208; // [optional] (parent order start time)
    int32 order_duration = 211; // [optional] (number of seconds)
    int32 active_duration = 598;
    google.protobuf.Timestamp good_till_dttm = 214; // [optional] (default: 2000-01-01)
    StartType start_type = 217; // [WaitTrigger]
    ParentOrderHandling parent_order_handling = 223;
    ParentBalanceHandling parent_balance_handling = 226;
    SpdrLimitType order_limit_type = 229; // Various (Prc, PrcDe, Rel, Market);establishes the primary LimitPrice for a parent order
    SpdrLimitClass take_limit_class = 232; // Simple = LimitPrice, Surface = BEST(LimitPrice, SurfLimit), Probability = BEST(LimitPrice, ProbLimit)
    SpdrLimitClass make_limit_class = 235; // Simple = LimitPrice, Surface = BEST(LimitPrice, SurfLimit), Probability = BEST(LimitPrice, ProbLimit)
    ReachRule take_reach_rule = 238; // None = reach room immediately available; Delayed = available after [1-3] seconds; Passive = available if contra side aggresses; WeakOnly = only take if available size < avgMarketSize; ISOSweep = Intermarket Sweep [requires WaitTrigger]
    BuySell lead_side = 241; // for legged orders, which side to lead with.  (optional, None ok)
    double max_completion_slippage = 244; // Maximum price slippage to complete an open basket or a cross auction (face side slippage)
    double order_prc_limit = 247; // Applies if LimitType = Prc[]
    double take_surf_prc_offset = 250; // default=0
    float take_surf_vol_offset = 253; // default=0
    double order_prc_offset = 256; // default=0
    AlphaType take_alpha_type = 259; // Applies if takeLimitClass = Probability
    AlphaType make_alpha_type = 262; // Applies if makeLimitClass = Probability
    float take_alpha_factor = 265; // [-2,+2] takeProbLimit = MAX(takeProbability, takeProbAvg + takeAlphaFactor * takeProbStd) [if takeAlphaType = Relative]
    float make_alpha_factor = 268; // [-2,+2] makeProbLimit = MAX(makeProbability, makeProbAvg + makeAlphaFactor * makeProbStd) [if takeAlphaType = Relative]
    float take_probability = 271; // takeProbLimit = takeProbability [if takeAlphaType = Static]
    float make_probability = 274; // makeProbLimit = makeProbability [if makeAlphaType = Static]
    FirmType firm_type = 277; // Used to override firmType in account config. Default: None (use SpiderRock account configuration).
    BuySell stock_side = 280; // Stock Orde Side (if any).
    ShortSaleFlag ssale_flag = 283; // Used to determine stock auto-hedge flags.
    string locate_firm = 608; // firm granting the locate if using an away locate source for this order
    string locate_pool = 609; // locate pool @ firm granting the locate
    int32 stock_shares = 286; // Number of shares in spread package.  Default: 0 (none).
    string alt_stk_leg_iD = 289; // Optional stock leg ID.
    int32 num_option_legs = 292; // The number of valid legs below.  The first leg is required and the rest are optional.  For each optional leg `okey_` and `mult_` must be valid values whereas `side_`, `positionType_`, and `legID_` will be assigned default values.
    Multihedge multihedge = 295;
    OptionType option_type = 298;
    int32 underliers_per_cn = 301; // Default: 100.
    OptionKey okey1 = 304; // Option symbol for leg #1.  Must be a valid option symbol.
    uint32 mult1 = 307; // Multiplier for leg #1.  Must be greater than zero.
    BuySell side1 = 310; // Order side for leg #1.
    PositionType position_type1 = 313; // Position type for leg #1.
    string alt_leg_iD1 = 316; // ID for leg #1.  If left blank will be assigned an auto-generated ID.
    OptionKey okey2 = 319; // Option symbol for leg #2.  Must be a valid option symbol.
    uint32 mult2 = 322; // Multiplier for leg #2.  Must be greater than zero.
    BuySell side2 = 325; // Order side for leg #2.
    PositionType position_type2 = 328; // Position type for leg #2.
    string alt_leg_iD2 = 331; // ID for leg #2.  If left blank will be assigned an auto-generated ID.
    OptionKey okey3 = 334; // Option symbol for leg #3.  Must be a valid option symbol.
    uint32 mult3 = 337; // Multiplier for leg #3.  Must be greater than zero.
    BuySell side3 = 340; // Order side for leg #3.
    PositionType position_type3 = 343; // Position type for leg #3.
    string alt_leg_iD3 = 346; // ID for leg #3.  If left blank will be assigned an auto-generated ID.
    OptionKey okey4 = 349; // Option symbol for leg #4.  Must be a valid option symbol.
    uint32 mult4 = 352; // Multiplier for leg #4.  Must be greater than zero.
    BuySell side4 = 355; // Order side for leg #4.
    PositionType position_type4 = 358; // Position type for leg #4.
    string alt_leg_iD4 = 361; // ID for leg #4.  If left blank will be assigned an auto-generated ID.
    OptionKey okey5 = 364; // Option symbol for leg #5.  Must be a valid option symbol.
    uint32 mult5 = 367; // Multiplier for leg #5.  Must be greater than zero.
    BuySell side5 = 370; // Order side for leg #5.
    PositionType position_type5 = 373; // Position type for leg #5.
    string alt_leg_iD5 = 376; // ID for leg #5.  If left blank will be assigned an auto-generated ID.
    OptionKey okey6 = 379; // Option symbol for leg #6.  Must be a valid option symbol.
    uint32 mult6 = 382; // Multiplier for leg #6.  Must be greater than zero.
    BuySell side6 = 385; // Order side for leg #6.
    PositionType position_type6 = 388; // Position type for leg #6.
    string alt_leg_iD6 = 391; // ID for leg #6.  If left blank will be assigned an auto-generated ID.
    float opt_premium = 394; // The premium for the option legs, a contribution to the order premium.  Valid range is  [-9999.0, 9999.0].  Default: 0.
    float order_ref_uPrc = 397; // The stock reference price, a contribution to the order premium.  Default: 0.
    int64 risk_group_id = 400; // Default: 0 (none).  Required to be non-zero if `autoHedge` is something other than None.
    YesNo req_aux_risk_group_ctrl = 599;
    RMetricSource ref_rMetric1_src = 403;
    RMetricSource ref_rMetric2_src = 406;
    RMetricSource ref_rMetric3_src = 409;
    RMetricSource ref_rMetric4_src = 412;
    RMetricSource ref_rMetric5_src = 415;
    RMetricSource ref_rMetric6_src = 600;
    RMetricSource ref_rMetric7_src = 418;
    float order_ref_rMetric1 = 421; // user supplied RMetric1 value (used in RiskGroupID risk controls) [netRMetric1 = sum(fillQty * orderRefRMetric1 * underlierPerCn)]
    float order_ref_rMetric2 = 424; // user supplied RMetric2 value (used in RiskGroupID risk controls) [netRMetric2 = sum(fillQty * orderRefRMetric2 * underlierPerCn)]
    float order_ref_rMetric3 = 427; // user supplied RMetric3 value (used in RiskGroupID risk controls) [netRMetric3 = sum(fillQty * orderRefRMetric3 * underlierPerCn)]
    float order_ref_rMetric4 = 430; // user supplied RMetric4 value (used in RiskGroupID risk controls) [netRMetric4 = sum(fillQty * orderRefRMetric4 * underlierPerCn)]
    float order_ref_rMetric5 = 433; // user supplied RMetric5 value (used in RiskGroupID risk controls) [netRMetric5 = sum(fillQty * orderRefRMetric5 * underlierPerCn)]
    float order_ref_rMetric6 = 601; // user supplied RMetric6 value (used in ExpDay risk controls) [netRMetric6 = sum(fillQty * orderRefRMetric6 * underlierPerCn)]
    float order_ref_rMetric7 = 436; // user supplied RMetric7 value (used in SymDay risk controls) [netRMetric7 = sum(fillQty * orderRefRMetric7 * underlierPerCn)]
    float exp_day_wt_vega_offset = 602; // max acct+symbol day wtVega offset (target)
    float max_exp_day_wt_vega_ln = 603; // max accnt+expiration day (time weighted) vega long (positive number;-1=no limit);risk limit = max limit - (current net counter - offset)
    float max_exp_day_wt_vega_sh = 604; // max accnt+expiration day (time weighted) vega short (positive number;-1=no limit);risk limit = max limit + (current net counter - offset)
    float max_exp_day_rMetric6_ln = 605; // max acct+expiration day rMetric6 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_exp_day_rMetric6_sh = 606; // max acct+expiration day rMetric6 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float sym_day_dDelta_offset = 481; // max acct+symbol day $delta offset (target)
    float max_sym_day_dDelta_ln = 475; // max acct+symbol day $delta long (positive number;-1=no limit);risk limit = max limit - (current net counter - offset)
    float max_sym_day_dDelta_sh = 478; // max acct+symbol day $delta short (positive number;-1=no limit);risk limit = max limit + (current net counter - offset)
    float sym_day_vega_offset = 463; // max acct+symbol day vega offset (target)
    float max_sym_day_vega_ln = 457; // max acct+symbol day vega long (positive number;-1=no limit);risk limit = max limit - (current net counter - offset)
    float max_sym_day_vega_sh = 460; // max acct+symbol day vega short (positive number;-1=no limit);risk limit = max limit + (current net counter - offset)
    float sym_day_wt_vega_offset = 472; // max acct+symbol day wtVega offset (target)
    float max_sym_day_wt_vega_ln = 466; // max acct+symbol day (time weighted) vega long (positive number;-1=no limit);risk limit = max limit - (current net counter - offset)
    float max_sym_day_wt_vega_sh = 469; // max acct+symbol day (time weighted) vega short (positive number;-1=no limit);risk limit = max limit + (current net counter - offset)
    float max_sym_day_rMetric7_ln = 484; // max acct+symbol day rMetric7 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_sym_day_rMetric7_sh = 487; // max acct+symbol day rMetric7 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_dDelta_ln = 493; // max acct+riskGroup day $delta long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_dDelta_sh = 496; // max acct+riskGroup day $delta short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_vega_ln = 502; // max acct+riskGroup day vega long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_vega_sh = 505; // max acct+riskGroup day vega short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_vega_abs = 508; // max acct+riskGroup day vega abs (positive number;-1=no limit);risk limit = max limit - abs(current net counter)
    float grp_day_vega_ratio = 511; // target bot / sld ratio (eg ratio=2.0 means that neutral is bot vega = 2x sld vega)
    int32 max_grp_day_contracts_ln = 562; // max acct+riskGroup day opt contracts long (positive number;-1=no limit);risk limit = max limit - current net counter
    int32 max_grp_day_contracts_sh = 565; // max acct+riskGroup day opt contracts short (positive number;-1=no limit);risk limit = max limit + current net counter
    int32 max_grp_day_contracts_abs = 568; // max acct+riskGroup day opt contracts abs (positive number;-1=no limit);risk limit = max limit - abs(current net counter)
    int32 max_grp_day_fut_contracts_ln = 619; // max acct+riskGroup day fut contracts long (positive number;-1=no limit);risk limit = max limit - current net counter
    int32 max_grp_day_fut_contracts_sh = 620; // max acct+riskGroup day fut contracts short (positive number;-1=no limit);risk limit = max limit + current net counter
    int32 max_grp_day_fut_contracts_abs = 621; // max acct+riskGroup day fut contracts abs (positive number;-1=no limit);risk limit = max limit - abs(current net counter)
    float max_grp_day_rMetric1_ln = 526; // max acct+riskGroup day rMetric1 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric1_sh = 529; // max acct+riskGroup day rMetric1 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_rMetric1_abs = 532; // max acct+riskGroup day rMetric1 abs (positive number;-1=no limit);risk limit = max limit - abs(current net counter)
    float grp_day_rMetric1_ratio = 535; // target bot / sld ratio (eg ratio=0.5 means that neutral is bot rMetric1 = 0.5x sld rMetric1)
    float max_grp_day_rMetric2_ln = 538; // max acct+riskGroup day rMetric2 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric2_sh = 541; // max acct+riskGroup day rMetric2 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_rMetric3_ln = 544; // max acct+riskGroup day rMetric3 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric3_sh = 547; // max acct+riskGroup day rMetric3 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_rMetric4_ln = 550; // max acct+riskGroup day rMetric4 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric4_sh = 553; // max acct+riskGroup day rMetric4 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float max_grp_day_rMetric5_ln = 556; // max acct+riskGroup day rMetric5 long (positive number;-1=no limit);risk limit = max limit - current net counter
    float max_grp_day_rMetric5_sh = 559; // max acct+riskGroup day rMetric5 short (positive number;-1=no limit);risk limit = max limit + current net counter
    float sym_ema_cxl_dDelta_ln = 571; // max acct+symbol 60s EMA $delta long (positive number; <= 0 is no limit) [will immediately cxl all option orders in a symbol if any order in the symbol breaches]
    float sym_ema_cxl_dDelta_sh = 574; // max acct+symbol 60s EMA $delta short (positive number; <= 0 is no limit)
    float sym_ema_cxl_wt_vega_ln = 577; // max acct+symbol 60s EMA wtVega long (positive number; <= 0 is no limit) [will immediately cxl all option orders in a symbol if any order in the symbol breaches]
    float sym_ema_cxl_wt_vega_sh = 580; // max acct+symbol 60s EMA wtVega short (positive number; <= 0 is no limit)
    string trader_name = 583; // Name of the trader associated with the order
    string user_data1 = 586; // client supplied data field; passes through to parent and child executions and reports as well as FIX drops
    string user_data2 = 589; // client supplied data field; passes through to parent and child executions and reports as well as FIX drops
    string child_data = 592; // client supplied data field; passes through to down stream child orders
    int32 checksum = 595; // Must be set to 13.  This helps detect some column/value misalignments.
}


