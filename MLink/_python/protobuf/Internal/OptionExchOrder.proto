syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


    
message OptionExchOrder {
    message PKey {
        
        OptionKey okey = 10;
        BuySell side = 11;
        OptExch exch = 12;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int64 exch_order_iD = 100; // exchange assigned order ID (if any)
    int32 size = 103; // size available to trade
    double price = 106;
    int32 orig_order_size = 109; // original order size (if available)
    ExchOrderType order_type = 112;
    ExchOrderStatus order_status = 115;
    MarketQualifier market_qualifier = 118;
    ExecQualifier exec_qualifier = 121;
    TimeInForce time_in_force = 124;
    FirmType firm_type = 127;
    PositionType position_type = 130;
    string clearing_firm = 133;
    string clearing_accnt = 136;
    string other_detail = 139;
    int64 src_timestamp = 142; // source (exch) high precision timestamp (if available)
    int64 net_timestamp = 145; // SpiderRock network PTP timestamp
    int64 dgw_timestamp = 148; // SpiderRock data gateway timestamp
}


