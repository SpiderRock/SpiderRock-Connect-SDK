syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message James2PingPong {
    message PKey {
        
        int32 ping_pong_id = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    google.protobuf.Timestamp time_stamp = 100;
    string payload = 101;
}


