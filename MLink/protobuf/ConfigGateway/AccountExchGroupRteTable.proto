syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


    
message AccountExchGroupRteTable {
    message PKey {
        
        string template_name = 10;
        string client_firm = 11;
    }

    message AccntRouteTable {
        
        YesNo enabled = 280;
        string exec_brkr_code = 296;
        float route_alloc_metric = 277;
        string brkr_ex_dest = 304; // order routing string (if any) [used to force orders use a specific ExDest regardless of the actual exchange destination]
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    repeated AccntRouteTable accnt_route_table = 271;
}


