syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


    
message AccountExchGroupCapStrat {
    message PKey {
        
        string template_name = 10;
        string client_firm = 11;
    }

    message CapStrategyID {
        
        string ex_dest = 303; // exchange
        string cap_strategy_iD = 300; // client cap strategy ID (if any)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    repeated CapStrategyID cap_strategy_i_d = 298;
}


