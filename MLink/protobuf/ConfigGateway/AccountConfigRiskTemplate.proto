syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


    
message AccountConfigRiskTemplate {
    message PKey {
        
        string template_name = 10;
        string client_firm = 11;
    }

    message RiskLevel {
        
        MarRiskLevel risk_level = 218;
        string custom_group = 219;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    repeated RiskLevel risk_level = 217;
}


