syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    SpdrParentExecution records are published every time a parent order execution is received.  They also update as additional post execution mark information is available at F+1m and F+10m.
*/    
message SpdrParentExecutionV2 {
    message PKey {
        
        int64 fill_number = 10; // SpiderRock execution number (globally unique over trailing 10 days)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    SysRealm sys_realm = 100;
    SysEnvironment sys_environment = 103;
    RunStatus run_status = 106;
    int32 version = 109; // record version number;starts at zero and goes up every time an execution record is re-published (eg, bust, +1m marks, +10m marks, etc)
    string routing_code = 112; // SpiderRock market routing code
    ExecStatus exec_status = 115; // SpiderRock execution status (Fill,Bust,Correct,Reject,SysRej)
    ExecShape exec_shape = 118;
    string orig_exec_iD = 121; // original execution ID string (child order)
    string last_exec_iD = 124; // most recent execution ID (same as origExecID unless CANCEL/CORRECTION has been processed)
    string remote_text = 127; // text comment from remote endpoint (if any)
    string integrity_error = 130; // line integrity error (if any) on this execution
    int64 parent_number = 133; // SR parent number
    int32 parent_version = 136; // SPDR order instance number (1 = original order; 2 = 1st cancel/replace, etc)
    int64 base_parent_number = 139; // SPDR order number (initial number in cancel/replace sequence) (also, source parent for dynamically generated orders;eg auto-hedges)
    int64 cl_ord_id = 142; // SR child order clOrdID resulting in fill
    string street_cl_ord_id = 145; // street side clOrdId (clOrdId or equivalent of the street side order) [SR/street gateway generated]
    string street_order_id = 148; // street side orderId (orderId or equivalent of the street side order) [from street side execReport]
    int64 cross_cl_ord_id = 151;
    int64 face_side_cl_ord_id = 154; // Cross Side ClOrdId.  From ChildOrder.custClOrdId, or ChildOrder.FaceSideList.alloclOrdID
    string review_cl_ord_id = 157; // review session clOrdId (usually from inbound review FIX session)
    int64 alt_fill_id = 160; // alternate fill ID (usually from AwayTktGateway.pkey.clientFillID)
    string alt_order_id = 163; // alternate order ID (usually clOrdId from client)
    string alt_cross_id = 166;
    string alt_leg_ref_id = 169;
    string alt_accnt = 172; // alternate (client assigned) "long" account string (optional) [used to map between client and SR account strings]
    string alt_user_name = 175; // alternate (client assigned) user name (optional) [used to map between client and SR account strings]
    string src_routing_code = 178; // inbound FIX routing code, if any
    int64 risk_group_id = 181; // riskGroupId (parent order group ID) for this execution report
    int64 trigger_group_id = 184; // WaitTrigger group Id
    int64 trigger_timestamp = 187; // WaitTrigger trigger timestamp (nanoseconds since epoch)
    int64 package_id = 190; // SR package Id
    SpdrOrderShape parent_shape = 193; // shape of originating parent order
    OptionKey sec_key = 199; // execution security key
    SpdrKeyType sec_type = 202; // execution security type [Stock, Future, Option]
    string accnt = 205; // SpiderRock trading accnt [broker pkey]
    string client_firm = 208; // SR client firm
    BuySell order_side = 211; // order side
    SpdrSource spdr_source = 214; // SpiderRock parent order source code [broker pkey]
    int64 grouping_code = 217; // SpiderRock parent broker number [broker pkey]
    string engine_name = 220; // SpiderRock execution engine that handled the parent order
    string gateway_name = 223; // StreetGateway server than handled the child order (if any)
    TickerKey ticker = 196; // base stock key (used for symbol risk aggregation)
    ExecRole exec_role = 226; // SpiderRock relationship to this execution record
    string exec_brkr_code = 229; // SR Assigned executing broker code
    string exec_brkr_mPID = 232; // FINRA/Assigned exec broker MPID (if any)
    string user_name = 235; // user name associated with the parent order
    string strategy_accnt = 238; // SR strategy account (optional; copied from parent order)
    string core_client_firm = 241;
    string sponsor_client_firm = 244;
    google.protobuf.Timestamp fill_transact_dttm = 247; // transaction date/time as reported by exchange or down stream broker
    double fill_ts = 250; // fill report ts (seconds since startup; 100 nanosec resolution)
    google.protobuf.Timestamp fill_dttm = 253; // Date/time of fill arrival (SRDateTime)
    string fill_exch = 256; // ExDest code from child order execution report
    string fill_exec_id = 259; // street side execution Id
    string fill_exec_ref_id = 262; // street side execution ref Id (only used when busting an execution)
    int64 fill_leg_ref_id = 265; // legRefId for multileg fills
    int32 fill_leg_ratio = 268; // legRatio (if spread order)
    float fill_exch_fee = 271; // SpiderRock estimate of the exchange fee based on liquidity tags (best effort)
    string fill_market = 274; // usually from execReport.lastMkt as reported by child order venue
    double fill_price = 277; // fill price
    int32 fill_quantity = 280; // fill quantity
    string fill_report_detail = 283; // extra detail (if any) from child execution
    FirmType fill_firm_type = 286; // fill order firm type [Customer, ProCust, Firm, MM, etc] (as reported by street)
    OrderCapacity fill_order_capacity = 289; // fill order capacity (as reported by street)
    double fill_bid = 292; // market bid @ fill arrival
    double fill_ask = 295; // market ask @ fill arrival
    double fill_mark = 298; // mid-market (or SR surface price if option) @ fill arrival
    double fill_fair_width = 301; // model fair width @ fill time
    double fill_uMark = 304; // underlier mark @ fill arrival
    double fill_uBid = 307; // underlier market bid @ fill arrival
    double fill_uAsk = 310; // underlier market bid @ fill arrival
    float fill_vol_atm = 313; // atm volatility @ fill arrival
    double fill_mark1_m = 316; // mid-market (or SR surface price if option) @ fill arrival + 1m
    double fill_mark10_m = 319; // mid-market (or SR surface price if option) @ fill arrival + 10m
    double fill_bid1_m = 322; // market bid @ fill arrival + 1m
    double fill_ask1_m = 325; // market ask @ fill arrival + 1m
    double fill_bid10_m = 328; // market bid @ fill arrival + 10m
    double fill_ask10_m = 331; // market ask @ fill arrival + 10m
    double fill_uMark1_m = 334; // underlier mark @ fill arrival + 1m
    double fill_uMark10_m = 337; // underlier mark @ fill arrival + 10m
    float fill_vol_atm1_m = 340; // atm volatility (options only) + 1m
    float fill_vol_atm10_m = 343; // atm volatility (options only) + 10m
    FillMarkState fill_state1_m = 346;
    FillMarkState fill_state10_m = 349;
    float fill_vol = 352; // fill volatility @ fillLimitRefUPrc & fillLimitRefSDiv
    float fill_vol_s = 355; // fill volatility @ surfaceUPrc & surfaceSDiv
    float fill_prob = 358; // T+10m probability for the fill @ fill arrival send time
    double fill_limit_ref_uPrc = 361; // limit reference underlier price @ fill arrival time
    double fill_limit_ref_sDiv = 364; // limit reference sdiv value @ fill arrival time
    double fill_limit_prc = 367; // parent order limit price @ fill arrival time
    float fill_ve = 370; // fill vega
    float fill_ga = 373; // fill gamma
    float fill_de = 376; // fill delta
    float fill_th = 379; // fill theta
    float fill_ve_ratio = 382; // fill ve / fill atm ve
    float fill_beta = 385; // SpiderRock estimate of beta to SPX
    string fill_proc_detail = 388; // fill processing detail (SR internal)
    PriceType price_type = 391;
    string exec_brkr_accnt = 394; // account at executing broker (if any)
    string exec_brkr_cl_firm = 397; // client/firm at executing broker (if any)
    string exec_brkr_user_name = 400; // userName at execution broker (if any)
    FlipType clearing_flip_type = 403; // Clearing Flip Type (None, ExecBroker, CMTA, Giveup, DTCC, QSR, etc)
    string clearing_flip_firm = 406; // Clearing Flip Firm (if any)
    string clearing_flip_accnt = 409; // Clearing Flip Account (if any)
    string clearing_agent = 412; // Clearing Agent (if any)
    string clearing_tax_iD = 415; // Clearing TaxID (if any)
    string clearing_brkr_mPID = 418; // Clearing Broker MPID (equity only)
    string badge = 421;
    SpdrOrderStatus spdr_order_status = 424;
    SpdrCloseReason spdr_close_reason = 427;
    int32 cum_fill_quantity = 430; // cumulative fills (this parent number only)
    double avg_fill_price = 433;
    int32 cum_leg_fill_quantity = 436; // cumulative fills (spread only)
    double avg_leg_fill_price = 439;
    int32 leaves_qty = 442;
    SpdrOrderShape child_shape = 445;
    OrderStatus child_order_status = 448;
    int32 child_size = 451; // child order size
    double child_price = 454; // child order price
    google.protobuf.Timestamp child_dttm = 457; // child order generation date/time
    int32 child_exch = 460; // child order exchange (SR exchange number)
    string child_ex_dest = 463; // child order exchange destination code
    FaceSide child_face_side = 466;
    FaceShape child_face_shape = 469;
    string child_exec_broker = 472; // executing broker that child order was routed to
    YesNo child_is_directed = 475; // child order isDirected flag
    YesNo child_iso_sweep = 478; // child order ISO sweep flag
    TimeInForce child_time_in_force = 481;
    string child_order_handling = 484; // order handling string from the algo that generated the child order
    ChildHandler child_algo_handler = 487; // algo handler for this child order
    ChildCreateReason child_create_reason = 490;
    ChildCancelReason child_cancel_reason = 493;
    MakerTaker child_maker_taker = 496;
    double child_uBid = 499; // underlier market bid at @ child order send time
    double child_uAsk = 502; // underlier market ask at @ child order send time
    double child_bid = 505; // market bid at the @ child order send time
    double child_ask = 508; // market ask at the @ child order send time
    double child_mark = 511; // mid-market (SR surface price if option) @ child order send time
    double child_fair_width = 514; // model fair width @ child order create
    float child_vol = 517; // child order volatility @ childLimitRefUPrc
    float child_prob = 520; // SR probability for the child order @ child order send time
    double child_limit_ref_uPrc = 523; // limit reference underlier price @ child order send time
    double child_limit_prc = 526; // parent order limit price @ child order send time
    float child_vol_atm = 529; // atm volatility @ child order send time
    FirmType child_firm_type = 532; // child order firm type [Customer, ProCust, Firm, MM, etc]
    OrderCapacity child_order_capacity = 535; // child order capacity
    PositionType child_pos_type = 538; // child order position type
    int32 child_firm_opt_position = 541; // effective firm option position @ child order send time
    ShortSaleFlag child_sSale_flag = 544; // short sale flag
    int32 child_firm_stk_position = 547; // effective firm stock position @ child order send time
    int32 child_firm_open_sell_sh = 550; // open sell orders counted in marking @ child order send time
    int32 child_locate_quan = 553; // available locate quantity (if selling short) @ child order send time
    string child_locate_firm = 556; // firm granting the locate
    string child_locate_pool = 559; // locate pool @ firm granting locate
    MktStance child_mkt_stance = 562; // child order was expected to be marketable @ child send time
    YesNo child_risk_cxl = 565; // cancel was generated from risk controls
    YesNo child_cxl_attempted = 568; // cancel attempt was made on the child order prior to receiving this fill
    string child_cxl_text = 571;
    float child_cxl_fill_latency = 574; // cancel attempt -to- fill report latency (in seconds)
    string child_method = 577; // execution method string
    string child_source = 580; // execution source string
    string pri_agg_group = 583; // primary aggregation group
    string sec_agg_group = 586; // secondary aggregation group
    string directed_client_firm = 589;
    float notice_commission = 592;
    YesNo has_notice_comm = 595; // noticeCommision contains responder auction commission; otherwise, commission is as agreed elsewhere
    YesNo cust_comm_paying = 598; // client is commission paying (to the responder)
    string response_type = 601; // usually an exch auction response type
    CompletionType completion_type = 604; // None, DAC, POC, TAS, TACO, BTIC
    CompletionState completion_state = 607;
    double completion_price = 610; // completion trade price (final trade price)
    OptionKey completion_sec_key = 613; // final settlement secKey (contract that DAC, TAS, TACO, etc. will convert to; might not be valid until completed)
    SpdrKeyType completion_sec_type = 616; // usually Future or Option (None if not yet valid)
    float risk_vega = 619; // risk vega
    float risk_wt_vega = 622; // risk gamma
    float risk_nValue = 625; // risk delta
    float risk_delta = 628; // risk delta
    float risk_dDelta = 631; // risk ddelta
    float risk_rm1 = 634; // user defined (from parent order) [used to manage order groups]
    float risk_rm2 = 637; // user defined (from parent order) [used to manage order groups]
    float risk_rm3 = 640; // user defined (from parent order) [used to manage order groups]
    float risk_rm4 = 643; // user defined (from parent order) [used to manage order groups]
    float risk_rm5 = 646; // user defined (from parent order) [used to manage order groups]
    float risk_rm6 = 649; // user defined (from parent order) [used to manage order groups]
    float risk_rm7 = 652; // user defined (from parent order) [used to manage order groups]
    float margin_uDn_vDn = 655; // underlier down, vol down
    float margin_uDn_vUp = 658; // underlier down, vol up
    float margin_uUp_vDn = 661; // underlier up, vol down
    float margin_uUp_vUp = 664; // underlier up, vol up
    float risk_u15_dn = 667; // underlier dn 15% shock slide
    float risk_u15_up = 670; // underlier up 15% shock slide
    float risk_u50_dn = 673; // underlier dn 50% shock slide
    float risk_u50_up = 676; // underlier up 50% shock slide
    float fill_brkr_rate = 679; // billing brokerage rate (tier 1)
    float fill_routing_rate = 682; // billing routing rate (tier 1)
    string mm_pref_code = 685; // market maker preference code (if any)
    float mm_credit = 688; // expected market maker credit (if any)
    RiskCode risk_code = 691; // SpiderRock Risk Code (if any)
    BillingSecType billing_sec_type = 694; // SpiderRock billing security type
    BillingCategory billing_category = 697; // SpiderRock billing category
    string spdr_liquidity_tag = 700; // SpiderRock normalized liquidity tag
    string exch_liquidity_tag = 703; // liquidity tag as reported by downstream venue (if any)
    string fill_exch_detail = 706; // other fix tags (tag:value#tag:value) [additional detail used for analysis]
    CrossSide cross_side = 709; // indicates if this order was the initiator or responder of the cross fill (None if not cross)
    YesNo is_cross_breakup_fill = 712; // cross order was broken up on exchange, and this execution was filled by party not specified on the original cross order
    string exch_firm_type = 715; // used to reflect field from a downstread execution back up to upstream fill report
    string ext_exec_broker = 718; // used to reflect field from a downstream destination back up to and upstream fill report
    RelationshipType relationship_type = 721; // type of SR <-> client relationship
    string clearing_firm = 724; // clearing firm
    string clearing_accnt = 727; // clearing firm account (if any)
    float cl_arrive_mark = 730; // client specified arrival mark (passed through from parent order)
    google.protobuf.Timestamp parent_dttm = 733; // parent order creation date/time
    int32 parent_order_size = 736; // parent order size
    double parent_uBid = 739; // underlier market bid @ parent order arrival
    double parent_uAsk = 742; // underlier market ask @ parent order arrival
    double parent_uMark = 745; // underlier mid mark @ parent order arrival
    double parent_bid = 748; // market bid @ parent order arrival
    double parent_ask = 751; // market ask @ parent order arrival
    double parent_mark = 754; // mid-market (or SR surface price) @ parent order arrival
    double parent_fair_width = 757; // model fair width @ parent order arrival
    double parent_surf_vol = 760; // SR surf vol @ parent order arrival
    SpdrLimitType parent_limit_type = 763; // Primary Limit Type (Prc, Vol, Rel, Market, Smrt, etc)
    float parent_limit_vol = 766; // parent order limit volatilty (if any)
    double parent_limit_prc = 769; // parent order limit price @ fill arrival
    double parent_limit_ref_uPrc = 772; // limit reference underlier price @ fill arrival
    float parent_theo_vol = 775; // client supplied theoretical volatility (used for markup only) [copied from parent order]
    float parent_theo_prc = 778; // option price corresponding parentTheoVol @ fillUMark
    PositionType parent_pos_type = 781; // parent order position type
    ShortSaleFlag parent_sSale_flag = 784; // short sale flag on parent order
    string parent_strategy = 787; // client strategy [usually client supplied]
    int64 notice_number = 790; // RFR / Auction noticeNumber (if any)
    string user_data1 = 793; // client supplied data field; passes through to parent and child executions and reports as well as FIX drops
    string user_data2 = 796; // client supplied data field; passes through to parent and child executions and reports as well as FIX drops
    PricingVersion pricing_version = 797; // pricing library version
    AutoHedge auto_hedge = 799; // auto-hedge algorithm (if any)
    ExpiryKey hedge_sec_key = 802; // auto-hedge sec key (if any)
    SpdrKeyType hedge_sec_type = 805; // auto-hedge sec type (if any)
    float hedge_beta_ratio = 808; // portion of executed $delta to auto-hedge (can be 1.0 / Beta for beta hedging) [-4.0 to +4.0])
    HedgeScope hedge_scope = 811; // hedge group scope
    float years = 814; // years to expiration
    int32 underliers_per_cn = 817; // option delivery underliers per contract
    UnderlierType underlier_type = 820; // type of underlier (affects $greek calculations)
    float tick_value = 823; // $NLV value of a single tick change in display premium	(pointValue = tickValue / tickSize)
    float point_value = 826; // $NLV value of a single point change in display premium (pointValue = tickValue / tickSize)
    Currency point_currency = 829;
    float u_prc_ratio = 832; // UPrcRatio (SymbolRatio) from product definition
    float min_tick_size = 835; // minimum market price variation (dnTickSize if on a boundary)
    PriceFormat price_format = 838; // SpiderRock price display format code
    PriceFormat u_price_format = 841; // SpiderRock underlier price display format code
    double price_notional = 844; // fillQuantity * fillPrice (Stk) | fillQuantity * fillPrice * contractMultipler (Fut) | fillQuantity * fillPrice *  underliers Per Contract * pointValue (Opt)
    double u_prc_notional = 847; // FillSize * Underlying Price (mid market) * Underliers Per Contract * pointValue (Opt only)
    double strike_notional = 850; // FillSize * Strike Price * Underliers Per Contract * pointValue (Opt only)
    Currency realm_currency = 853; // Base currency of realm execution recieved in
    double point_to_realm_rate = 856; // FOREX rate from pointCurrency to realm base currency at time of execution
    string contra_mPID = 859; // contra exchange member ID
    SRPosType contra_position_type = 862;
    OrderCapacity contra_order_capacity = 865; // cust, proCust, firm, etc.
    string contra_clear_firm = 868; // contra clearing (CMTA) instructions
    string contra_clear_accnt = 871;
    string contra_market_maker = 874; // contra market maker ID (if any)
    string contra_detail = 877; // additional contra side detail
    URefType u_ref_type = 880;
    double u_prc_trigger_level = 883;
    double cxl_uPrc = 886; // uPrc @ cancel (or cancel/replace) trigger (compare to uPrcTriggerLevel)
    CancelSource cxl_source = 889;
    int64 cxl_src_timestamp = 892; // exchange or SIP (claimed) cxl trigger timestamp (from an underlier print or quote market data event)
    int64 cxl_eng_timestamp = 895; // trigger event arrival to an SR (street, sgw, or edge) NIC card
    int64 cxl_snd_timestamp = 898; // cancel (or cancel/replace) send timestamp
    double fill_uPrc_drift_ms25 = 901; // underlier price drift (fillUPrc + 25ms to fillUPrc) (+=beneficial, -=detrimental)
    float u_slip = 904; // dir * sign(de) * dContigency; dContigency = uPrc slip through cxl trigger or zero (>= 0)
    float opx_slip = 907; // abs(de) * uSlip + 0.5 * ga * uSlip * uSlip (>= 0)
    float vol_slip = 910; // 0.01 * opxSlip / ve
    float prt_uBid = 913; // live uBid/uAsk at the time print event was received
    float prt_uAsk = 916;
    int32 prt_size = 919;
    int64 prt_timestamp = 922; // printEvent.srcTimestamp
    int64 src_timestamp = 925; // street/exchange (claimed) print time
    int64 sgw_timestamp = 928; // print arrival to an SR (street or edge) NIC card
    int64 eng_timestamp = 931; // print arrival in an SR (execution or edge) engine
    double live_uPrc = 934; // SpiderRock internal use only
    double live_mark = 937; // SpiderRock internal use only
    google.protobuf.Timestamp timestamp = 940; // timestamp of this record [not necessarily the timstamp of the fill itself]
}


