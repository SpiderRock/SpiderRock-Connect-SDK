syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message ResponderMarkupVegaDir {
    message PKey {
        
        string accnt = 10;
        string client_firm = 11;
        ExpiryKey ekey = 17;
        BuySell resp_side = 13; // auction responder side (your side)
        int64 responder_iD = 18; // client supplied responder ID (can be any number including zero)
    }

    message Calibration {
        
        float c_value = 222; // client surface volatility @ moneyness
        float moneyness = 223; // moneyness = SR xAxis value
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string user_name = 100; // username used for responding to auction notices
    YesNo is_disabled = 101; // if Yes, this auto-responder record is disabled
    google.protobuf.Timestamp enabled_until = 137; // will be enabled up until this time
    YesNo can_include_stock = 103; // if yes, can respond to auction notices that include a stock leg
    YesNo can_respond_sR = 178; // if yes, can respond to auction notices from SR
    YesNo can_respond_exch = 179; // if yes, can respond to auction notices from exchanges
    CallPut cp_flag = 104; // if not Pair must match all option legs
    float min_xDelta = 109; // all leg xDelta must be between [minXDelta, maxXDelta]
    float max_xDelta = 110;
    double min_strike = 111; // all leg strikes must be between [minStrike, maxStrike]
    double max_strike = 112;
    ClientSurface client_vol_surface = 219;
    float atm_vol = 220; // [AtmVolPinned] clientSurface = SRSurface pinned to atmVol @ atmStrike (strike = fwdUPrcRef)
    float min_surf_edge_vol = 114; // spread surface edge (in vol) (0.01 = 1.0 vol pts) (+ = through surface; - = behind surface)
    float min_surf_edge_prem = 113; // spread surface edge (in premium) (+ = through surface; - = behind surface)
    float min_probability = 184; // option response probability will be >= minProbability
    YesNo inc_fees_in_resp = 115; // include all estimated responder exchange fees in final response price (prior to rounding)
    RoundRule round_rule = 116;
    int32 max_response_size = 117; // maximum number of contracts per response (will respond for 100% if auction size <= maxResponseSize)
    float max_response_vega = 118; // maximum total vega per response
    float total_response_size = 224; // maximum number of contracts (filled) all day (this responder record)
    float total_response_vega = 119; // maximum vega (filled) all day (this responder record)
    YesNo policy_auto_hedge = 225; // if yes, all option fills will be autoHedgePolicy eligible
    int64 risk_group_id = 127; // Default: 0 (none).
    float min_uPrc = 226; // min/max underlier price bounds (no responses while underlier is outside of bounds)
    float max_uPrc = 227;
    int32 num_notices = 228; // number of notices that match response bucket
    int32 num_notice_block = 229; // number of SR block auction numNotices
    int32 num_notice_flash = 230; // number of SR flash auction numNotices
    int32 num_notice_exch_pI = 231; // number of Exch Price Improvement auction numNotices
    int32 num_notice_exch_eX = 232; // number of Exch Exposure auction numNotices
    int32 num_not_mkt_penny = 233; // number auction numNotices
    int32 num_mkt_penny1 = 234; // number auction numNotices
    int32 num_mkt_penny2 = 235; // number auction numNotices
    int32 num_mkt_penny3p = 236; // number auction numNotices
    int32 num_not_mkt_nickle = 237; // number auction numNotices
    int32 num_mkt_nickle1 = 238; // number auction numNotices
    int32 num_mkt_nickle2 = 239; // number auction numNotices
    int32 num_mkt_nickle3p = 240; // number auction numNotices
    int32 resp_disabled_skips = 241; // number skipped from isDisabled
    int32 stock_disabled_skips = 242; // number skipped from canIncludeStock != Yes
    int32 cp_flag_skips = 243; // number skipped from cpFlag not matching notice legs CallPut
    int32 flex_skips = 244; // number skipped from flex/listed filter
    int32 ekey_skips = 245; // number skipped from leg ekey mismatch
    int32 x_delta_range_skips = 246; // number skipped from out of range XDelta value
    int32 strike_range_skips = 247; // number skipped from out of range strike
    int32 s_vol_error_skips = 248;
    int32 user_vol_err_skips = 249;
    int32 zero_size_skips = 250; // number skipped from zero avail response size
    int32 total_size_skips = 251; // number skipped from total contract size limit
    int32 total_vega_skips = 252; // number skipped from total vega size limit
    int32 sys_error_skips = 253;
    int32 user_surf_skips = 254;
    int32 prob_error_skips = 255;
    int32 off_market_skips = 256; // number skipped from response price at or worse that exch/nbbo market
    int32 notice_price_skips = 257; // number skipped from limit price worse that notice price (and already committed)
    int32 num_reject_hold_skips = 258; // number skipped from reject hold (prior reject)
    int32 bad_price_skips = 281; // number skipped from invalid (<=0) response price
    int32 num_responses = 259; // number of response attempts (number of parentOrders/NoticeExecReports)
    int32 num_rejects = 260; // number of response rejects (in the SR execution engines)
    string last_reject_reason = 261;
    int32 num_responds_block = 262; // number of SR block auction responses
    int32 num_responds_flash = 263; // number of SR flash auction responses
    int32 num_responses_exch_pI = 264; // number of Exch Price Improvement auction responses
    int32 num_responses_exch_eX = 265; // number of Exch Exposure auction responses
    int32 num_full_size = 266;
    int32 num_alloc_size = 267;
    int32 num_price_miss = 268;
    int32 num_too_late = 269;
    int32 num_other_miss = 270;
    int32 num_did_not_trade = 271;
    int32 num_traded = 210;
    int32 qty_traded = 132;
    float vega_traded = 272;
    float sum_width_traded = 273; // SUM: marketWidth * trdQty      => AvgMktWidth = sumWidthTraded / qtyTraded
    float sum_surf_edge_traded = 274; // SUM: printEdge * trdQty        => AvgPrintEdge = sumSurfEdgeTraded / qtyTraded
    float sum_m1_pn_lTraded = 275; // SUM: M1PnL * trdQty            => AvgM1PnL = sumM1PnLTraded / qtyTraded
    float sum_m10_pn_lTraded = 276; // SUM: M10PnL * trdQty           => AvgM10PnL = sumM10PnLTraded / qtyTraded
    int32 num_traded_block = 277; // number of SR block auctions traded
    int32 num_traded_flash = 278; // number of SR flash auctions traded
    int32 num_traded_exch_pI = 279; // number of Exch Price Improvement auctions traded
    int32 num_traded_exch_eX = 280; // number of Exch Exposure auctions traded
    string modified_by = 134; // user who last modified this record
    SysEnvironment modified_in = 135;
    google.protobuf.Timestamp timestamp = 136; // timestamp of last modification
    repeated Calibration calibration = 221;
}


