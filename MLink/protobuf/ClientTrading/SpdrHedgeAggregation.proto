syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message SpdrHedgeAggregation {
    message PKey {
        
        ExpiryKey sec_key = 10; // risk product (stock, future, or optExpiry)
        AggregationType agg_type = 11; // MLeg = OptExpiry
        string accnt = 12;
        string client_firm = 13;
        DateKey trade_date = 14;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 pos_sum_qty = 100; // total shares or contracts
    int32 pos_cnt_items = 101; // number of distinct securities
    ExpiryKey pos_hedge_target = 102;
    SpdrKeyType pos_hedge_sec_type = 103;
    string pos_agg_error = 104;
    int32 exe_sum_qty = 105;
    int32 exe_cnt_fills = 106;
    ExpiryKey exe_hedge_target = 107;
    SpdrKeyType exe_hedge_sec_type = 108;
    string exe_agg_error = 109;
    google.protobuf.Timestamp timestamp = 110;
}


