syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message GetOptionVolatility {
    message DiscreteDividend {
        
        google.protobuf.Timestamp date = 136;
        float amount = 139;
    }


    MessageMetadata _meta = 1;
    
    OptionKey okey = 100; // can be listed or FLEX
    double price = 103; // option price (premium)
    double u_prc = 106; // underlying price
    double years = 109; // years-to-expiration (default uses SR volatility time value)
    double sdiv = 112; // continuous stock dividend used for pricing
    double rate = 115; // discount rate used for pricing
    PricingFramework prc_framework = 118; // primarily controls exercise/settlement interest effects
    ExerciseType ex_type = 121; // exercise type of the option (American or European)
    ExerciseTime ex_time = 124; // exercise time (AM or PM)
    CalendarCode holiday_calendar = 127; // holiday calendar code (eg. NYSE)
    TimeMetric time_metric = 130; // time metric (D252, D365, etc.)
    CalcModelType model_type = 142;
    CalcEngine calc_engine = 145; // underlying calc engine:  FastHybrid (listed strikes + SR discrtete dividends only).  NumericX works for any strike/expiry + discrete dividend set but is significantly slower.
    YesNo inc_greeks = 148; // default (No)
    double vol = 151; // volatility (implied)
    Currency currency = 153;
    double eff_strike = 154; // effective strike used to for pricing calc
    float dividend_amount = 157; // sum of discrete dividend amounts payable prior to exercise (if any) (simple; not net present value)
    float delta = 160; // delta
    float gamma = 163; // gamma
    float theta = 166; // theta
    float vega = 169; // vega
    float volga = 172; // volga
    float vanna = 175; // vanna
    float rho = 178; // rho
    float phi = 181; // phi
    float de_decay = 184; // delta decay
    string error = 187;
    string pricer_model = 190;
    google.protobuf.Timestamp timestamp = 193;
    repeated DiscreteDividend discrete_dividend = 133;
}


