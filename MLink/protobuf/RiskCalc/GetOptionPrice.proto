syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message GetOptionPrice {
    message DiscreteDividend {
        
        google.protobuf.Timestamp date = 133;
        float amount = 136;
    }


    MessageMetadata _meta = 1;
    
    OptionKey okey = 100; // can be listed or FLEX
    double vol = 103; // volatility (will be SR surface volatility if not supplied)
    double u_prc = 106; // underlying price
    double years = 109; // years-to-expiration (default uses SR volatility time value)
    double sdiv = 112; // continuous stock dividend used for pricing
    double rate = 115; // discount rate used for pricing
    ExerciseType ex_type = 118; // exercise type of the option (American or European)
    ExerciseTime ex_time = 121; // exercise time (AM or PM)
    CalendarCode holiday_calendar = 124; // holiday calendar code (eg. NYSE)
    TimeMetric time_metric = 127; // time metric (D252, D365, etc.)
    PricingFramework prc_framework = 139;
    CalcModelType model_type = 142;
    CalcEngine calc_engine = 145; // underlying calc engine:  FastHybrid (listed strikes + SR discrtete dividends only).  NumericX works for any strike/expiry + discrete dividend set but is significantly slower.
    YesNo inc_greeks = 148; // default (No)
    double price = 151; // price (premium)
    double eff_strike = 154; // effective strike used to for pricing calc
    int32 i_days = 157; // interest days to expiry
    float ddiv = 160; // sum of discrete dividend amounts payable prior to exercise (if any) (simple; not net present value)
    float ddiv_pV = 163; // sum of present value of discrete dividend amounts payable prior to exercise (if any)
    float delta = 166; // delta
    float gamma = 169; // gamma
    float theta = 172; // theta
    float vega = 175; // vega
    float volga = 178; // volga
    float vanna = 181; // vanna
    float rho = 184; // rho
    float phi = 187; // phi
    float de_decay = 190; // delta decay
    string error = 193;
    string pricer_model = 196;
    google.protobuf.Timestamp timestamp = 199;
    repeated DiscreteDividend discrete_dividend = 130;
}


