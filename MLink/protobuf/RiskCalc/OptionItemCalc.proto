syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message OptionItemCalc {


    MessageMetadata _meta = 1;
    
    OptionKey okey = 100; // okey.root can be a listed/flex root symbol or an underlying symbol
    int32 okey_number = 103;
    int64 basket_number = 106;
    ExerciseType ex_type = 109; // exercise type of the option (American or European) (default: from root definition)
    ExerciseTime ex_time = 112; // exercise time (AM or PM) (default: from root definition)
    CalendarCode holiday_calendar = 115; // holiday calendar code (NYSE, etc)
    TimeMetric time_metric = 118; // time metric (D252, D365, etc.) (default: from root definition)
    PricingFramework prc_framework = 121; // Spot (Equity), Forward (Cash), Future, Physical
    CalcModelType model_type = 124; // LogNormal, Normal, etc.  (default: from root definition)
    YesNo inc_greeks = 127; // default (No)
    double vol = 130; // volatility (default: SR surface volatility)
    double u_prc = 133; // underlying price (default: SR live uPrc)
    int32 i_days = 136; // interest days to expiration (default: SR interest days)
    double years = 139; // years-to-expiration (default: SR volatility time value)
    double sdiv = 142; // continuous stock dividend used for pricing
    double rate = 145; // discount rate used for pricing
    double ddiv = 148;
    double ddiv_pV = 151;
    double price = 154; // price (premium)
    Currency currency = 191;
    double eff_strike = 157; // effective strike used to for pricing calc
    float delta = 160; // delta
    float gamma = 163; // gamma
    float theta = 166; // theta
    float vega = 169; // vega
    float volga = 172; // volga
    float vanna = 175; // vanna
    float rho = 178; // rho
    float phi = 181; // phi
    float de_decay = 184; // delta decay
    string error = 187;
    string pricer_model = 190;
    google.protobuf.Timestamp timestamp = 193;
}


