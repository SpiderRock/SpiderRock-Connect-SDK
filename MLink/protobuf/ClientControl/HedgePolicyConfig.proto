syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message HedgePolicyConfig {
    message PKey {
        
        string accnt = 10;
        string client_firm = 11;
        HedgePolicy policy = 12;
    }

    message HedgeWaves {
        
        HedgePeriod hedge_period = 106;
        float sym_hedge_band_dD = 107; // individual hedge target hedge band ($delta)
        float sym_hedge_band_gR = 108; // individual hedge target hedge band (gamma ratio)
        YesNo balance_symbols = 109; // balance accnt level deltas from all symbols using this policy
        HedgeSlice hedge_slice = 110;
        HedgeObjective hedge_objective = 111;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    YesNo auto_hedge_enabled = 100;
    YesNo hedge_waves_enabled = 101;
    AutoHedgeWindow auto_hedge_window = 102;
    AutoHedgeNetting auto_hedge_netting = 103;
    float auto_hedge_sym_band_dD = 104; // individual hedge target hedge band ($delta) (hedge to zero when outside band)
    string modified_by = 112; // user who last modified this record
    SysEnvironment modified_in = 113;
    google.protobuf.Timestamp timestamp = 114; // timestamp of last modification
    repeated HedgeWaves hedge_waves = 105;
}


