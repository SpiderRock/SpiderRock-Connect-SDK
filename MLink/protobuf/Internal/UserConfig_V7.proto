syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

/*
    V7 Message Name: UserConfig
    V8 Message Name: UserConfig
    Bridging pattern:  [V8 --> V7] [V7 --> V8]
    BridgeFromV8:UserConfig
*/    
message UserConfig_V7 {
    message PKey {
        
        string user_name = 5000; // v7 & v8: Using Meta Types: V7=[string,Length=24,Alias=UserNameString,MetaType=NA], V8=[string,Length=24,Alias=SRUserString,MetaType=SRUser]
    }

    message AccountAccessControl {
        
        string accnt = 5062; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=SRAccountString,MetaType=NA], V8=[string,Length=16,Alias=SRAccountString,MetaType=SRAccount]
        AccountAccessType access_type = 5063; // v7 & v8
    }

    message ClientFirmViewAccess {
        
        string client_firm = 5065; // ONLY V7: [string,Length=16,Alias=ClientFirmString,MetaType=NA]
        google.protobuf.Timestamp expires = 5066; // ONLY V7: [DateTime] --- Original comment: must exist (can be 2100-01-01)
    }

    message MLinkControl {
        
        MLinkToken token = 5068; // v7 & v8
        google.protobuf.Timestamp expires = 5069; // v7 & v8 --- Original comment: must exist (can be 2100-01-01)
    }

    message MarketDataControl {
        
        MarketDataToken token = 5071; // v7 & v8 --- Original comment: market data billing authorities (either external or internally controlled for billing purposes)
        MarketDataScope_V7 scope = 5072; // v7 & v8: Enums Do Not Match: V7=[enum,Name=MarketDataScope,Values=None=0,Live=1,Delayed=2], V8=[enum,Name=MarketDataScope,Values=None=0,Live=1,Delayed=2,Trial=3,Pending=4] --- Original comment: controls whether market data access is live or delayed
        google.protobuf.Timestamp expires = 5073; // v7 & v8 --- Original comment: must exists (can be 2100-01-01)
    }

    message WebProductControl {
        
        WebProductToken token = 5075; // v7 & v8
        google.protobuf.Timestamp expires = 5076; // v7 & v8 --- Original comment: must exist (can be 2100-01-01)
        string value = 5077; // v7 & v8 --- Original comment: billing code/coupon (eg. FREE)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    UserType_V7 user_type = 5001; // v7 & v8: Enums Do Not Match: V7=[enum,Name=UserType,Values=None=0,SRManager=1,SRAdmin=2,SRDevOps=3,SRDeveloper=4,SRUser=5,SRBroker=6,ClientTrader=7,ClientRiskTrader=8,ClientRiskAdmin=9,ClientViewOnly=10,ClientSRSEOnly=11,ClientTestOnly=12,ClStageReviewTrader=13,ClStageReleaseTrader=14,ClStageModifyTrader=15,ClStageLockTrader=16], V8=[enum,Name=UserType,Values=None=0,SRAdmin=1,SRUser=2,SponsorAdmin=3,SponsorUser=4,ClientAdmin=5,ClientUser=6,SRSEUser=7,M2MUser=8]
    string client_firm = 5002; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=ClientFirmString,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirm] --- Original comment: SR assigned client firm (default client firm)
    string client_firm_list = 5003; // ONLY V7: [text1] --- Original comment: List of additional client firms for this user (ClientFirm,ClientFirm,ClientFirm ...)
    string billing_firm = 5004; // ONLY V7: [string,Length=16,Alias=NA,MetaType=NA] --- Original comment: SR billing Client Firm - if different than clientFirm (overrides clientFirmConfig in billing tool)
    string alt_user_name = 5005; // v7 & v8: Using Meta Types: V7=[string,Length=24,Alias=UserNameString,MetaType=NA], V8=[string,Length=24,Alias=SRUserString,MetaType=SRUserRef] --- Original comment: alternate (client supplied) user name
    string first_name = 5006; // ONLY V7: [string,Length=32,Alias=NA,MetaType=NA] --- Original comment: first name of client
    string last_name = 5007; // ONLY V7: [string,Length=32,Alias=NA,MetaType=NA] --- Original comment: last name of client
    string trader_id = 5008; // ONLY V7: [string,Length=24,Alias=NA,MetaType=NA] --- Original comment: usually the SEC large trader ID (if any)
    string cme_trader_id = 5009; // v7 & v8: Field Name Change: V7=[CmeTraderId], V8=[cmeTraderId] --- Original comment: CME assigned trader ID (if any)
    string cfe_trader_id = 5010; // v7 & v8: Field Name Change: V7=[CfeTraderId], V8=[cfeTraderId] --- Original comment: CFE assigned trader ID (if any)
    string cfe_frequent_trader_id = 5011; // v7 & v8: Field Name Change: V7=[CfeFrequentTraderId], V8=[cfeTraderId] --- Original comment: CFE frequent trader ID (if any)
    string cfe_location = 5012; // v7 & v8: Field Name Change: V7=[CfeLocation], V8=[cfeLocation] --- Original comment: CFE trader location (required)
    string ice_trader_id = 5013; // ONLY V7: [string,Length=24,Alias=NA,MetaType=NA] --- Original comment: ICE assigned trader ID (if any)
    string ice_password = 5014; // ONLY V7: [string,Length=24,Alias=NA,MetaType=NA] --- Original comment: ICE assigned password (if any)
    string ice_company_id = 5015; // ONLY V7: [string,Length=24,Alias=NA,MetaType=NA] --- Original comment: ICE Company Id of trader (if any)
    string cboe_trader_id = 5016; // v7 & v8: Field Name Change: V7=[CboeTraderId], V8=[cboeTraderId] --- Original comment: Cboe assigned trader ID (if any)
    int64 eurex_trader_id = 5017; // ONLY V7: [long] --- Original comment: EUREX assigned trader ID (if any)
    string eurex_password = 5018; // ONLY V7: [string,Length=32,Alias=NA,MetaType=NA] --- Original comment: EUREX assigned password (if any)
    string sr_access_hash = 5019; // ONLY V7: [string,Length=64,Alias=NA,MetaType=NA] --- Original comment: SR user access hash for ELASTICSearch
    string exec_username = 5020; // ONLY V7: [string,Length=12,Alias=NA,MetaType=NA] --- Original comment: eg, REDI accounts when routing to REDI
    string user_group = 5021; // ONLY V7: [string,Length=12,Alias=NA,MetaType=NA] --- Original comment: controls comments visibility scope
    string description = 5022; // v7 & v8 --- Original comment: user description / comment
    string default_accnt = 5023; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=NA,MetaType=NA], V8=[string,Length=16,Alias=SRAccountString,MetaType=SRAccount] --- Original comment: default account for this user
    string accnt_list = 5024; // ONLY V7: [text2] --- Original comment: all authorized accounts [comma separated list; must have clientFirm in their accnt config] (can be *ClientFirm, $viewGroup1, $viewGroup2 or $viewgroup3)
    YesNo view_inactive = 5025; // ONLY V7: [enum,Name=YesNo,Values=None=0,Yes=1,No=2] --- Original comment: yes means user can view inactive accnts; none/no means user can view only active accnts
    string tool_product_acl = 5026; // ONLY V7: [text1] --- Original comment: A list of SR GUI tool product codes: SV, RV, HT, RM, RA, TA, OM, MM, CV, CT, SM, DC
    string elastic_product_acl = 5027; // ONLY V7: [text1] --- Original comment: A list of SR ES product codes: SRTrade, SRRisk, SRTheo, SRAnalytics, SRQuoteEvent, SRExecEngine, SRSystem
    string market_data_acl = 5028; // ONLY V7: [text1] --- Original comment: A list of SR TickerSrc codes: NMS, CFE, ICE, CME, CBOE, OTC, etc. [restricts SRSE and GUI tools]
    ToolServerCode tool_server_code = 5029; // v7 & v8 --- Original comment: needs to match -toolServerCode on the tool server this user is assigned to.
    string tool_server_host = 5030; // v7 & v8 --- Original comment: note: this will override auto detection of a server via toolServerCode
    int32 tool_server_port = 5031; // v7 & v8 --- Original comment: eg, 5240 V7SP, 5440 V7SD, 5640 SV7SB, 6240 V7LP, 6440 V7LPB
    YesNo tools_auto_shutdown = 5032; // v7 & v8 --- Original comment: Controls whether tools should auto-shutdown (this should be controled by SR)
    google.protobuf.Duration tools_auto_shutdown_time = 5033; // v7 & v8 --- Original comment: Tools will shut down at this time if toolsAutoShutdown = Yes (can be overriden by user)
    YesNo firm_pos_visibility = 5034; // v7 & v8 --- Original comment: Controls whether user sees the firm position in the SV's widget
    YesNo allow_random_strategy = 5035; // v7 & v8 --- Original comment: Controls whether user can enter random strategy strings when sending orders via tools
    string srse_pwd_hash = 5036; // v7 & v8: Using Meta Types: V7=[string,Length=41,Alias=NA,MetaType=NA], V8=[string,Length=41,Alias=NA,MetaType=SHA1] --- Original comment: MySQL password hash (used in launch_srse.py)
    string srse_product_acl = 5037; // ONLY V7: [text1] --- Original comment: A list of SR SRSE product codes: SRTrade, SRControl, SRLive, SRRisk, SRAdmin, SRTheo, SRAnalytics, SRAdvisor
    string srse_historical_acl = 5038; // ONLY V7: [text1] --- Original comment: A list of SR SRSE product codes (for historical views): SRTrade, SRControl, SRLive, SRRisk, SRAdmin, SRTheo, SRAnalytics, SRAdvisor, etc (e.g. could be a subset of the live acl)
    int32 srse_num_cores = 5039; // v7 & v8 --- Original comment: maximum number of simultaneous (active) SRSE queries [0,1,2 ..., 10] [default=1] (note: 0=reject all SRSE queries)
    int32 srse_max_connects_per_day = 5040; // v7 & v8
    int32 srse_max_concurrent_connects = 5041; // v7 & v8 --- Original comment: maximum number of concurrent SRSE connections [default=5] (note: SRSE has a global max of 100 simultaneous connections per user)
    int32 srse_max_row_cache = 5042; // v7 & v8 --- Original comment: maximum number of rows allowed to be used from the row cache
    int32 srse_max_new_orders = 5043; // v7 & v8 --- Original comment: maximum number of new parent orders (per day) that can be inserted via SRSE (0=NONE) [default = 500,000]
    int32 srse_max_new_orders_per_sec = 5044; // v7 & v8 --- Original comment: maximum number of new parent orders (per second; 4 second burst) that can be inserted via SRSE (0=NONE) [default = 250]
    int32 srse_max_new_orders_per_statement = 5045; // v7 & v8 --- Original comment: maximum number of new parent orders (per SQL statement) that can be inserted via SRSE (0=NONE) [default = 1,000]
    string nms_badge = 5046; // v7 & v8 --- Original comment: NMS exchange memembership and badge ids
    string cfe_badge = 5047; // v7 & v8 --- Original comment: CFE exchange memembership and badge ids.
    string cme_badge = 5048; // v7 & v8 --- Original comment: CME/CBOT/COMEX/NYMEX exchange memembership and badge ids.
    string ice_badge = 5049; // v7 & v8 --- Original comment: ICE exchange memembership and badge ids.
    string contact_email = 5050; // v7 & v8: Using Meta Types: V7=[string,Length=64,Alias=NA,MetaType=NA], V8=[string,Length=64,Alias=EmailString,MetaType=Email] --- Original comment: Contacts EMAIL Address
    string contact_iM = 5051; // ONLY V7: [string,Length=32,Alias=NA,MetaType=NA] --- Original comment: Contacts IM Address (e.g. AIM etc)
    string contact_phone = 5052; // v7 & v8 --- Original comment: Contacts Full contact Phone Number
    string location = 5053; // v7 & v8: Field Name Change: V7=[location], V8=[cmeLocation] --- Original comment: For CME. The traders location is required.  Format example:  US,IL
    UserStatus user_status = 5054; // v7 & v8
    google.protobuf.Timestamp user_status_dttm = 5055; // v7 & v8 --- Original comment: The Date/Time this users status was last changed/updated
    YesNo user_to_be_frozen = 5056; // v7 & v8 --- Original comment: If the user is to be frozen when date to be frozen is reached
    google.protobuf.Timestamp user_to_be_frozen_dttm = 5057; // v7 & v8 --- Original comment: The dateTime the user is to be frozen	if to be froz flag is set to Yes
    string modified_by = 5058; // v7 & v8: Using Meta Types: V7=[string,Length=24,Alias=UserNameString,MetaType=NA], V8=[string,Length=24,Alias=SRUserString,MetaType=ModifiedBy]
    SysEnvironment modified_in = 5059; // v7 & v8
    google.protobuf.Timestamp timestamp = 5060; // v7 & v8 --- Original comment: timestamp of last modification
    repeated AccountAccessControl account_access_control = 5061;
    repeated ClientFirmViewAccess client_firm_view_access = 5064;
    repeated MLinkControl m_link_control = 5067;
    repeated MarketDataControl market_data_control = 5070;
    repeated WebProductControl web_product_control = 5074;
}


