syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridAuctionPrintSingle {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int64 notice_number = 100; // AuctionNotice.noticeNumber
    TickerKey ticker = 101; // underlier ticker
    YesNo is_test_auction = 102; // if yes, auction is a test auction (not a prod/live auction)
    google.protobuf.Timestamp notice_time = 103; // notice create timestamp (high precision)
    AuctionType auction_type = 104; // (eg. Block, Flash, Improvement, Facilitation, etc.)
    AuctionSource auction_source = 105; // source of the auction notice (eg. SRC, MIAX, etc.)
    string industry = 106; // industry string
    SymbolType symbol_type = 107;
    float u_avg_daily_vlm = 108; // underlier average daily trading volume
    string sec_key = 109;
    string sec_key_ticker_src = 110;
    string sec_key_asset_type = 111;
    SpdrKeyType sec_type = 112;
    BuySell cust_side = 113; // from AuctionNotice (if known)
    int32 cust_qty = 114; // from AuctionNotice (if known)
    double cust_prc = 115; // from AuctionNotice (if known)
    YesNo has_cust_prc = 116; // from AuctionNotice (if known)
    FirmType cust_firm_type = 117; // cust firm type (if disclosed)
    string cust_agent_mPID = 118; // cust agent exchange member initiating the auction (if disclosed)
    float comm_enhancement = 119; // additional commission (if any) paid by responder
    int32 num_opt_legs = 120; // MLEG Only
    SpreadClass spread_class = 121;
    SpreadFlavor spread_flavor = 122; // MLEG Only
    YesNo contains_hedge = 123; // MLEG Only
    YesNo contains_flex = 124; // contains FLEX options (not regular listed options)
    YesNo contains_multi_hedge = 125; // contains MultiHedge (corp action adjusted) options
    double u_bid = 126;
    double u_ask = 127;
    double prt_price = 128; // reported OPRA print price (pkgPrice if MLeg)
    double prt_price2 = 129; // if reported as 2 separate prints at different prices (ie, partial size improvement)
    int32 prt_size = 130; // reported OPRA print size (pgkSize if MLeg)
    int32 prt_size2 = 131; // reported OPRA print size (pgkSize if MLeg)
    google.protobuf.Timestamp prt_time = 132; // reported OPRA print time (1st print if MLeg) (high precision)
    PrtType prt_type = 133; // reported OPRA print type
    double prt_uBid = 134; // best estimate of uBid @ auction print time
    double prt_uAsk = 135; // best estimate of uAsk @ auction print time
    double prt_uPrc = 136; // best estimate of uPrc @ auction print time
    float prt_surf_vol = 137; // surface vol @ auction print time (single option auction only)
    float prt_surf_prc = 138; // surface prc @ auction print time (@ uMid) (pkgSurfPrc if MLeg)
    float bid_prc = 139; // option nbbo bid @ auction print time
    int32 bid_sz = 140; // nbbo bid cum size
    int64 bid_mask = 141; // nbbo bid exch mask
    float ask_prc = 142; // option nbbo ask @ auction print time
    int32 ask_sz = 143; // nbbo ask cum size
    int64 ask_mask = 144; // nbbo ask exch mask
    float exch_bid_prc = 145; // exch bid @ auction print time
    int32 exch_bid_sz = 146; // exch bid size
    float exch_ask_prc = 147; // exch ask @ auction print time
    int32 exch_ask_sz = 148; // exch ask size
    float u_prc1m = 149; // uPrc (mid market) @ auction print time + 1m
    float bid_prc1m = 150; // option nbbo bid @ auction print time + 1m
    float ask_prc1m = 151; // option nbbo ask @ auction print time + 1m
    float surf_vol1m = 152; // surface vol @ auction print time + 1m (single option auction only)
    float surf_prc1m = 153; // surface prc @ auction print time + 1m (@ uMid)
    float u_prc10m = 154; // uPrc (mid market) @ auction print time + 10m
    float bid_prc10m = 155; // option nbbo bid @ auction print time + 10m
    float ask_prc10m = 156; // option nbbo ask @ auction print time + 10m
    float surf_vol10m = 157; // surface vol @ auction print time + 10m (single option auction only)
    float surf_prc10m = 158; // surface prc @ auction print time + 10m (@ uMid)
    google.protobuf.Timestamp timestamp = 159;
    int32 und_per_cn = 160;
    float point_value = 161;
    Currency point_currency = 162;
    ExpiryType exp_type = 163; // ZDte,Daily,Weekly,Regular,Quarterly,LongTerm,OtherExp
    float years = 164; // SR volatility years to expiry
    float rate = 165; // SR global (discount) rate to expiry
    float atm_vol = 166; // ATM (fwd uPrc) SR surface volatility
    float ddiv_pv = 167; // SR present value of ddiv stream
    float t_vol = 168; // client theo surface volatility (if client surfaces uploaded to SR)
    float s_vol = 169; // SR Surface Volatility
    float s_div = 170; // SR Surface SDiv
    float s_prc = 171; // SR Surface Price
    float de = 172;
    float ga = 173;
    float th = 174;
    float ve = 175;
    YesNo s_vol_ok = 176; // Yes if live market and sVol are tracking as expected
    YesNo is_prod = 177; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 178; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 179; // WTS synthetic: alert message (null if no alert)
}


