syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    RouteDefinition records contain the configuration details for an outbound order entry, inbound client, or outbound drop session. These are typically either FIX or EXCH BINARY sessions.
*/    
message RouteDefinition {
    message PKey {
        
        string routing_code = 10;
        SysEnvironment sys_environment = 11;
    }

    message ClientFirmControl {
        
        string client_firm = 375;
        string accnt = 376; // can be '*' (all accnts in the given clientFirm)
    }

    message ExDest {
        
        string ex_dest = 382; // exchange (eg. CBOEOPT, NMS$OPT, NMS$STK, CMX$FUT) or custom (eg. INET$NIGHTHAWK)
        TradingPeriod trading_period = 383; // only required if this exDest has more specific trading hours that ticker -> tickerDefinition -> tradingHours
        int32 msg_rate = 304; // maximum message rate per second for this route (<= zero nothing low priority will be routed to this exDest)
        SecTypeFlag sec_type = 384;
        string ticker_list = 350; // comma separated list of tickers to strictly allow on this route. Blank will allow all tickers
        YesNo order_entry = 307; // can handle normal order entry messages
        YesNo active_maker = 310; // can handle active making (ActiveMaker algo) order entry messages
        MktSessionFlag mkt_session = 385;
        YesNo mkt_auction = 322; // can handle exchange SOD/EOD (eg. MarketOnClose) auctions
        CrossHandlingFlag cross_handling = 386;
        CrossAttrFlag cross_attributes = 387; // can process ISO crosses; can instruct exDest to sweep away markets; can accept allocation inst on cross order; can cross FLEX options
        OtherMsgFlag other_msgs = 388;
        YesNo stage_review = 334; // can handle stage review orders
        EdgeExDest edge_ex_dest = 335; // edge device only
        DeliveryCoding delivery_coding = 355; // per-exDest override of above delivery coding
        string session_giveup_firm = 358; // per-exDest override of primary (default) session giveup/clearing firm (eg. 659)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string exec_brkr_code = 377; // SR Assigned; identifies the exchange member / broker associated with this session
    DestinationType destination_type = 103; // type of industry member
    SysRealm sys_realm = 106; // sysRealm [NMS, CME, etc.] (route definition is only valid in this SysRealm)
    string server_code = 109; // designates individual server (-serverCode) responsible for handling this routes
    RouteControl route_control = 112; // Enabled = two-way; Disabled = disconnect/logout immediately; SafeMode = Cancel open orders / reject new orders; Unused = Remove route from gateway
    MonitorCode monitor_code = 115;
    ConnectionClass connection_class = 124; // type of industry member
    SessionType session_type = 127;
    SessionResetType session_reset_type = 130; // When does the session reset sequence numbers
    Protocol protocol = 133;
    string template_name = 136; // name of FixMsgTemplate (rewrite template) used for this session (if any)
    string sender_iD = 378;
    string target_iD = 379; // can be (*) if connectType = Acceptor
    string sender_sub_iD = 380; // (depricated in FixBase)
    string target_sub_iD = 381; // (depricated in FixBase)
    string session_user_name = 151;
    string session_password = 154;
    string access_id = 157; // Name of entity requesting access: a username, remote host ID
    string access_secret_key = 160; // Secret: a password or certificate
    google.protobuf.Timestamp access_expires = 163; // Access expires on this date
    string access_id2 = 166; // Second Name of entity requesting access: a username, remote host ID
    string access_secret_key2 = 169; // Second Secret key. a password or certificate
    google.protobuf.Timestamp access_expires2 = 172; // Second Access expires on this date
    ConnectType initiator = 175;
    FailOverRule fail_over = 178;
    string ip_addr = 181;
    int32 ip_port = 184;
    PortType ip_port_type = 368; // Applicable to initiator=TCPAcceptor; When set to Internal the port will be used internally; When set to External the port will be used as the client-facing frontend HAProxy port
    string if_addr = 187;
    string ip_addr2 = 190;
    int32 ip_port2 = 193;
    PortType ip_port_type2 = 369;
    string if_addr2 = 196;
    YesNo use_jumbo_rcv_buffer = 199; // should be true only for routes with large scale sweeping activity
    double sweep_trigger_order_metric = 202; // determines flush order if multiple routes are part of a sweep group (largest number goes first)
    YesNo is_cxl_on_disconnect = 205;
    YesNo do_send_pending_reports = 208;
    SessionServices session_services = 211; // Manual=slow lines (no IOC; slow no-ack/cxl)
    SessionFeatures session_features = 214;
    Persistance persistance = 217;
    string destinations = 220; // Order sources.  Valid values:  SpdrSource enumeration, FIX routing codes.
    string session_sr_accnt = 223; // If all inbound/outbound mess are mapped to the same internal account, that account belongs here
    string session_sr_user_name = 226; // If all inbound/outbound mess are mapped to the same internal username, that username belongs here
    int32 hb_interval = 229; // number of seconds
    string session_start_time = 232; // session start time (negative means prior day)	Mon-Fri for Daily, Sun-Fri for WeekDay Sessions, Sun for Weekly sessions
    string session_stop_time = 235; // session stop time								Mon-Fri for Daily, Sun-Fri for WeekDay Sessions, Fri for Weekly sessions
    DropMsgFilter drop_msg_filter = 238;
    YesNo enable_sRAuction_notice = 241; // enable forwarding of CrossNotice messages (accountList must also contain the accnt of the CrossNotice being forwarded)
    YesNo eventus_upload = 244; // upload FIX log file to Eventus for processing
    YesNo regulation606 = 247; // This route is subject to regulation 606 reporting
    YesNo can_locate = 250; // Indicates that this route is providing/checking stock locates downstream from SR and prior to routing to a market center
    YesNo can_mass_quote = 390; // Indicates that this route supports sending mass quotes for fut options
    SwapProvider supported_swap_provider = 371; // Indicates that this route supports sending SWAP orders to a specific external swap provider
    string comment = 253; // a comment for admin viewer
    string tag_value_pairs = 256; // route specific FIX tag value pairs to add to each message (tag=value, comma-delimited)
    int32 max_risk_canary_errors = 259; // If this threshold is exceeded, the route enters safe-mode.  Counter resets periodically. (-1 = disable route safe mode canary triggering)
    YesNo accept_logon_seq_num = 262; // Accept incoming logon sequence number
    int32 max_resend_request_size = 265; // Max Request request size
    int32 max_reconnect_attempts = 268; // Max Reconnection Attempts
    int32 max_stk_child_qty = 271; // (default=100,000) maximum child order size for this route (should reflect the maximum sizing of the downstream system)
    float max_stk_child_money = 274; // (default=$5m)
    int32 max_fut_child_qty = 277; // (default=10,000)
    float max_fut_child_money = 280; // (default=unlimited)
    int32 max_opt_child_qty = 283; // (default=10,000)
    float max_opt_child_money = 286; // (default=$10m)
    int32 max_messages_per_day = 289; // (0=unlimited)
    int32 msg_rate = 389; // maximum message rate per second for this route. Overridden by exDest msgRate. (<= zero nothing low priority will be routed to this exDest)
    DeliveryCoding delivery_coding = 292; // (street side routes only) indicates what style of delivery instruction coding this session utilizes (coding is implemented inside each template)
    string session_giveup_firm = 295; // primary (default) session giveup/clearing firm (eg. 659)
    string modified_by = 361;
    SysEnvironment modified_in = 364;
    google.protobuf.Timestamp timestamp = 367;
    repeated ClientFirmControl client_firm_control = 374;
    repeated ExDest ex_dest = 298;
}


