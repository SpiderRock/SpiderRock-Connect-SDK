    google.protobuf.Timestamp last_trade_activity = 136;
    int32 active_sV = 139;
    int32 active_rV = 142;
    int32 active_hT = 145;
    int32 active_rM = 148;
    int32 active_oM = 151;
    int32 active_cT = 154;
    int32 active_mM = 157;
    int32 active_rA = 160;
    int32 active_tA = 163;
    int32 active_cV = 166;
    int32 active_aV = 169;
    int32 active_sM = 172;
    int32 active_eS = 175;
    int32 active_bT = 178;
    int32 active_dS = 181;
    int32 active_uT = 184;
    int32 active_sA = 187;
