syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;


/*
    edge-to-user
    sent on logon and then every second (if changed in the prior second) otherwise every 60 seconds
*/    
message EdgeRouteStats {
    message PKey {
        
        string exec_brkr_code = 10; // SR execBrkrCode (SR Assigned)
        EdgeExDest edge_ex_dest = 11; // SR assigned ex-dest code
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int64 timestamp = 100; // timestamp of last modification
}


