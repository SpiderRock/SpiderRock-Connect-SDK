syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 1
    Inputs: FuturePrintETL + FutureMinuteBarETL
    CalcEngine: Spark/ETL
*/    
message FuturePrintSetETL {
    message PKey {
        
        ExpiryKey fkey = 10;
        int64 prt_number = 11; // Unique print set identifier, will increment but not guaranteed to be sequential
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    TickerKey ticker = 100; // underlying stock key
    TradingSession trading_session = 103;
    DateKey trading_date = 106;
    FutExch prt_exch = 109; // print exchange
    int32 prt_size = 112; // print size [contracts]
    double prt_price = 115; // print price
    int32 prt_type = 118; // print type [exchange specific]
    uint32 prt_orders = 121; // number of orders participating in this print
    PrtSide prt_side = 124; // Print side: None; Mid; Bid; Ask
    int64 prt_timestamp = 127; // exchange high precision timestamp (if available)
    int64 net_timestamp = 130; // inbound packet PTP timestamp from SR gateway switch;usually syncronized with facility grandfather clock
    double bid_price = 133; // exch best bid @ print arrival time
    double ask_price = 136; // exch best ask @ print arrival time
    int32 bid_size = 139; // bid size @ print arrival time
    int32 ask_size = 142; // ask size @ print arrival time
    int64 qte_timestamp = 145; // exchange high precision timestamp (if available)
    double bid_price_m1 = 148; // bid price +1 minute
    double ask_price_m1 = 151; // ask price +1 minute
    double prt_price_m1 = 154; // market price +1 minute [mid-quote if not intervening prints;most recent print otherwise]
    float pnl_m1 = 157; // pnl after 1 minute
    YesNo pnl_m1_err = 160;
    double bid_price_m10 = 163; // bid price +10 minutes
    double ask_price_m10 = 166; // bid price +10 minutes
    double prt_price_m10 = 169; // market price +10 minutes [most recent print (if any) otherwise mid-quote]
    float pnl_m10 = 172; // pnl after 10 minutes
    YesNo pnl_m10_err = 175;
    google.protobuf.Timestamp timestamp = 178;
}


