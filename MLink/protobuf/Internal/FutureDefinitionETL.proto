syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 0
    Inputs: Wild Files
    CalcEngine: Spark/ETL
*/    
message FutureDefinitionETL {
    message PKey {
        
        ExpiryKey fkey = 10;
        DateKey trading_date = 11; // all trading dates
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    TickerKey ticker = 100;
    int64 security_iD = 103;
    int64 alt_security_iD = 106; // securityID from alternative vendor
    string security_desc = 109;
    string bberg_sec_key = 112;
    float tick_value = 115;
    float point_value = 118;
    Currency point_currency = 121;
    google.protobuf.Timestamp timestamp = 124;
}


