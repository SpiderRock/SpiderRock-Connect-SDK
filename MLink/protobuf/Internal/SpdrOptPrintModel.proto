syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Encapsulates option model features, outcome and markup (generated by the StateModelServer, used for training and verification)
*/    
message SpdrOptPrintModel {


    MessageMetadata _meta = 1;
    
    OptionKey sec_key = 100;
    BuySell predict_side = 103;
    double predict = 106; // live CPU-computed probability (verify step)
    double predict_cUDA = 109; // live CUDA-computed probability
    double predict_live = 112; // live take price to probability mapping
    double xx0 = 115; // take size relative to total quote size
    double xx1 = 118; // make size relative to total quote size
    double xx2 = 121; // most recent take side size change relative to total quote size
    double xx3 = 124; // most recent make side size change relative to total quote size
    double xx4 = 127; // (takeSize - makeSize) / total quote size
    double xx5 = 130; // take quote age in seconds (time since last quote change; price1 or size1)
    double xx6 = 133; // make quote age in seconds (time since last quote change; price1 or size1)
    double xx7 = 136; // participants on the take side / total quote count
    double xx8 = 139; // participants on the make side / total quote count
    double xx9 = 142; // normalized spread size
    double xx10 = 145; // minuteVol width in quanta increments
    double xx11 = 148; // total quote count
    double xx12 = 151; // age of last take print
    double xx13 = 154; // age of last make print
    double xx14 = 157; // 1 minute net take relative volume
    double xx15 = 160; // 1 minute net take relative volume (all neighbors)
    double xx16 = 163; // spread 150s z-score
    double xx17 = 166; // spread 600s z-score
    double xx18 = 169; // take price normalized surface distance
    double xx19 = 172; // make price normalized surface distance
    double xx20 = 175; // take price normalized 150s mid-point distance
    double xx21 = 178; // make price normalized 150s mid-point distance
    double xx22 = 181; // take price normalized 600s mid-point distance
    double xx23 = 184; // make price normalized 600s mid-point distance
    double xx24 = 187; // take price normalized 150s delta-adjusted take price average distance
    double xx25 = 190; // make price normalized 150s delta-adjusted make price average distance
    double xx26 = 193; // take price normalized 600s delta-adjusted take price average distance
    double xx27 = 196; // make price normalized 600s delta-adjusted make price average distance
    double xx28 = 199; // take price normalized 150s delta-and-surface adjusted take price average distance
    double xx29 = 202; // make price normalized 150s delta-and-surface adjusted make price average distance
    double xx30 = 205; // take price normalized 600s delta-and-surface adjusted take price average distance
    double xx31 = 208; // make price normalized 600s delta-and-surface adjusted make price average distance
    double xx32 = 211; // take price 150s bias (all neighbors)
    double xx33 = 214; // make price 150s bias (all neighbors)
    double xx34 = 217; // take price 600s bias (all neighbors)
    double xx35 = 220; // make price 600s bias (all neighbors)
    double xx36 = 223; // take price 150s normalized bias in vega units
    double xx37 = 226; // make price 150s normalized bias in vega units
    double xx38 = 229; // print size relative to total available size
    double mid_prc = 232; // 0.50 probability price at feature time
    double o_bid = 235; // option bid at feature time
    double o_ask = 238; // option ask at feature time
    double atm_vol = 241; // at-the-money volatility
    double atm_cen = 244; // at-the-money censored volatility
    double surf_vol = 247; // surface volatility
    double surf_prc = 250; // surface price
    double u_prc = 253; // option uPrc at feature time
    double u_bid = 256; // option uBid at feature time
    double u_ask = 259; // option uAsk at feature time
    double de = 262; // option delta
    double ve = 265; // option vega
    double quanta_inc = 268; // quanta increment
    double improve_incr = 271; // tick increment
    double minute_rng = 274; // characteristic 1-minute option price change
    double avg_bid_link10m = 277; // 10-minute average bid-side link value
    double avg_ask_link10m = 280; // 10-minute average ask-side link value
    double mae_bid_link10m = 283; // 10-minute average bid-side link value deviation
    double mae_ask_link10m = 286; // 10-minute average ask-side link value deviation
    double avg_mkt_width10m = 289; // 10-minute average spread
    double avg_bid_prob10m = 292; // 10-minute average bid-side link probability
    double avg_ask_prob10m = 295; // 10-minute average ask-side link probability
    double qp_bid_take = 298; // bid take probability (copied from the most recent QP record)
    double qp_ask_take = 301; // ask take probability (copied from the most recent QP record)
    double qp_bid_impr = 304; // bid improve probability (copied from the most recent QP record)
    double qp_ask_impr = 307; // ask improve probability (copied from the most recent QP record)
    double qp_bid = 310; // option bid (copied from the most recent QP record)
    double qp_ask = 313; // option ask (copied from the most recent QP record)
    double qp_uMid = 316; // option uMid (copied from the most recent QP record)
    double qp_bid_link_zscore10m = 319; // bid-side probability deviation z-score
    double qp_ask_link_zscore10m = 322; // ask-side probability deviation z-score
    double obid_f1 = 325; // option bid at M1
    double oask_f1 = 328; // option ask at M1
    double ubid_f1 = 331; // underlier bid at M1
    double uask_f1 = 334; // underlier ask at M1
    double s_prc_f1 = 337; // surface price at M1
    double s_vol_f1 = 340; // surface volatility at M1
    double obid_f10 = 343; // option bid at M10
    double oask_f10 = 346; // option ask at M10
    double ubid_f10 = 349; // underlier bid at M10
    double uask_f10 = 352; // underlier ask at M10
    double s_prc_f10 = 355; // surface price at M10
    double s_vol_f10 = 358; // surface volatility at M10
    int64 spr_counter = 361; // surface counter
    int64 qte_counter = 364; // quote counter
    int32 market_size = 367; // option nbbo market size
    OptExch prt_exch = 370;
    int32 prt_size = 373; // print size [contracts]
    float prt_price = 376; // print price
    int32 prt_cluster_num = 379; // incremental print cluster counter (one counter per okey; used to group prints into clusters)
    int32 prt_cluster_size = 382; // cumulative size of prints in this sequence (sequence of prints @ same or more aggressive price with less than 25 ms elapsing since first print; can span exchanges)
    PrtType prt_type = 385; // print type
    uint32 prt_orders = 388; // number of participating orders
    int32 prt_volume = 391; // day print volume in contracts [this exchange]
    int32 cxl_volume = 394; // day print/cancel volume (num of contracts printed and then cancelled)
    uint32 bid_count = 397; // number of bid prints
    uint32 ask_count = 400; // number of ask prints
    int32 bid_volume = 403; // bid print volume in contracts
    int32 ask_volume = 406; // ask print volume in contracts
    float p_bid_price = 409;
    float p_ask_price = 412;
    float p_bid_price2 = 415;
    float p_ask_price2 = 418;
    int32 p_bid_size = 421;
    int32 p_ask_size = 424;
    int32 p_cum_bid_size = 427;
    int32 p_cum_ask_size = 430;
    int32 p_cum_bid_size2 = 433;
    int32 p_cum_ask_size2 = 436;
    int64 p_bid_mask = 479;
    int64 p_ask_mask = 480;
    float ebid = 445; // exchange bid (@ print time)
    float eask = 448; // exchange ask (@ print time)
    int32 ebsz = 451; // exchange bid size
    int32 easz = 454; // exchange ask size
    float eage = 457; // age of prevailing quote at time of print
    PrtSide prt_side = 460; // implied print side (based on ebid/eask and nbbo market)
    int64 prt_src_timestamp = 463; // print exchange high precision timestamp (if available)
    int64 prt_net_timestamp = 466; // print inbound packet PTP timestamp from SR gateway switch;usually syncronized with facility grandfather clock
    int64 oq_src_timestamp = 469; // quote exchange high precision timestamp (if available)
    int64 oq_net_timestamp = 472; // quote inbound packet PTP timestamp from SR gateway switch;usually syncronized with facility grandfather clock
    int64 qp_net_timestamp = 475; // probability inbound packet PTP timestamp from SR gateway switch;usually syncronized with facility grandfather clock
    google.protobuf.Timestamp timestamp = 478; // feature capture timestamp
}


