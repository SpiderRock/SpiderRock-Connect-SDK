syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridAllocParentAllocDetail {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int64 base_parent_number = 100;
    string omni_accnt = 101;
    string client_firm = 102;
    string sec_key = 103; // conditionally formatted secKey based on secType
    SpdrKeyType sec_type = 104;
    string mleg_leg_key = 105; // [secKey;legRatio;side;positionEffect, ...]
    BuySell order_side = 106;
    ShortSaleFlag ssale_flag = 107;
    PositionType position_type = 108;
    SpdrSource spdr_source = 109;
    int64 grouping_code = 110;
    AllocationRule allocation_rule = 111;
    YesNo ready_to_send = 112; // indicates allocation is ready to forward to custodian
    AllocStatus alloc_status = 113;
    string alloc_detail = 114;
    string fragments = 115; // flattened fragment list (allocAccnt:allocFraction:allocSize, ...)
    string modified_by = 116;
    SysEnvironment modified_in = 117;
    google.protobuf.Timestamp timestamp = 118;
    YesNo is_prod = 119; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 120; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 121; // WTS synthetic: alert message (null if no alert)
}


