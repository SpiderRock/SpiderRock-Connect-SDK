syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Encapsulates option model features, outcome and markup (generated by the MarkupModelServer, used for training and verification)
*/    
message SpdrOptMarkupModel {


    MessageMetadata _meta = 1;
    
    OptionKey sec_key = 100;
    double bid = 103; // option bid @ print time
    double ask = 106; // option ask @ print time
    double bid2 = 109; // option 2nd level bid @ print time
    double ask2 = 112; // option 2nd level ask @ print time
    int32 cum_bid_size = 115; // option bid size @ print time
    int32 cum_ask_size = 118; // option ask size @ print time
    int32 cum_bid_size2 = 121; // option 2nd level bid size @ print time
    int32 cum_ask_size2 = 124; // option 2nd level ask size @ print time
    int32 o_bid_count = 127; // option bid count @ print time
    int32 o_ask_count = 130; // option ask count @ print time
    double u_bid = 133; // underlier bid @ feature time
    double u_ask = 136; // underlier ask @ feature time
    double atm_vol = 139; // at-the-money volatility @ feature time
    double atm_cen = 142; // at-the-money censored volatility @ feature time
    double surf_vol = 145; // surface volatility @ feature time
    double surf_prc = 148; // surface price @ feature time
    int32 bid_print_volume = 151; // bid print volume in contracts
    int32 ask_print_volume = 154; // ask print volume in contracts
    int64 bid_mask = 491; // bid mask at the end of the cluster
    int64 ask_mask = 492; // ask mask at the end of the cluster
    double de = 163; // option delta @ feature time
    double ga = 166; // option gamma @ feature time
    double ve = 169; // option vega @ feature time
    double th = 172; // option theta @ feature time
    int32 prt_size = 175; // print cluster size [contracts]
    float prt_fist_price = 178; // print cluster first price
    float prt_last_price = 181; // print cluster last price
    PrtType prt_type = 184; // print type
    uint32 prt_orders = 187; // number of participating orders
    int32 prt_volume = 190; // day print volume in contracts [this exchange]
    int32 cxl_volume = 193; // day print/cancel volume (num of contracts printed and then cancelled)
    double quanta_inc = 196; // quanta increment
    double improve_incr = 199; // tick increment
    double minute_rng = 202; // characteristic 1-minute option price change
    double avg_mkt_width10m = 205; // 10-minute average spread
    int64 prt_min_src_timestamp = 208; // print cluster minimum exchange high precision timestamp (if available)
    int64 prt_max_src_timestamp = 211; // print cluster maximum exchange high precision timestamp (if available)
    int64 prt_min_net_timestamp = 214; // print cluster minimum inbound packet PTP timestamp from SR gateway switch;usually syncronized with facility grandfather clock
    int64 prt_max_net_timestamp = 217; // print cluster maximum inbound packet PTP timestamp from SR gateway switch;usually syncronized with facility grandfather clock
    int64 oq_net_timestamp = 220; // quote inbound packet PTP timestamp from SR gateway switch;usually syncronized with facility grandfather clock
    google.protobuf.Timestamp timestamp = 223; // feature capture timestamp
    double predict = 226; // live CPU-computed print-to-midMktE30 vol change prediction (verify step)
    double predict_cUDA = 229; // live CUDA-computed print-to-midMktE30 vol change prediction
    double mid_market_e30_f10 = 232; // 30-minute exponential moving average of the option mid-price at M10
    double obid_f10 = 235; // option bid at M10
    double oask_f10 = 238; // option ask at M10
    double ubid_f10 = 241; // underlier bid at M10
    double uask_f10 = 244; // underlier ask at M10
    double s_prc_f10 = 247; // surface price at M10
    double s_vol_f10 = 250; // surface volatility at M10
    double xx0 = 253; // uMidMkt relative to uMidMktE1
    double xx1 = 256; // uMidMkt relative to uMidMktE5
    double xx2 = 259; // uMidMkt relative to uMidMktE30
    double xx3 = 262; // uMidMkt relative to uMidMktE300
    double xx4 = 265; // last uPrt relative to uMidMkt
    double xx5 = 268; // last uPrt age
    double xx6 = 271; // uPrtSizeE30 size relative to total E30 size
    double xx7 = 274; // uPrtSizeE300 size relative to total E300 size
    double xx8 = 277; // years
    double xx9 = 280; // abs(delta)
    double xx10 = 283; // 5 day Expiry Option $ Print Volume (10 buckets; integers)
    double xx11 = 286; // 5 day Avg Daily Underlier $ Print Volume (10 buckets; integers)
    double xx12 = 289; // prtType
    double xx13 = 292; // print surf edge (vol units)
    double xx14 = 295; // print surfE30 edge (vol units)
    double xx15 = 298; // print surfE300 edge (vol units)
    double xx16 = 301; // surf-to-surfE30 change (vol units)
    double xx17 = 304; // surf-to-surfE300 change (vol units)
    double xx18 = 307; // atmVol
    double xx19 = 310; // atm-to-atmE30 change (vol units)
    double xx20 = 313; // atm-to-atmE30 change (vol units)
    double xx21 = 316; // atm-to-atmE300 change (vol units)
    double xx22 = 319; // mktWidth (vol units)
    double xx23 = 322; // mktWidthE30 (vol units)
    double xx24 = 325; // mktWidthE300 (vol units)
    double xx25 = 328; // nbbo size imbalance
    double xx26 = 331; // nbbo size imbalance E30
    double xx27 = 334; // nbbo size imbalance E300
    double xx28 = 337; // bidCount
    double xx29 = 340; // bidCount-to-bidCountE30 change
    double xx30 = 343; // bidCount-to-bidCountE300 change
    double xx31 = 346; // askCount
    double xx32 = 349; // askCount-to-askCountE30 change
    double xx33 = 352; // askCount-to-askCountE300 change
    double xx34 = 355; // nbbo count imbalance
    double xx35 = 358; // nbbo count imbalance E30
    double xx36 = 361; // nbbo count imbalance E300
    double xx37 = 364; // prtExch in bidMask
    double xx38 = 367; // prtExch in askMask
    double xx39 = 370; // print bid edge (vol units)
    double xx40 = 373; // print bidE30 edge (vol units)
    double xx41 = 376; // print bidE300 edge (vol units)
    double xx42 = 379; // print ask edge (vol units)
    double xx43 = 382; // print askE30 edge (vol units)
    double xx44 = 385; // print askE300 edge (vol units)
    double xx45 = 388; // printSize to bidSize ratio
    double xx46 = 391; // printSize to bidSizeE30 ratio
    double xx47 = 394; // printSize to bidSizeE300 ratio
    double xx48 = 397; // printSize to askSize ratio
    double xx49 = 400; // printSize to askSizeE30 ratio
    double xx50 = 403; // printSize to askSizeE300 ratio
    double xx51 = 406; // count of prints in the cluster
    double xx52 = 409; // cluster last print-to-avgPrint price edge (vol units)
    double xx53 = 412; // bidCount @ sequence start
    double xx54 = 415; // askCount @ sequence start
    double xx55 = 418; // cumulative cluster print size to bid size @ sequence start
    double xx56 = 421; // cumulative cluster print size to ask size @ sequence start
    double xx57 = 424; // spyAtmBetaE5d
    double xx58 = 427; // same expiry SPY atm-to-atmE30 change relative to expiry atm-to-atmE30 change
    double xx59 = 430; // same expiry SPY atm-to-atmE300 change relative to expiry atm-to-atmE300 change
    double xx60 = 433; // prev expiry bid-to-bidE30 change relative to expiry bid-to-bidE30 change (vol units)
    double xx61 = 436; // prev expiry bid-to-bidE300 change relative to expiry bid-to-bidE300 change (vol units)
    double xx62 = 439; // prev expiry ask-to-askE30 change relative to expiry ask-to-askE30 change (vol units)
    double xx63 = 442; // prev expiry ask-to-askE300 change relative to expiry ask-to-askE300 change (vol units)
    double xx64 = 445; // next expiry bid-to-bidE30 change relative to expiry bid-to-bidE30 change (vol units)
    double xx65 = 448; // next expiry bid-to-bidE300 change relative to expiry bid-to-bidE300 change (vol units)
    double xx66 = 451; // next expiry ask-to-askE30 change relative to expiry ask-to-askE30 change (vol units)
    double xx67 = 454; // next expiry ask-to-askE300 change relative to expiry ask-to-askE300 change (vol units)
    double xx68 = 457; // prev expiry atm-to-atmE30 change relative to expiry atm-to-atmE30 change (vol units)
    double xx69 = 460; // prev expiry atm-to-atmE30 change relative to expiry atm-to-atmE300 change (vol units)
    double xx70 = 463; // prev expiry atm-to-atmE30 change relative to expiry atm-to-atmE30 change (vol units)
    double xx71 = 466; // prev expiry atm-to-atmE30 change relative to expiry atm-to-atmE300 change (vol units)
    double xx72 = 469; // same expiry QQQ atm-to-atmE30 change relative to expiry atm-to-atmE30 change
    double xx73 = 472; // same expiry QQQ atm-to-atmE300 change relative to expiry atm-to-atmE300 change
    double xx74 = 475; // surf to bid edge (vol units)
    double xx75 = 478; // surf to ask edge (vol units)
    double xx76 = 481; // xAxis //xDe
    double xx77 = 484; // cluster print price range (vol units)
    double xx78 = 487; // first-to-second level bid size imbalance
    double xx79 = 490; // first-to-second level ask size imbalance
}


