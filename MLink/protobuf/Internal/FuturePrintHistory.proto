syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message FuturePrintHistory {
    message PKey {
        
        ExpiryKey fkey = 10;
        int32 tick_number = 11; // tickNumber = price / minTickSize
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    double price = 100;
    double min_tick_size = 103;
    int32 up_quan_d = 106; // all day
    int32 dn_quan_d = 109;
    double up_quan_r = 112; // recent period (about 10 minutes)
    double dn_quan_r = 115;
    google.protobuf.Timestamp timestamp = 118;
}


