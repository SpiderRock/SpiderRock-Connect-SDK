syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridMarRiskControl {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string c_firm = 100; // If exists, a client firm imposing risk controls (should be an existing SR client ID)
    string risk_group = 101; // The ID of the risk group these rules will apply to
    YesNo is_test_accnt = 102; // If Yes, this control applies only to risk for test accounts
    MarState stk_enabled = 103; // Enabled or not for equities (None=disabled)
    MarState fut_enabled = 104; // Enabled or not for futures (None=disabled)
    MarState opt_enabled = 105; // Enabled or not for options (None=disabled)
    float margin_limit_acc = 106; // Maximum net (per symbol) total portfolio (start-of-day positions + day trades) margin (can include external sources)
    float margin_limit_day = 107; // Maximum net (per symbol/day) day portfolio (day trades only) margin (can include external sources)
    float open_exposure_limit = 108; // Maximum abs open child order $Delta (no netting) (open child orders only)
    int32 max_acc_fut_cn_abs = 109; // Maximum absolute (net) account future contracts
    int32 max_day_fut_cn_bot = 110; // Day future contracts bot
    int32 max_day_fut_cn_sld = 111; // Day future contracts sld
    int32 max_day_fut_cn_abs = 112; // Maximum absolute (net) day future contracts
    int32 order_max_stk_qty = 113; // Number of equity shares that can be bought or sold by a single parent order
    int32 order_max_fut_qty = 114; // Number of futures contracts that can be bought or sold by a single parent order
    int32 order_max_opt_qty = 115; // Number of option contracts that can be bought or sold by a single parent order
    float order_max_stk_dDelta = 116; // Maximum (abs) mny per stock parent order; ddelta = shares * pointValue * midPrc
    float order_max_fut_dDelta = 117; // Maximum (abs) mny per future parent order; ddelta = contracts * pointValue * midPrc
    float order_max_opt_dDelta = 118; // Maximum (abs) mny per option parent order; ddelta = contracts * pointValue * ABS(de) * uMidPrc
    float stk_collar_pct = 119; // Maximum user limit vs bid/ask price control - percentage as a number between 0 and 1 in decimals
    float fut_collar_pct = 120; // Maximum user limit vs bid/ask price control - percentage as a number between 0 and 1 in decimals
    float opt_collar_pct = 121; // Maximum user limit vs bid/ask price control - percentage as a number between 0 and 1 in decimals
    YesNo allow_stk_odd_lots = 122; // Allow parent stock orders with an order size below 100
    YesNo allow_limit_on_close = 123; // Allow limit on close orders - similar to MOC order, with the addition of a price limit
    YesNo allow_market_on_close = 124; // Allow market on close orders - special order type which is executed as close to the close of trading as possible
    YesNo allow_inter_market_sweep = 126; // Allow intermarket sweep orders
    YesNo block_short_sales = 127; // Block all short sales
    string modified_by = 128; // User that last modified this record
    SysEnvironment modified_in = 129; // Environment this record was last updated in
    google.protobuf.Timestamp last_modified = 130; // Timestamp of this record
    SysRealm sys_realm = 131;
    SysEnvironment sys_environment = 132; // original (source) sys environment [Stable, Current, etc]
    string risk_engine = 133; // EE engine name
    float live_margin_acc = 134; // live net (per symbol) total portfolio (start-of-day positions + day trades) margin (can include external sources)
    float live_margin_day = 135; // live net (per symbol) day portfolio (day trades only) margin (can include external sources)
    float live_open_exposure = 136; // live abs open child order $Delta (no netting) (open child orders only)
    int32 day_fut_cn_bot = 137; // day future contracts bot
    int32 day_fut_cn_sld = 138; // day future contracts sld
    int32 acc_fut_cn_net = 139; // accnt future contracts (net) [can be +/-] (start-of-day positions + day trades)
    float day_margin_uDn_vDn = 140; // day margin (UPrcDn/VolDn)
    float day_margin_uDn_vUp = 141; // day margin (UPrcDn/VolUp)
    float day_margin_uUp_vDn = 142; // day margin (UPrcUp/VolDn)
    float day_margin_uUp_vUp = 143; // day margin (UPrcUp/VolUp)
    float acc_margin_uDn_vDn = 144; // acc margin (UPrcDn/VolDn)
    float acc_margin_uDn_vUp = 145; // acc margin (UPrcDn/VolUp)
    float acc_margin_uUp_vDn = 146; // acc margin (UPrcUp/VolDn)
    float acc_margin_uUp_vUp = 147; // acc margin (UPrcUp/VolUp)
    int32 counter = 148;
    google.protobuf.Timestamp timestamp = 149; // timestamp of latest change
    YesNo is_prod = 150; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 151; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 152; // WTS synthetic: alert message (null if no alert)
}


