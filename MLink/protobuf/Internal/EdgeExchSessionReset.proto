syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    risk controller
*/    
message EdgeExchSessionReset {
    message PKey {
        
        string routing_code = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    RouteControl route_control = 100; // used to reset line integrity errors and to force into readonly or disconnected mode
    google.protobuf.Timestamp timestamp = 103;
}


