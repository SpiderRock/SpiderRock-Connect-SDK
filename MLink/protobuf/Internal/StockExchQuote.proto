syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


    
message StockExchQuote {
    message PKey {
        
        TickerKey ticker = 10;
        StkExch exch = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int64 exch_mask = 128; // exchange mask
    float bid_price = 103; // bid price
    float ask_price = 106; // ask price
    int32 bid_size = 109; // bid size in shares
    int32 ask_size = 112; // ask size in shares
    int32 bid_time = 115; // last bid price change (milliseconds since midnight)
    int32 ask_time = 118; // last ask price change (milliseconds since midnight)
    int32 quote_cond = 121; // feed quote condition
    int64 sequence_number = 124; // packet sequence number (inbound feed)
    int64 net_timestamp = 127; // inbound packet PTP timestamp from SR gateway switch;usually syncronized with facility grandfather clock
}


