syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 2
    Inputs: StockDividendHistoryETL + StockDividendForecastETL
    CalcEngine: Spark/ETL
*/    
message StockDividendFullETL {
    message PKey {
        
        TickerKey ticker = 10;
        DateKey trade_date = 11; // dividend ex-date
    }

    message Forecast {
        
        DateKey div_date = 107; // future div date (in the future relative to pkey.divDate)
        float div_value = 108; // dividend payment amount
        string div_currency = 109;
        DivKind div_kind = 110;
        DivFreq div_freq = 111;
    }

    message History {
        
        DateKey div_date = 101; // dividend date
        float div_value = 102; // dividend payment amount
        string div_currency = 103;
        DivKind div_kind = 104;
        DivFreq div_freq = 105;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    google.protobuf.Timestamp timestamp = 112;
    repeated Forecast forecast = 106;
    repeated History history = 100;
}


