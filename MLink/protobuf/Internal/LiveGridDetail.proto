syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;


    
message LiveGridDetail {
    message PKey {
        
        LiveGridDataSet d_set = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string rows = 100; // result dkeys (in order): dKey,dKey,dKey,... [max 100]
    int32 total_rows = 101; // number of rows sent in this message given current LiveGridDetailVset
    int32 st_pos = 102; // start position (reflected from LiveGridDetailVset)
}


