syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Encapsulates option model features, outcome and markup (generated by the OptMarketModelServer, used for training and verification)
*/    
message SpdrOptMarketEvent {


    MessageMetadata _meta = 1;
    
    OptionKey okey = 100;
    double c_bid_price = 103; // call bid @ print time
    double c_ask_price = 106; // call ask @ print time
    double p_bid_price = 109; // put bid @ print time
    double p_ask_price = 112; // put ask @ print time
    int32 c_bid_size = 115; // call (cumulative) bid size @ print time
    int32 c_ask_size = 118; // call (cumulative) ask size @ print time
    int32 p_bid_size = 121; // put (cumulative) bid size @ print time
    int32 p_ask_size = 124; // put (cumulative) ask size @ print time
    double u_bid = 127; // underlier bid @ print time
    double u_ask = 130; // underlier ask @ print time
    double surf_vol = 133; // surface volatility @ feature time
    double surf_sDiv = 136; // surface SDiv value
    double c_surf_prc = 139; // call surface price @ feature time
    double p_surf_prc = 142; // put surface price @ feature time
    double atm_vol_sPY = 145; // SPY atm volatility @ feature time
    double atm_vol_qQQ = 148; // QQQ atm volatility @ feature time
    double c_de = 151; // call delta @ feature time
    double c_ga = 154; // call gamma @ feature time
    double c_ve = 157; // call vega @ feature time
    double p_de = 160; // put delta @ feature time
    double p_ga = 163; // put gamma @ feature time
    double p_ve = 166; // put vega @ feature time
    int32 c_prt_size = 169; // call print cluster size [contracts]
    double c_prt_price = 172; // call print type
    int32 p_prt_size = 175; // put print cluster size [contracts]
    double p_prt_price = 178; // put print type
    float c_prt_avg_price = 181; // call cumulative print cluster avg price
    float p_prt_avg_price = 184; // put cumulative print cluster avg price
    int32 prt_step_count = 187; // step counter at time print occured
    google.protobuf.Timestamp timestamp = 190; // feature capture timestamp
    google.protobuf.Timestamp timestamp_m10 = 193; // M10 markup timestamp
    double predict_sVol = 196; // fair sVol (verify step)
    double predict_sDiv = 199; // fair sDiv (verify step)
    double predict_dv_dx = 202; // fair dVol / dUPrc (verify step)
    double predict_cPrt_width = 205; // fair call width (std of predictFair error) prediction (verify step)
    double predict_pPrt_width = 208; // fair put width (std of predictFair error) prediction (verify step)
    double predict_cOpt_impact = 211; // option market impact (verify step)
    double predict_pOpt_impact = 214; // option market impact (verify step)
    double predict_cStk_impact = 217; // stock market impact (verify step)
    double predict_pStk_impact = 220; // stock market impact (verify step)
    int32 predict_step_count = 223; // step counter when predict inputs captured (should usually be same as prtStepCount)
    double predict_cPrice = 226; // predict call fair price (corresponds to predictFairVol)
    double predict_pPrice = 229; // predict put fair price (corresponds to predictFairVol)
    double u_mid_e30_m10 = 232; // 30-second ema of the stock mid-price @ M10
    double c_mid_e30_m10 = 235; // 30-second uPrc adjusted ema of the call mid-price @ M10
    double p_mid_e30_m10 = 238; // 30-second uPrc adjusted ema of the put mid-price @ M10
    double s_vol_e30_m10 = 241; // 30-second ema of the surface vol @ M10
    double c_surf_prc_e30_m10 = 244; // 30-second uPrc adjusted ema of the call surface price
    double p_surf_prc_e30_m10 = 247; // 30-second uPrc adjusted ema of the put surface price
    double surf_vol_m10 = 250; // surface vol @ M10
    double surf_sDiv_m10 = 253; // surface SDiv @ M10
    double c_surf_prc_m10 = 256; // call surface price @ M10
    double p_surf_prc_m10 = 259; // put surface price @ M10
    double c_prt_vol_edge_std_m10 = 539; // call print surface edge standard deviation (vol units) @ M10
    double p_prt_vol_edge_std_m10 = 540; // put print surface edge standard deviation (vol units) @ M10
    double u_prc_m10 = 262; // uPrc @ M10
    double f_u_mid = 265;
    double f_u_mid_ret_e1 = 268; // uMidMkt relative to uMidMktE1
    double f_u_mid_ret_e5 = 271; // uMidMkt relative to uMidMktE5
    double f_u_mid_ret_e30 = 274; // uMidMkt relative to uMidMktE30
    double f_u_mid_ret_e300 = 277; // uMidMkt relative to uMidMktE300
    double f_u_prt_mid_ret = 280; // last uPrt relative to uMidMkt
    double f_last_uPrt_age = 283; // last uPrt age
    double f_years = 286; // years
    double f_atm_vol = 289; // atmVol
    double f_surf_sDiv = 292; // surface SDiv
    double f_surf_sDiv_e30 = 295; // surface SDivE30
    double f_surf_sDiv_e300 = 298; // surface SDivE300
    double f_spy_atm_vol_chg_e30 = 301; // same expiry SPY atm-to-atmE30 change
    double f_spy_atm_vol_chg_e300 = 304; // same expiry SPY atm-to-atmE300 change
    double f_qqq_atm_vol_chg_e30 = 307; // same expiry QQQ atm-to-atmE30 change
    double f_qqq_atm_vol_chg_e300 = 310; // same expiry QQQ atm-to-atmE300 change
    double f_c_xVe = 313; // call surface vega / uMid
    double f_p_xVe = 316; // put surface vega / uMid
    double f_c_xDe = 319; // call xDe
    double f_p_xDe = 322; // put xDe
    double f_c_delta = 325; // call delta
    double f_p_delta = 328; // put delta
    int32 f_c_prt_count = 331; // number of call prints in the current sequence (1 - N)
    int32 f_p_prt_count = 334; // number of put prints in the current sequence (1 - N)
    double f_c_prt_impact = 337; // call: (last print price - avg sequence print price) / uMid
    double f_p_prt_impact = 340; // put: (last print price - avg sequence print price) / uMid
    double f_c_prt_surf_edge = 343; // call print surf edge / uMid
    double f_c_prt_surf_edge_e30 = 346; // call print surfE30 edge / uMid
    double f_c_prt_surf_edge_e300 = 349; // call print surfE300 edge / uMid
    double f_p_prt_surf_edge = 352; // put print surf edge / uMid
    double f_p_prt_surf_edge_e30 = 355; // put print surfE30 edge / uMid
    double f_p_prt_surf_edge_e300 = 358; // put print surfE300 edge / uMid
    double f_c_surf_chg_e30 = 361; // call surf-to-surfE30 change / uMid
    double f_c_surf_chg_e300 = 364; // call surf-to-surfE300 change / uMid
    double f_p_surf_chg_e30 = 367; // put surf-to-surfE30 change / uMid
    double f_p_surf_chg_e300 = 370; // put surf-to-surfE300 change / uMid
    double f_c_surf_bid_edge = 373; // call surf to bid edge / uMid
    double f_c_surf_ask_edge = 376; // call surf to ask edge / uMid
    double f_p_surf_bid_edge = 379; // put surf to bid edge / uMid
    double f_p_surf_ask_edge = 382; // put surf to ask edge / uMid
    double f_atm_vol_chg_e30 = 385; // atm-to-atmE30 change / uMid
    double f_atm_vol_chg_e300 = 388; // atm-to-atmE300 change / uMid
    double f_c_mkt_width = 391; // call mktWidth / uMid
    double f_c_mkt_width_e30 = 394; // call mktWidthE30 / uMid
    double f_c_mkt_width_e300 = 397; // call mktWidthE300 / uMid
    double f_p_mkt_width = 400; // put mktWidth / uMid
    double f_p_mkt_width_e30 = 403; // put mktWidthE30 / uMid
    double f_p_mkt_width_e300 = 406; // put mktWidthE300 / uMid
    int32 f_c_bid_count = 409; // call bidCount
    double f_c_bid_count_e30 = 412; // call bidCountE30
    double f_c_bid_count_e300 = 415; // call bidCountE300
    int32 f_p_bid_count = 418; // put bidCount
    double f_p_bid_count_e30 = 421; // put bidCountE30
    double f_p_bid_count_e300 = 424; // put bidCountE300
    int32 f_c_ask_count = 427; // call askCount
    double f_c_ask_count_e30 = 430; // call askCountE30
    double f_c_ask_count_e300 = 433; // call askCountE300
    int32 f_p_ask_count = 436; // put askCount
    double f_p_ask_count_e30 = 439; // put askCountE30
    double f_p_ask_count_e300 = 442; // put askCountE300
    double f_c_prt_bid_edge = 445; // call print bid edge / uMid
    double f_c_prt_bid_edge_e30 = 448; // call print bidE30 edge / uMid
    double f_c_prt_bid_edge_e300 = 451; // call print bidE300 edge / uMid
    double f_p_prt_bid_edge = 454; // put print bid edge / uMid
    double f_p_prt_bid_edge_e30 = 457; // put print bidE30 edge / uMid
    double f_p_prt_bid_edge_e300 = 460; // put print bidE300 edge / uMid
    double f_c_prt_ask_edge = 463; // call print ask edge / uMid
    double f_c_prt_ask_edge_e30 = 466; // call print askE30 edge / uMid
    double f_c_prt_ask_edge_e300 = 469; // call print askE300 edge / uMid
    double f_p_prt_ask_edge = 472; // put print ask edge / uMid
    double f_p_prt_ask_edge_e30 = 475; // put print askE30 edge / uMid
    double f_p_prt_ask_edge_e300 = 478; // put print askE300 edge / uMid
    double f_c_prt_bid_size_ratio = 481; // call printSize to bidSize ratio
    double f_c_prt_bid_size_ratio_e30 = 484; // call printSize to bidSizeE30 ratio
    double f_c_prt_bid_size_ratio_e300 = 487; // call printSize to bidSizeE300 ratio
    double f_p_prt_bid_size_ratio = 490; // put printSize to bidSize ratio
    double f_p_prt_bid_size_ratio_e30 = 493; // put printSize to bidSizeE30 ratio
    double f_p_prt_bid_size_ratio_e300 = 496; // put printSize to bidSizeE300 ratio
    double f_c_prt_ask_size_ratio = 499; // call printSize to askSize ratio
    double f_c_prt_ask_size_ratio_e30 = 502; // call printSize to askSizeE30 ratio
    double f_c_prt_ask_size_ratio_e300 = 505; // call printSize to askSizeE300 ratio
    double f_p_prt_ask_size_ratio = 508; // put printSize to askSize ratio
    double f_p_prt_ask_size_ratio_e30 = 511; // put printSize to askSizeE30 ratio
    double f_p_prt_ask_size_ratio_e300 = 514; // put printSize to askSizeE300 ratio
    int32 f_c_cnt = 517;
    int32 f_p_cnt = 520;
    double f_c_bid_miss_ratio = 523;
    double f_c_ask_miss_ratio = 526;
    double f_p_bid_miss_ratio = 529;
    double f_p_ask_miss_ratio = 532;
    TradeableStatus f_tradeable_status = 535; // indicates whether the surface is currently tradeable or not (all server surface integrity checks pass)
    SurfaceResult f_surface_result = 538;
}


