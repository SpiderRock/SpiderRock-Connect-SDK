syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LSSCAtmStkEvent {
    message PKey {
        
        TickerKey ticker = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string app_name = 100;
    string stripe = 103;
    AtmStkResult result = 106;
    string detail = 109;
    int32 num_expiries = 112;
    int32 num_tradeable = 115;
    int32 num_surface_ok = 118;
    int32 num_surface_err = 121;
    int32 num_passes = 124;
    double sum_elapsed = 127;
    double max_elapsed = 130;
    google.protobuf.Timestamp timestamp = 133;
}


