syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LSSCCurveStkEvent {
    message PKey {
        
        TickerKey ticker = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string app_name = 100;
    string stripe = 103;
    CurveStkResult result = 106;
    string detail = 109;
    CurveStkResult close_result = 112;
    CurveStkResult rotate_result = 115;
    int32 num_expiries = 118;
    int32 num_tradeable = 121;
    int32 num_surface_ok = 124;
    int32 num_surface_err = 127;
    int32 num_passes = 130;
    double sum_elapsed = 133;
    double max_elapsed = 136;
    google.protobuf.Timestamp timestamp = 139;
}


