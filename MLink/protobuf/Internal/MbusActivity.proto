syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message MbusActivity {


    MessageMetadata _meta = 1;
    
    string message_type = 100;
    string channel = 103;
    string header_bits = 106;
    uint32 app_iD = 109;
    int32 num_received = 112;
    string channel_type = 115;
    string stripe = 118;
    string app_name = 121;
    string machine_name = 124;
    google.protobuf.Timestamp timestamp = 127;
}


