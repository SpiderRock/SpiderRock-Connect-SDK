    float beta_qQQ = 5008; // v7 & v8 --- Original comment: SR beta [2 year; weekly (fri - fri)]
    float beta_qQQ__r2 = 5009; // v7 & v8 --- Original comment: SR beta R2 [2 year; weekly (fri - fri)]
    float beta_iWM = 5010; // v7 & v8 --- Original comment: SR beta [2 year; weekly (fri - fri)]
    float beta_iWM__r2 = 5011; // v7 & v8 --- Original comment: SR beta R2 [2 year; weekly (fri - fri)]
    float beta_eEM = 5012; // v7 & v8 --- Original comment: SR beta [2 year; weekly (fri - fri)]
    float beta_eEM__r2 = 5013; // v7 & v8 --- Original comment: SR beta R2 [2 year; weekly (fri - fri)]
