    float beta_r2_b = 5023; // v7 & v8 --- Original comment: joint R2 value for the TickerA + TickerB
    float beta_sPY1y = 5024; // v7 & v8 --- Original comment: SR beta [1 year; weekly (fri - fri)]
    float beta_sPY1y__r2 = 5025; // v7 & v8 --- Original comment: SR beta R2 [1 year; weekly (fri - fri)]
