syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridAllocOmniSingleDetail {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string omni_accnt = 100;
    string client_firm = 101;
    string sec_key = 102; // conditionally formatted secKey based on secType
    SpdrKeyType sec_type = 103;
    BuySell order_side = 104;
    ShortSaleFlag ssale_flag = 105;
    PositionType position_type = 106;
    SpdrSource spdr_source = 107;
    int64 grouping_code = 108;
    int64 base_parent_number = 109;
    int32 cum_fill_qty = 110;
    double avg_fill_prc = 111;
    OmniAllocStatus alloc_status = 112;
    google.protobuf.Timestamp timestamp = 113;
    YesNo is_prod = 114; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 115; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 116; // WTS synthetic: alert message (null if no alert)
}


