syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


/*
    user-to-edge
*/    
message EdgeExpiry {
    message PKey {
        
        ExpiryKey ekey = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    ExpiryKey und_key = 100; // TickerKey or ExpiryKey
    SpdrKeyType und_type = 103; // stock or future
    int32 years_c = 106; // fixed.6
    int32 years_v = 109; // fixed.6
    int32 rate = 112; // fixed.6
    int32 point_value = 115; // fixed.4
    int64 timestamp = 118;
}


