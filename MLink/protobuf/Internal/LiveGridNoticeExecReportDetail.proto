syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridNoticeExecReportDetail {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }

    message OrderLegs {
        
        OptionKey sec_key = 146;
        SpdrKeyType sec_type = 147;
        BuySell side = 148;
        int32 ratio = 149;
        LegPositionType position_type = 150;
        int32 leg_cum_fill_qty = 151;
        double leg_avg_fill_price = 152;
        int32 leg_cum_cmpl_qty = 153;
        double leg_avg_cmpl_price = 154;
        OptionKey leg_cmpl_sec_key = 155; // final settlement secKey (contract that DAC, TAS, TACO, etc. will convert to; might not be valid until completed)
        SpdrKeyType leg_cmpl_sec_type = 156; // usually Future or Option (None if not yet valid)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int64 notice_number = 100; // AuctionNotice.noticeNumber
    int64 base_parent_number = 101;
    TickerKey ticker = 102; // underlier ticker
    DateKey trade_date = 103; // tradeDate
    string accnt = 104; // SR Accnt
    string client_firm = 105; // SR ClientFirm
    google.protobuf.Timestamp notice_dttm = 106; // either notice create datetime or notice arrival@SR datetime (high precision)
    string response_id = 107; // from NoticeResponse.responseId (most recently processed response to noticeNumber for this accnt/clientFirm pair)
    SpdrSource spdr_source = 108; // AutoResponder, MLINK, FIX, ICEChat, TradeAp responders
    SpdrStageType stage_type = 109; // ats order staged or not
    AuctionType auction_type = 110; // Exch Exposure, Exch Price Improve, Exch Facilitation, Exch Solicitation, SR ATS Block, SR ATS Flash
    AuctionSource auction_source = 111; // Source of the auction notice (eg. SRC, CBOE, MIAX, etc.)
    google.protobuf.Timestamp create_dttm = 112; // ats order arrival dttm (high precision)
    BuySell side = 113;
    int32 size = 114;
    int32 active_size = 115; // active order size (zero for ActiveHold)
    ReachRule reach_rule = 116; // size condition
    double ref_price = 117; // effPrice = price + de * (uMid - refUPrc) + 0.5 * ga * (uMid - refUPrc)^2
    double ref_uPrc = 118; // reference price for tied to underlier orders
    URefType u_ref_type = 119; // type of reference price (uBid, uAsk, uMid)
    float ref_de = 120; // reference delta for tied to underlier orders
    float ref_ga = 121; // reference gamma for tied to underlier orders
    RoundRule round_rule = 122; // Exact (100%) or Fuzzy (90%) [default is Exact]
    double step_up_incr = 123; // additional price increment (best price) (only used if auction is competitive)
    int64 risk_group_id = 124; // associated riskGroupID (and SpdrRiskGroupControl) (if any)
    string strategy = 125; // user strategy field (visible on SR tools)
    string user_data1 = 126; // user data field (free text) (from NoticeResponse)
    SpdrOrderStatus order_status = 127; // ats order status
    string order_detail = 128; // additional detail
    double last_uPrc = 129; // effective uPrc (mid-market) from last trial pass
    double last_trial_prc = 130; // effective response price from last trial pass
    int32 leaves_qty = 131; // open order quantity
    int32 cum_fill_qty = 132; // pkg cumFillQty if MLeg
    double avg_fill_price = 133; // pkg avgFillPrice if MLeg
    CompletionType completion_type = 134; // None, DAC, POC, TAS, TACO, BTIC
    CompletionState completion_state = 135;
    double avg_completion_price = 136; // completion trade price (final trade price) [also avg completion price]
    double add_latency = 137; // latency from notice arrival@SR to external response send (in seconds) OR latency from notice create to response accepted (in seconds) (SRC Auctions)
    double ack_latency = 138; // latency from external response send to external response ack (FRT) (in seconds) (external auctions only)
    int32 num_opt_legs = 139; // number of option legs
    SpreadClass spread_class = 140; // spread class (eg. Call, Put, RevCon, Box, JRoll, etc.)
    SpreadFlavor spread_flavor = 141; // spread flavor (Normal, Flipped) of this order
    YesNo contains_hedge = 142; // if this order contains a stock/future leg
    YesNo contains_flex = 143; // if this order contains flex leg(s)
    YesNo contains_multi_hedge = 144; // contains MultiHedge (corp action adjusted) options
    NoticeResult response_result = 157;
    int32 response_time = 158; // notice response arrival time (milliseconds since auction start)
    double prt_price = 159; // reported print price (pkgPrice if MLeg)
    int32 prt_size = 160; // reported print size (pgkSize if MLeg)
    google.protobuf.Timestamp prt_time = 161; // reported print time (1st print if MLeg)
    double prt_uBid = 162; // best estimate of uBid @ auction print time
    double prt_uAsk = 163; // best estimate of uAsk @ auction print time
    google.protobuf.Timestamp timestamp = 164;
    YesNo is_prod = 165; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 166; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 167; // WTS synthetic: alert message (null if no alert)
    repeated OrderLegs order_legs = 145;
}


