syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    We track sequences numbers using a < CHANNEL, MSG TYPE, SRC APP ID > tuple.  When sequence number gaps
    the details of the drops are written into logs.  This makes it difficult to see a wholistic view of the
    drops.  This message type attempts to elevate that data to be globally viewable to enable drop analyses.
*/    
message MbusDropReport {
    message PKey {
        
        string app_name = 10;
        uint32 app_iD = 11;
        google.protobuf.Timestamp app_start = 12;
        uint32 source_app_iD = 13;
        string channel_name = 14;
        string message_type_name = 15;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string machine_name = 100;
    string process_name = 103;
    int32 process_id = 106;
    int32 num_incidents = 109;
    int32 num_total_incidents = 112;
    int64 expected_seq_no = 115;
    int64 header_seq_no = 118;
    int64 header_time_sent = 121;
    int64 time_received = 124;
    YesNo mmr_drops = 127;
}


