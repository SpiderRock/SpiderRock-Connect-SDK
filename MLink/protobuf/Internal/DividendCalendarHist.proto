syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message DividendCalendarHist {
    message PKey {
        
        TickerKey ticker = 10;
        DateKey div_date = 11; // dividend ex-date
        int32 div_number = 12; // 1=1st dividend, 2=2nd dividend, etc. (if multiple dividends go ex on the same date)
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int64 security_iD = 100;
    float div_value = 103; // dividend payment amount
    string div_currency = 106;
    DivKind div_kind = 109;
    DivFreq div_freq = 112;
    google.protobuf.Timestamp timestamp = 115;
}


