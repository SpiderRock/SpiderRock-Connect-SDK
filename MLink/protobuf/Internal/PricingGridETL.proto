syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 2
    Inputs: OptExpiryPriceETL, OptCallPutPriceETL, StockDividendForecastETL, RateCurveETL
    CalcEngine: PricingGridRunner
*/    
message PricingGridETL {
    message PKey {
        
        OptionKey okey = 10;
        DateKey trade_date = 11;
        string trade_time = 12;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    PricingFramework prc_framework = 100;
    CalcModelType calc_model = 103;
    ExerciseType exercise_type = 106;
    TimeMetric time_metric = 109;
    ExerciseTime exercise_time = 112;
    DateKey today = 115;
    DateKey expiry = 118;
    double u_prc = 121;
    double strike = 124;
    float vol = 127;
    float years_v = 130; // volatility years to expiry (volatility time metric)
    float sdiv = 133; // continuous dividend rate applied to pricing
    float rate = 136; // global borrow rate
    float axis_sDiv = 139; // axis sdiv (used for computing expiry consistent forward prices)
    float ddiv = 142; // cumulative sum of all discrete dividends prior to expiry
    float ddiv_pv = 145; // present value of all discrete dividends prior to expiry
    int32 ddiv_hash = 148; // discrete dividend list hash
    int32 settlement_days = 151;
    int32 s_days_t = 154;
    int32 s_days_e = 157;
    int32 n_index = 160;
    float tau0 = 163;
    TickerKey rate_key = 166;
    CalendarCode calendar_code = 169;
    float ref_price = 172; // reference model option price @ above parameter point
    float u_prc_range = 175; // error fn valid (unbounded) within [uPrc * Math.Exp(-uPrcRange), uPrc * Math.Exp(+uPrcRange)]
    float i_vol_range = 178; // error fn valid (unbounded) within [vol * Math.Exp(-iVolRange), vol * Math.Exp(+iVolRange)]
    StrikeFn strike_fn = 181;
    float c00 = 184; // Kadj / K = c00
    float c01 = 187; // + c01 * x                ; x = ln(uPrc / uPrc0) / uPrcRange
    float c02 = 190; // + c02 * x2
    float c03 = 193; // + c03 * x3
    float c04 = 196; // + c04 * y                ; y = ln(volMdl / volMdl0) / iVolRange
    float c05 = 199; // + c05 * y2
    float c06 = 202; // + c06 * y3
    float c07 = 205; // + c07 * x * y
    float c08 = 208; // + c08 * x * y2
    float c09 = 211; // + c09 * x * y3
    float c10 = 214; // + c10 * x2 * y
    float c11 = 217; // + c11 * x2 * y2
    float c12 = 220; // + c12 * x2 * y3
    float c13 = 223; // + c13 * x3 * y
    float c14 = 226; // + c14 * x3 * y2
    float c15 = 229; // + c15 * x3 * y3
    CalcError error = 232; // SRPricingLib.CalcError
    float fit_mse = 235; // Kadj model fit error (2d polynomial vs fit points)
    float bid_prc = 238; // reference option bid/ask (debugging)
    float ask_prc = 241;
    google.protobuf.Timestamp timestamp = 244;
}


