syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message SRDataIntegrity {
    message PKey {
        
        string category1 = 10; // category name  (level #1)
        string category2 = 11; // category name  (level #2)
        SysRealm sys_realm = 12;
        SysEnvironment sys_environment = 13;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    CheckResult result = 100;
    string error = 103;
    int32 ok_count = 106;
    int32 rec_count = 109;
    google.protobuf.Timestamp timestamp = 112;
}


