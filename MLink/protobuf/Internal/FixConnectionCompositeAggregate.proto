syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message FixConnectionCompositeAggregate {
    message PKey {
        
        string aggregate = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 num_order = 100; // total
    int32 num_cancel = 103;
    int32 num_reject = 106;
    int32 num_cxl_reject = 109;
    int32 num_exec_report = 112;
    int32 num_oats_order = 115; // oats reportable
    int32 num_oats_reject = 118;
    int32 num_oats_ack = 121;
    int32 num_open_order = 124;
    int32 num_open_cancel = 127;
    int32 queue_size = 130;
    float queue_delay = 133;
    int32 num_errors = 136;
    string last_error = 139;
    google.protobuf.Timestamp last_error_dttm = 142;
    google.protobuf.Timestamp timestamp = 145;
}


