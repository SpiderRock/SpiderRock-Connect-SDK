syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    V7 Message Name: UserDividendOverride
    V8 Message Name: UserDividendOverride
    Bridging pattern:  [V7 --> V8]
*/    
message UserDividendOverride_V7 {
    message PKey {
        
        TickerKey ticker = 5000; // v7 & v8
        string client_firm = 5001; // v7 & v8: Using Meta Types: V7=[string,Length=16,Alias=ClientFirmString,MetaType=NA], V8=[string,Length=16,Alias=SRClientFirmString,MetaType=SRClientFirm]
        DividendSlot dividend_slot = 5002; // v7 & v8
    }

    message DateAmt {
        
        DateKey div_date = 5007; // v7 & v8 --- Original comment: ex-dividend date
        float div_value = 5008; // v7 & v8 --- Original comment: dividend amount
        string div_currency = 5009; // v7 & v8
        DivKind div_kind = 5010; // v7 & v8 --- Original comment: dividend type
        DivSource div_source = 5011; // v7 & v8 --- Original comment: dividend source
        DivFreq div_freq = 5012; // v7 & v8
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    google.protobuf.Timestamp timestamp = 5003; // v7 & v8
    string text = 5004; // v7 & v8 --- Original comment: user detail (if any)
    MergeType merge_type = 5005; // v7 & v8
    repeated DateAmt date_amt = 5006;
}


