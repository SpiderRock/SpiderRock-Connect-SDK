syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message ToolUserError {
    message PKey {
        
        int32 error_counter = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string user_name = 100;
    string hndl = 103;
    WtsErrorLevel error_level = 106;
    WtsErrorType error_type = 109;
    string error_text = 112;
    google.protobuf.Timestamp ts = 115; // last update time (Date)
}


