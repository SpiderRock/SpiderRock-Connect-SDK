syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


/*
    [ALL]
*/    
message EdgeHeartbeat {


    MessageMetadata _meta = 1;
    
    int64 last_timestamp_rcvd = 106; // most recent timestamp of a successfully processed message originating from the remote end-point
    int64 timestamp = 109; // heartbeat timestamp
}


