syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;


    
message ToolNotificationsMessage {
    message PKey {
        
        string id = 10;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    NotificationEvent notification = 100; // The notification event that is sent by the Tool.
}


