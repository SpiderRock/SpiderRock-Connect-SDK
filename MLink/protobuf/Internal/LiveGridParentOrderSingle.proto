syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridParentOrderSingle {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string accnt = 100;
    string c_firm = 101; // SR client firm
    string sec_key = 371; // conditionally formatted secKey based on secType
    string sec_key_ticker_src = 374;
    string sec_key_asset_type = 375;
    SpdrKeyType sec_type = 103;
    SpdrSource spdr_source = 104;
    int64 grouping_code = 105;
    BuySell order_side = 106;
    string user_name = 107; // SR user name string
    int64 parent_number = 108; // SR parent number (most recent)
    int64 base_parent_number = 109; // SR base parent number (usually the 1st parent number in a chain)
    int64 notice_number = 110; // SR noticeNumber [required when parentOrderHandling = AtsResponse | AuctionResponse]
    int64 risk_group_id = 111; // all orders with the same riskGroupId share a common set of risk counters;.Grp. risk limits apply to these shared counters
    int64 trigger_group_id = 112;
    string strategy = 113; // parent order strategy string (can be user supplied)
    string exec_brkr_code = 114; // execBrkrCode attached to parent order (if any)
    string alt_order_id = 115; // alternate order ID (usually clOrdId from client)
    int64 package_id = 116; // groups related order/brokers together (eg. Legger w/MLeg Parent)
    string alt_accnt = 117; // alternate (client assigned) "long" account string (optional)
    string alt_user_name = 118; // alternate (client assigned) user name (optional)
    SpdrStageType stage_type = 119; // parent is a staged order [ToolVisible]
    YesNo is_flagged = 120; // broker state records is flagged for action (user alert only)
    TickerKey ticker = 121; // underlier ticker
    double u_prc = 122; // underlier price (usually mid-market)
    double u_prc_order = 123; // underlier price at the time of last parent order arrival
    double nbbo_bid = 124; // current option nbbo bid (at time of record publish)
    double nbbo_ask = 125; // current option nbbo ask (at time of record publish)
    int32 nbbo_bid_sz = 126; // current option nbbo cum bid size (at time of record publish)
    int32 nbbo_ask_sz = 127; // current option nbbo cum ask size (at time of record publish)
    float surface_prc = 128; // SR surface price @ record publish
    float surface_vol = 129; // SR surface volatility @ record publish
    float order_ref_sDiv = 130;
    RefSDivType order_ref_sDiv_type = 131;
    ToolOrderState tool_order_state = 372;
    SpdrBrokerStatus spdr_broker_status = 132;
    SpdrOrderStatus spdr_order_status = 133; // status of the most recent parent order handled by this broker
    SpdrCloseReason spdr_close_reason = 134; // close reason of most recent parent order
    SpdrRejectReason spdr_reject_reason = 135; // reject reason (if any) of most recent parent order
    SpdrRiskLevel spdr_reject_level = 136; // reject level (if any) of most recent parent order
    YesNo is_permanently_closed = 137; // indicates that this broker is permanently closed (cannot be cxl/replaced or re-opened) [auto-hedge orders only]
    int32 num_extern_risk_hold = 138; // num external risk management rejects received
    string last_extern_risk_text = 139; // last external (exch?) risk management reject
    google.protobuf.Timestamp last_extern_risk_reject = 140;
    string spdr_comment = 141;
    int32 order_size = 142; // order size of most recent parent order
    int32 order_active_size = 143; // total activated size (total size released for execution) (-1 = all available size)
    int32 active_duration = 144; // [optional] (number of seconds)
    google.protobuf.Timestamp update_dttm = 145;
    google.protobuf.Timestamp good_till_dttm = 146; // order expiration date/time (most recent parent order in cxl/replace chain)
    int32 leaves_quantity = 147; // current child order leaves quantity (quantity actively working in the market;all child orders)
    double avg_fill_price = 148; // average fill price
    double avg_fill_uPrice = 149; // average fill underlier price
    int32 cum_fill_quantity = 150; // cumulative fill quantity
    float avg_fill_vol = 151; // average fill volatility
    float cum_fill_vega = 152; // cumulative fill vega
    float cum_fill_theta = 153; // cumulative fill theta
    float cum_fill_dDelta = 154; // cumulative fill $Delta
    float cum_exch_fee = 155; // cumulative fill exch fee
    float cum_m10_pnl = 156;
    float cum_arrival_pnl = 157;
    google.protobuf.Timestamp last_fill_dttm = 158;
    int32 risk_limit_size = 159; // risk limit size (maximum size to nearest risk limit)
    SpdrRisk risk_limit_desc = 160; // reason for size reduction
    SpdrRiskLevel risk_limit_level = 161; // risk limit level responsible for reduction
    string risk_limit_detail = 162; // risk limit detail
    double limit_price = 163; // simple limit
    double limit_ref_uPrc = 164;
    LimitError limit_err = 165;
    string limit_err_desc = 166;
    float best_limit_offset = 167; // (possible price improvement) (gap between best price and init/limit price) (Face/Matrix orders)
    float make_prob_limit = 168;
    float make_surf_offset = 169;
    double make_limit_price = 170; // make limit
    LimitError make_limit_err = 171;
    float take_prob_limit = 172;
    float take_surf_offset = 173;
    double take_limit_price = 174; // take limit
    LimitError take_limit_err = 175;
    AutoHedge auto_hedge = 176;
    HedgeInst hedge_instrument = 177; // auto-hedge instrument (from parent order)
    ExpiryKey hedge_sec_key = 178; // auto-hedge sec key (if any)
    SpdrKeyType hedge_sec_type = 179; // auto-hedge sec type (Stock or Future)
    float hedge_beta_ratio = 180; // auto-hedge ratio [from parent order (if supplied) or computed by SR]
    HedgeScope hedge_scope = 181; // hedge group scope [RiskGroup or Accnt]
    MarketSession hedge_session = 182; // market session for the autohedge order
    string extern_hedge_ex_dest = 183; // external broker exDest (only used if orderHandling=Extern)			# Should match FixRoutingTable.destination type (eg. #Nighthawk)
    string extern_hedge_params = 184; // external algo names/parameters (usually just an algo name)			# usually copied from the FixRoutingTable.externParams
    string user_data1 = 185; // client supplied data field; passes through to parent and child executions and reports as well as FIX drops
    string user_data2 = 186; // client supplied data field; passes through to parent and child executions and reports as well as FIX drops
    MaxProgress max_progress = 187; // maximum point of progress for most recent parent order
    string max_progress_detail = 188; // additional detail on point of maximum progress
    google.protobuf.Timestamp max_progress_time = 189; // time of last max progress advance
    BrokerState broker_state = 190; // broker monitor state
    int32 broker_counter = 191; // number of times order checked by broker monitor (note: most checks result in no action)]
    AlgoState make_state = 192; // [enum] current state of non-marketable order handler (maker)
    int32 make_counter = 193; // number of times order checked by post handler (note: most checks result in no action)
    AlgoState take_state = 194; // [enum] current state of marketable order handler (taker)
    int32 take_counter = 195; // number of times order checked by take handler (note: most checks result in no action)
    MktRespState mkt_resp_state = 196; // [enum] current state of response handler (if any)
    int32 mkt_resp_counter = 197; // number of times order checked by market response handler (note: most checks result in no action)
    MktCrossState mkt_cross_state = 198; // [enum] current state of mkt cross handler (if any)
    int32 mkt_cross_counter = 199; // number of times order checked by market cross handler (note: most checks result in no action)
    string progress_rule_detail = 200; // Twap/Vwap progress detail
    ChildEvent last_child_event = 201; // [enum] last event code from broker/child order handler(s)
    google.protobuf.Timestamp last_child_reject_dttm = 202; // last child order reject dttm (if any)
    string last_child_reject_text = 203; // last child order reject reason/text (if any)
    SpdrMarketState spdr_mkt_state = 204; // [enum] market state
    float cpx1 = 205; // child price level #1
    int32 csz1 = 206; // cumulative size represented at this price
    int64 cex1 = 207; // bit mask of all exchanges where we are at this price
    int32 cnt1 = 208; // number of child orders at price level #1
    float cpx2 = 209; // child price level #2
    int32 csz2 = 210; // cumulative size represented at this price
    int64 cex2 = 211; // bit mask of all exchanges where we are at this price
    int32 cnt2 = 212; // number of child orders at price level #2
    int32 c_more = 213; // number of additional child orders at inferior prices (if any)
    float cn_vol = 214;
    float cn_yrs = 215;
    float cn_uPrc = 216;
    float cn_de = 217; // delta per contract
    float cn_dd = 218; // $delta per contract
    float cn_ve = 219; // vega per contract
    float cn_ga = 220;
    float cn_th = 221;
    float cn_pr = 222; // premium per contract
    float dd_mult = 223;
    PriceFormat price_format = 224; // option price format code
    PriceFormat u_price_format = 225; // underlier price format code
    int32 underliers_per_cn = 226; // option delivery underliers per contract
    UnderlierType underlier_type = 227; // type of underlier (affects $greek calculations)
    float tick_value = 228; // $NLV value of a single tick change in display premium	(pointValue = tickValue / tickSize)
    float point_value = 229; // $NLV value of a single point change in display premium (pointValue = tickValue / tickSize)
    Currency point_currency = 230;
    float theo_vol = 231;
    float theo_prc = 232;
    int32 num_new_orders = 233; // number of child orders generated by this broker (all parent orders)
    uint32 num_parent_limits = 234; // number of parent limit messages received for this broker
    float broker_vwap_mark = 235; // trade weighted average price (duration of parent order)
    float broker_vwap_uMark = 236; // option-trade weighted average underlier price (duration of parent order)
    float broker_qwap_mark = 237; // average quote mid-market (duration of parent order)
    float broker_qwap_uMark = 238; // average underlier quote mid-market (duration of parent order)
    float vwap_pn_l = 239; // dir * qty * (brokerVwapMark - avgFillPrice)
    float vwap_dn_pn_l = 240; // vwapPnL - uDriftVwapPnL
    float u_drift_vwap_pn_l = 241; // (dir * (de * qty * (brokerVwapUMark - avgFillUPrice)))
    float qwap_pn_l = 242; // dir * qty * (brokerQwapMark - avgFillPrice)
    float qwap_dn_pn_l = 243; // qwapPnL - uDriftQwapPnL
    float u_drift_qwap_pn_l = 244; // (dir * (de * qty * (brokerQwapUMark - avgFillUPrice)))
    int32 num_imprv_chld = 245; // number of child orders that improved an existing market
    float active_seconds = 246; // number of seconds that the parent order was active
    float with_seconds = 247; // number of seconds with one or more working child orders that are with of nbbo
    float alone_seconds = 248; // number of seconds with one or more working child orders that make up 100% of nbbo
    float working_seconds = 249; // number of child order seconds (can be greater than activeSeconds if working on more than one exchange)
    int32 num_risk_cancels = 250; // number of child orders cancels for risk reasons
    float risk_hold_seconds = 251; // number of seconds with parent order active but on risk hold (zero child order risk size)
    float risk_thrtl_seconds = 252; // number of seconds with parent order active but in risk throttle condition (temporary hold after fast/mass risk cancel)
    int32 num_make_throttle_skips = 253; // number of childs orders not send to market dues to outbound lines being in a queued/throttled state
    float sum_make_throttle_delay = 254; // cumulative seconds of queue skip delay (seconds that a child order was not in the market dues to outbound lines being in a queued/throttled state)
    float u_prc_drift = 255; // underlier drift (since parent order start)
    float s_vol_drift = 256; // surface vol drift (since parent order start)
    UpdateSource update_src = 257;
    int32 num_updates = 258; // number of record updates (cumulative for the day)
    int32 max_progress_none = 259; // number of Max Progess in None State
    int32 max_progress_initialize = 260; // number of Max Progress in Initialize State
    int32 max_progress_rejected = 261; // number of Max Progress in Rejected State
    int32 max_progress_pre_open = 262; // number of Max Progress in PreOpen State
    int32 max_progress_risk_hold = 263; // number of Max Progress in RiskHold State
    int32 max_progress_working = 264; // number of Max Progress in Working State
    int32 max_progress_chk_rte = 265; // number of Max Progress in CheckRoute State
    int32 max_progress_rte_rej = 266; // number of Max Progress in RouteRejected State
    int32 max_progress_wait_action = 267; // number of Max Progress in WaitAction State
    int32 max_progress_in_market = 268; // number of Max Progress in InMarket State
    int32 max_progress_filling = 269; // number of Max Progress in Filling State
    int32 max_progress_filled = 270; // number of Max Progress in Filled State
    int32 max_progress_pending_close = 271; // number of Max Progress in PendingClose State
    int32 max_progress_closed = 272; // number of Max Progress in Closed State
    int32 max_progress_hedge_hold = 273; // number of Max Progress in HedgeHold State
    int32 stage_type_none = 274; // number of StageType None State
    int32 stage_type_modify_any = 275; // number of StageType ModifyAny State
    int32 stage_type_modify_algo = 276; // number of StageType ModifyAlgo State
    int32 spdr_order_status_rejected = 277; // number of spdrOrderStatus in Rejected State
    int32 max_progress_working_stk = 278; // number of Max Progress in Working State (Stock)
    int32 max_progress_in_market_stk = 279; // number of Max Progress in InMarket State (Stock)
    int32 max_progress_filling_stk = 280; // number of Max Progress in Filling State (Stock)
    int32 max_progress_risk_hold_stk = 281; // number of Max Progress in RiskHold State (Stock)
    int32 stage_type_modify_any_stk = 282; // number of StageType ModifyAny (Stock)
    int32 stage_type_modify_algo_stk = 283; // number of StageType ModifyAlgo (Stock)
    int32 spdr_order_status_rejected_stk = 284; // number of spdrOrderStatus in Rejected (Stock)
    int32 max_progress_working_opt = 285; // number of Max Progress in Working State (Option Underlier)
    int32 max_progress_in_market_opt = 286; // number of Max Progress in InMarket State (Option Underlier)
    int32 max_progress_filling_opt = 287; // number of Max Progress in Filling State (Option Underlier)
    int32 max_progress_risk_hold_opt = 288; // number of Max Progress in RiskHold State (Option Underlier)
    int32 stage_type_modify_any_opt = 289; // number of StageType ModifyAny (Option Underlier)
    int32 stage_type_modify_algo_opt = 290; // number of StageType ModifyAlgo (Option Underlier)
    int32 spdr_order_status_rejected_opt = 291; // number of spdrOrderStatus in Rejected (Option Underlier)
    int32 max_progress_working_fut = 292; // number of Max Progress in Working State (Future)
    int32 max_progress_in_market_fut = 293; // number of Max Progress in InMarket State (Future)
    int32 max_progress_filling_fut = 294; // number of Max Progress in Filling State (Future)
    int32 max_progress_risk_hold_fut = 295; // number of Max Progress in RiskHold State (Future)
    int32 stage_type_modify_any_fut = 296; // number of StageType ModifyAny (Future)
    int32 stage_type_modify_algo_fut = 297; // number of StageType ModifyAlgo (Future)
    int32 spdr_order_status_rejected_fut = 298; // number of spdrOrderStatus in Rejected (Future)
    int32 max_progress_working_fut_opt = 299; // number of Max Progress in Working State (Futures Option)
    int32 max_progress_in_market_fut_opt = 300; // number of Max Progress in InMarket State (Futures Option)
    int32 max_progress_filling_fut_opt = 301; // number of Max Progress in Filling State (Futures Option)
    int32 max_progress_risk_hold_fut_opt = 302; // number of Max Progress in RiskHold State (Futures Option)
    int32 stage_type_modify_any_fut_opt = 303; // number of StageType ModifyAny (Futures Option)
    int32 stage_type_modify_algo_fut_opt = 304; // number of StageType ModifyAlgo (Futures Option)
    int32 spdr_order_status_rejected_fut_opt = 305; // number of spdrOrderStatus in Rejected (Futures Option)
    int32 filled_stk = 306; // number of filled orders for Stock
    int32 filled_eqt_opt = 307; // number of filled orders for Equity Option
    int32 filled_fut = 308; // number of filled orders for Future
    int32 filled_fut_opt = 309; // number of filled orders for Option-on-Future
    int32 filled_stk_buy = 310; // number of filled Buy orders for Stock
    int32 filled_stk_sell = 311; // number of filled Sell orders for Stock
    int32 filled_eqt_opt_buy = 312; // number of filled Buy orders for Equity Option
    int32 filled_eqt_opt_sell = 313; // number of filled Sell orders for Equity Option
    int32 filled_fut_buy = 314; // number of filled Buy orders for Future
    int32 filled_fut_sell = 315; // number of filled Sell orders for Future
    int32 filled_fut_opt_buy = 316; // number of filled Buy orders for Option-on-Future
    int32 filled_fut_opt_sell = 317; // number of filled Sell orders for Option-on-Future
    float cum_exch_fee_stk = 318; // cumulative exchange fees for Stock
    float cum_exch_fee_eqt_opt = 319; // cumulative exchange fees for Equity Option
    float cum_exch_fee_fut = 320; // cumulative exchange fees for Future
    float cum_exch_fee_fut_opt = 321; // cumulative exchange fees for Option-on-Future
    int32 pending_order = 322; // is pending
    int32 pending_order_stk = 323; // is pending and is a stock
    int32 pending_order_opt = 324; // is pending and is an option
    int32 pending_order_fut = 325; // is pending and is a future
    int32 pending_order_fut_opt = 326; // is pending and is a futureopt
    int32 active_brkr = 327; // is active
    int32 active_brkr_stk = 328; // is active and is a stock
    int32 active_brkr_opt = 329; // is active and is an option
    int32 active_brkr_fut = 330; // is active and is a future
    int32 active_brkr_fut_opt = 331; // is active and is a futureopt
    int32 held_brkr = 332; // is held
    int32 held_brkr_stk = 333; // is held and is a stock
    int32 held_brkr_opt = 334; // is held and is an option
    int32 held_brkr_fut = 335; // is held and is a future
    int32 held_brkr_fut_opt = 336; // is held and is a futureopt
    int32 working_brkr = 337; // is working
    int32 working_brkr_stk = 338; // is working and is a stock
    int32 working_brkr_opt = 339; // is working and is an option
    int32 working_brkr_fut = 340; // is working and is a future
    int32 working_brkr_fut_opt = 341; // is working and is a futureopt
    int32 closed_brkr = 342; // is closed/terminated
    int32 closed_brkr_stk = 343; // is closed and is a stock
    int32 closed_brkr_opt = 344; // is closed and is an option
    int32 closed_brkr_fut = 345; // is closed and is a future
    int32 closed_brkr_fut_opt = 346; // is closed and is a futureopt
    int32 reject_brkr = 347; // is rejected
    int32 reject_brkr_stk = 348; // is rejected and is a stock
    int32 reject_brkr_opt = 349; // is rejected and is an option
    int32 reject_brkr_fut = 350; // is rejected and is a future
    int32 reject_brkr_fut_opt = 351; // is rejected and is a futureopt
    int32 active_stk_qty = 352; // broker open quantity (leaves) that could potentially execute (may currently be on risk hold) - stock
    int32 active_opt_qty = 353; // broker open quantity (leaves) that could potentially execute (may currently be on risk hold) - option
    int32 active_fut_qty = 354; // broker open quantity (leaves) that could potentially execute (may currently be on risk hold) - futures
    int32 active_fut_opt_qty = 355; // broker open quantity (leaves) for active fut options
    int32 num_child_orders = 356; // number of active child orders in the market (usually in exchange order books)
    int32 tot_child_orders = 357; // total number of child orders creates (both open and closed)
    float child_dDelta_ln = 358; // total child order (+) $delta current in the market
    float child_dDelta_sh = 359; // total child order (-) $delta current in the market
    int32 cum_fill_qty_stk = 360; // total fill quantity of parent orders - stock (for fills via SpiderRock)
    int32 cum_fill_qty_opt = 361; // total fill quantity of parent orders - option (for fills via SpiderRock)
    int32 cum_fill_qty_fut = 362; // total fill quantity of parent orders - futures (for fills via SpiderRock)
    int32 record_stk = 363; // is a stock
    int32 record_opt = 364; // is an option
    int32 record_fut = 365; // is a future
    int32 record_fut_opt = 366; // is a future option
    AssetType asset_type = 373;
    string instrument = 367;
    string make_algo_description = 368;
    string take_algo_description = 369;
    string child_order_str = 377; // formatted child order string
    string risk_hash = 376;
    int32 active_size = 378; // effective active size (orderActiveSize if staged, else orderSize)
    string till = 379; // time-in-force or terminal status string
    string parent_order_status = 380; // composite parent order status (human-readable)
    string primary_limit_description = 381; // formatted user limit description
    string parent_take_limit = 382; // formatted algo take limit
    string parent_make_limit = 383; // formatted algo make limit
    string order_exec_status = 384; // order execution status (e.g. Filled, PartFill, Cancelled)
    double fill_distance = 385; // distance from NBBO to child/limit price
    int32 staged = 386; // 1 if order is staged (activeSize < orderSize and not closed)
    google.protobuf.Timestamp timestamp = 370; // SR system timestamp
    YesNo is_prod = 387; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 388; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 389; // WTS synthetic: alert message (null if no alert)
}


