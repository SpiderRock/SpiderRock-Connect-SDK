    string accnt_name = 112; // account name
    string omni_accnt = 215; // associated omnibus account (if any)	(must be type=Omnibus) [this account can do aggregated trading in omniAccnt]
    string omni_accnt2 = 216; // associated omnibus account (if any)	(must be type=Omnibus) [this account can do aggregated trading in omniAccnt2]
    string tgt_rollup_accnt = 121; // target rollup account (must be type=Rollup) [this account rolls up into target account]
    string tgt_reconcile_accnt_sR = 124; // target reconciliation accnt (SR Side) (must be type=Reconcile) [this account aggregates into target reconcile account]
    string tgt_reconcile_accnt_cF = 127; // target reconciliation accnt (CLR Side) (must be type=Reconcile) [this account aggregates into target reconcile account]
