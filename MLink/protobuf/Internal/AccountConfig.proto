        string exch_str__v7 = 5173; // only V7
        FlipType clearing_flip_type__v7 = 5174; // only v7 - enum values match with v8
        string clearing_flip_firm__v7 = 5175; // only V7
        string clearing_flip_accnt__v7 = 5176; // only V7
    }

    message RiskLevel {
        
        MarRiskLevel risk_level = 218;
        string custom_group = 219;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    AccountType account_type = 103; // SR account type (omnibus accounts are expected to be flat at the end of the day)
