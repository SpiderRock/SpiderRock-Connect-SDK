    YesNo require_alt_order_id = 175; // Parent order must have an AltOrderId to proceed
    YesNo nbbo_fix_drop_marking = 178; // Whether or not to markup the FIX drop with nbbo information
    string no_cross_group = 181; // no cross grouping code (accounts with the same nCrossGroup will not cross with themselves) [default = ClientFirm]
