syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 1
    Inputs: ???
    CalcEngine: ???
*/    
message BaselineDividendsETL {
    message PKey {
        
        TickerKey ticker = 10;
        DateKey trade_date = 11; // dividend ex-date (current day)
        string trade_time = 12;
    }

    message Dividend {
        
        DateKey date = 103; // ex-dividend date // +paymentDate
        float amount = 106; // dividend payment amount
        Currency currency = 109;
        DivKind kind = 112;
        DivFreq freq = 115;
        DivSource source = 118; // dividend source
        DivOverrideSource override_source = 121; // dividend override source if any
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    TradingPeriod trading_period = 124;
    string text = 127; // extra text (if any)
    google.protobuf.Timestamp timestamp = 130;
    repeated Dividend dividend = 100;
}


