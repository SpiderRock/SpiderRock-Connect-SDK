syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;


/*
    edge-to-user
*/    
message EdgeSecSubscription {
    message PKey {
        
        OptionKey sec_key = 10;
        SpdrKeyType sec_type = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    YesNo subscribe = 100;
    int64 timestamp = 103;
}


