syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    V7 Message Name: StockBeta
    V8 Message Name: StockBeta
    Bridging pattern:  [V8 --> V7]
    BridgeFromV8:StockBeta
*/    
message StockBeta_V7 {
    message PKey {
        
        TickerKey ticker = 5000; // v7 & v8
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    BetaStatus status = 5001; // v7 & v8
    float beta = 5002; // v7 & v8 --- Original comment: (depricate)
    float beta_ind = 5003; // v7 & v8 --- Original comment: SR beta to IND
    float beta_sub = 5004; // v7 & v8 --- Original comment: SR beta to SUB
    float beta_grp = 5005; // v7 & v8 --- Original comment: SR beta to GRP
    float beta_qQQ = 5006; // v7 & v8 --- Original comment: SR beta to QQQ [2 year; weekly (fri - fri)]
    float beta_sPY = 5007; // v7 & v8 --- Original comment: SR beta to SPY [2 year; weekly (fri - fri)]
    float beta_iWM = 5008; // v7 & v8 --- Original comment: SR beta to IWM [2 year; weekly (fri - fri)]
    google.protobuf.Timestamp timestamp = 5009; // v7 & v8
}


