syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message LiveGridPosSpanRiskDetail {
    message PKey {
        
        LiveGridDataSet d_set = 10;
        int32 d_key = 11;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    string accnt = 100;
    string c_firm = 101;
    string sec_key = 156; // conditionally formatted secKey based on secType
    string sec_key_ticker_src = 157;
    string sec_key_asset_type = 158;
    SecType sec_type = 103;
    TickerKey ticker = 159;
    TickerKey hedge_target = 160;
    AggregationSpanType aggregation_span_type = 104;
    google.protobuf.Timestamp date = 105;
    float span01 = 106; // span1: uPrc=unch, vol=up
    float span02 = 107; // span2: uPrc=unch, vol=down
    float span03 = 108; // span3: uPrc=+33%, vol=up
    float span04 = 109; // span4: uPrc=+33%, vol=dn
    float span05 = 110; // span5: uPrc=-33%, vol=up
    float span06 = 111; // span6: uPrc=-33%, vol=down
    float span07 = 112; // span7: uPrc=+67%, vol=up
    float span08 = 113; // span8: uPrc=+67%, vol=down
    float span09 = 114; // span9: uPrc=-67%, vol=up
    float span10 = 115; // span10: uPrc=-67%, vol=down
    float span11 = 116; // span11: uPrc=+100%, vol=up
    float span12 = 117; // span12: uPrc=+100%, vol=down
    float span13 = 118; // span13: uPrc=-100%, vol=up
    float span14 = 119; // span14: uPrc=-100%, vol=down
    float span15 = 120; // span15: uPrc=+300%; price slide * 0.33
    float span16 = 121; // span16: uPrc=-300%, price slide * 0.33
    float cur_pos = 122; // Current position in this metric
    float unit_pos_size = 123; // Effective position size: stkSh, futCn, optCn * upc
    float point_value = 124; // $value of a single option point
    Currency point_currency = 125;
    float ref_vol = 126; // Initial volatility (options only;usually SR surface vol)
    float ref_uPrc = 127; // Initial underlier price
    float d_vol_up = 128; // Slide VolUp Increment
    float d_vol_dn = 129; // Slide VolDn Increment
    float d_uPrc_up = 130; // Slide PrcUp Increment
    float d_uPrc_dn = 131; // Slide PrcDn Increment
    float surf_vol33_up = 132; // SR surface volatility @ refUPrc + 0.33 * dUPrcUp
    float surf_vol33_dn = 133; // SR surface volatility @ refUPrc - 0.33 * dUPrcDn
    float surf_vol67_up = 134; // SR surface volatility @ refUPrc + 0.67 * dUPrcUp
    float surf_vol67_dn = 135; // SR surface volatility @ refUPrc - 0.67 * dUPrcDn
    float surf_vol100_up = 136; // SR surface volatility @ refUPrc + 1.00 * dUPrcUp
    float surf_vol100_dn = 137; // SR surface volatility @ refUPrc - 1.00 * dUPrcDn
    float surf_vol300_up = 138; // SR surface volatility @ refUPrc + 3.00 * dUPrcUp
    float surf_vol300_dn = 139; // SR surface volatility @ refUPrc - 3.00 * dUPrcDn
    float hedge_up = 140; // $pnl @ +100% from hedge (Existing, DeNeutral, or AdjDeNeutral)
    float beta = 141; // Beta value between this ticker and master ticker [-5.0 / +5.0]
    float vol_ratio = 142; // Vol Ratio: can be raw/SD (symVol), mktRatio (symVol/mktVol), or mktRatioNorm (symVol/avgMktVol)
    float rnd_sym_adj = 143; // random symbol volatility draw (resets on each refresh);symVol x rNormal x [1,2,3]
    float sym_vol = 144; // Symbol volatility (usually 21 trading day censored implied vol)
    float mkt_vol = 145; // Master ticker volatility (usually 21 trading day censored implied vol)
    float eff_prc_pct_up = 146; // Effective up price pct slide; =prcPct * beta * volRatio + rndSymAdj
    float eff_prc_pct_dn = 147; // Effective dn price pct slide; =prcPct * beta * volRatio + rndSymAdj
    float prc_span = 148; // input prcSpan value
    float vol_span = 149; // input volSpan value
    SpanType prc_span_type = 150; // input prcSpan type
    SpanType vol_span_type = 151; // input volSpan type
    float span_prc_inc_up = 152; // (exchange) spanPrcIncUp
    float span_prc_inc_dn = 153; // (exchange) spanPrcIncDn
    float span_vol_inc = 154; // (exchange) spanVolInc
    string calc_error = 155; // Any calc error generated by the span calculation
    YesNo is_prod = 161; // WTS synthetic: Yes=prod, No=test, None=indeterminate
    AlertSeverity alert_severity = 162; // WTS synthetic: Critical, Warning, Info (None if no alert)
    string alert_text = 163; // WTS synthetic: alert message (null if no alert)
}


