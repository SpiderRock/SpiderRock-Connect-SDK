syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

/*
    Step: 4
    Inputs:
    CalcEngine: SurfaceRunner
*/    
message ImpliedStockEarningsETL {
    message PKey {
        
        TickerKey ticker = 10;
        DateKey trade_date = 11;
        string trade_time = 12;
    }

    message Earnings {
        
        DateKey date = 103;
        EarnTime time = 106;
        EarnType type = 109;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    google.protobuf.Timestamp timestamp = 112;
    repeated Earnings earnings = 100;
}


