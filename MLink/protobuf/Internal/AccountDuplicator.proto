syntax = "proto3";

import "spiderrock_common.proto";


package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message AccountDuplicator {
    message PKey {
        
        string client_firm = 10;
        string src_accnt = 11; // existing account to copy from
        string tgt_accnt = 12; // new account
    }

    message AccountExchGroupConfigsCreated {
        
        ExchGroup exch_group = 104;
        SpdrSecType sec_type = 105;
    }

    message AccountRouteConfigsCreated {
        
        string exec_brkr_code = 102;
    }

    message AltSymbolMapsCreated {
        
        TickerKey ticker = 107;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    YesNo configs_created = 100;
    google.protobuf.Timestamp timestamp = 108;
    repeated AccountExchGroupConfigsCreated account_exch_group_configs_created = 103;
    repeated AccountRouteConfigsCreated account_route_configs_created = 101;
    repeated AltSymbolMapsCreated alt_symbol_maps_created = 106;
}


