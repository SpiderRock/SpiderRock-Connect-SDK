syntax = "proto3";

import "spiderrock_common.proto";
import "spiderrock_system_data_enums.proto";

package spiderrock.protobuf;

import "google/protobuf/timestamp.proto";

    
message SpdrSurfaceTCA {
    message PKey {
        
        google.protobuf.Timestamp trade_date = 10;
        string ticker = 11;
        MktWidthCode mkt_width_code = 12;
        TCAExpirationCode expiration_code = 13;
        string time_block = 14;
        StatsServer source_server = 15;
    }


    MessageMetadata _meta = 1;
    
    PKey pkey = 2;
    int32 sum_cnt_strikes_dd_p = 100;
    int32 sum_cnt_pn_lDd_bot_p = 101;
    float sum_sum_pn_lDd_bot_p = 102;
    int32 sum_cnt_pn_lDd_sld_p = 103;
    float sum_sum_pn_lDd_sld_p = 104;
    int32 sum_cnt_strikes_dn_p = 105;
    int32 sum_cnt_pn_lDn_bot_p = 106;
    float sum_sum_pn_lDn_bot_p = 107;
    int32 sum_cnt_pn_lDn_sld_p = 108;
    float sum_sum_pn_lDn_sld_p = 109;
    int32 sum_cnt_strikes_at_p = 110;
    int32 sum_cnt_pn_lAt_bot_p = 111;
    float sum_sum_pn_lAt_bot_p = 112;
    int32 sum_cnt_pn_lAt_sld_p = 113;
    float sum_sum_pn_lAt_sld_p = 114;
    int32 sum_cnt_strikes_at_c = 115;
    int32 sum_cnt_pn_lAt_bot_c = 116;
    float sum_sum_pn_lAt_bot_c = 117;
    int32 sum_cnt_pn_lAt_sld_c = 118;
    float sum_sum_pn_lAt_sld_c = 119;
    int32 sum_cnt_strikes_up_c = 120;
    int32 sum_cnt_pn_lUp_bot_c = 121;
    float sum_sum_pn_lUp_bot_c = 122;
    int32 sum_cnt_pn_lUp_sld_c = 123;
    float sum_sum_pn_lUp_sld_c = 124;
    int32 sum_cnt_strikes_uu_c = 125;
    int32 sum_cnt_pn_lUu_bot_c = 126;
    float sum_sum_pn_lUu_bot_c = 127;
    int32 sum_cnt_pn_lUu_sld_c = 128;
    float sum_sum_pn_lUu_sld_c = 129;
    int32 sum_cnt_violations = 130;
    int32 cnt_violations_dd_p = 131;
    int32 cnt_violations_dn_p = 132;
    int32 cnt_violations_at_p = 133;
    int32 cnt_violations_up_c = 134;
    int32 cnt_violations_uu_c = 135;
    int32 cnt_violations_at_c = 136;
